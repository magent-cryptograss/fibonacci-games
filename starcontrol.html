<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STAR CONTROL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { image-rendering: pixelated; border: 2px solid #222; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<canvas id="buffer" style="display:none"></canvas>
<script>
// ==================== SETUP ====================
const SNES_W = 320, SNES_H = 224, SCALE = 3;
const canvas = document.getElementById('game');
canvas.width = SNES_W * SCALE; canvas.height = SNES_H * SCALE;
const displayCtx = canvas.getContext('2d');
displayCtx.imageSmoothingEnabled = false;
const buffer = document.getElementById('buffer');
buffer.width = SNES_W; buffer.height = SNES_H;
const ctx = buffer.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = SNES_W, H = SNES_H;

// ==================== SOUND ====================
const sfx = (() => {
  let audioCtx = null;
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  document.addEventListener('keydown', () => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    // Also resume music context
    if (music && music._getCtx) {
      const mc = music._getCtx();
      if (mc && mc.state === 'suspended') mc.resume();
    }
  }, { once: false });
  function tone(freq, dur, type, vol, slide) {
    const c = getCtx(), t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type || 'square'; o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.linearRampToValueAtTime(slide, t + dur);
    g.gain.setValueAtTime(vol || 0.08, t);
    g.gain.linearRampToValueAtTime(0, t + dur);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + dur);
  }
  function noise(dur, vol) {
    const c = getCtx(), t = c.currentTime;
    const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource(), g = c.createGain();
    src.buffer = buf; g.gain.setValueAtTime(vol || 0.06, t);
    g.gain.linearRampToValueAtTime(0, t + dur);
    src.connect(g); g.connect(c.destination); src.start(t);
  }
  return {
    shoot()   { tone(800, 0.08, 'square', 0.15, 200); },
    laser()   { tone(1200, 0.1, 'sawtooth', 0.12, 600); },
    hit()     { noise(0.08, 0.15); tone(200, 0.1, 'square', 0.12, 80); },
    explode() { noise(0.4, 0.22); tone(100, 0.25, 'sawtooth', 0.15, 30); tone(60, 0.35, 'sine', 0.12, 20); },
    thrust()  { noise(0.04, 0.05); },
    shield()  { tone(600, 0.2, 'triangle', 0.12, 800); },
    shieldHit() { tone(400, 0.1, 'triangle', 0.1, 200); noise(0.05, 0.08); },
    select()  { tone(500, 0.05, 'square', 0.1, 700); },
    confirm() { tone(400, 0.06, 'square', 0.12); setTimeout(() => tone(600, 0.1, 'square', 0.12), 60); },
    scan()    { tone(1000, 0.35, 'triangle', 0.1, 2000); },
    warp()    { tone(80, 0.5, 'sawtooth', 0.15, 400); noise(0.25, 0.1); },
    pickup()  { tone(600, 0.06, 'square', 0.12, 900); },
    alarm()   { tone(300, 0.2, 'square', 0.12, 100); },
    // SC2-style torpedo launch
    torpedo() { tone(200, 0.15, 'sawtooth', 0.12, 600); noise(0.06, 0.08); },
    // SC2-style beam weapon
    beam()    { tone(1400, 0.15, 'sawtooth', 0.1, 800); tone(1200, 0.15, 'sine', 0.06, 600); },
    // SC2-style drone launch
    launch()  { tone(300, 0.1, 'triangle', 0.1, 500); noise(0.04, 0.06); },
    // SC2-style resurrection
    resurrect() { [300,450,600,800,1000].forEach((f,i) => setTimeout(() => tone(f, 0.15, 'triangle', 0.12), i * 80)); },
    victory() { [400,500,600,800].forEach((f,i) => setTimeout(() => tone(f, 0.2, 'square', 0.14), i * 100)); tone(800, 0.4, 'triangle', 0.1); },
    defeat()  { tone(300, 0.2, 'square', 0.14, 100); setTimeout(() => tone(150, 0.35, 'sawtooth', 0.14, 50), 200); },
    // SC2-style alien voice synth — each race has a distinctive vocal pattern
    alienVoice(race) {
      const voices = {
        urquan:    { base: 120, range: 40, type: 'sawtooth', speed: 80, vol: 0.07 }, // deep, authoritative
        spathi:    { base: 500, range: 200, type: 'square', speed: 40, vol: 0.06 }, // high, panicky
        chmmr:     { base: 300, range: 100, type: 'sine', speed: 100, vol: 0.05 }, // calm, crystalline
        zoqfotpik: { base: 400, range: 300, type: 'square', speed: 35, vol: 0.06 }, // chattery, fast
        orz:       { base: 250, range: 150, type: 'triangle', speed: 50, vol: 0.07 }, // eerie, warbling
        mycon:     { base: 100, range: 60, type: 'sawtooth', speed: 120, vol: 0.06 }, // slow, deep, fungal
        pkunk:     { base: 350, range: 180, type: 'triangle', speed: 55, vol: 0.05 }, // melodic, birdy
        melnorme:  { base: 200, range: 80, type: 'sine', speed: 70, vol: 0.06 }, // smooth, merchant
        human:     { base: 180, range: 60, type: 'sawtooth', speed: 65, vol: 0.05 }, // normal
        kohrah:    { base: 100, range: 50, type: 'sawtooth', speed: 100, vol: 0.08 }, // deep, menacing
        yehat:     { base: 200, range: 100, type: 'square', speed: 55, vol: 0.07 }, // sharp, warrior
        supox:     { base: 380, range: 120, type: 'sine', speed: 60, vol: 0.05 }, // gentle, melodic
        utwig:     { base: 160, range: 80, type: 'triangle', speed: 90, vol: 0.06 }, // sad, slow
        thraddash: { base: 250, range: 150, type: 'sawtooth', speed: 40, vol: 0.07 }, // brutish, fast
        ilwrath:   { base: 140, range: 100, type: 'sawtooth', speed: 70, vol: 0.07 }, // sinister, hissing
        umgah:     { base: 400, range: 250, type: 'square', speed: 35, vol: 0.06 }, // silly, random
        vux:       { base: 170, range: 70, type: 'triangle', speed: 80, vol: 0.06 }, // snooty, deliberate
        arilou:    { base: 500, range: 200, type: 'sine', speed: 45, vol: 0.04 }, // ethereal, high
        druuge:    { base: 220, range: 90, type: 'sawtooth', speed: 55, vol: 0.07 }, // harsh, merchant
        syreen:    { base: 320, range: 140, type: 'sine', speed: 50, vol: 0.05 }, // smooth, alluring
        shofixti:  { base: 350, range: 160, type: 'square', speed: 30, vol: 0.06 }, // excited, fast
      };
      const v = voices[race] || voices.human;
      const syllables = 3 + Math.floor(Math.random() * 4);
      for (let i = 0; i < syllables; i++) {
        const f = v.base + (Math.random() - 0.5) * v.range;
        const f2 = f + (Math.random() - 0.5) * v.range * 0.5;
        setTimeout(() => tone(f, 0.06 + Math.random() * 0.04, v.type, v.vol, f2), i * v.speed);
      }
    },
  };
})();

// ==================== MUSIC ====================
const music = (() => {
  let audioCtx = null, loopTimer = null, currentTrack = null, masterGain = null, oscs = [];
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (!masterGain) { masterGain = audioCtx.createGain(); masterGain.gain.value = 0.12; masterGain.connect(audioCtx.destination); }
    return audioCtx;
  }
  function stop() {
    if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }
    for (const o of oscs) try { o.stop(); } catch(e) {}
    oscs = []; currentTrack = null;
  }
  // SC2-authentic drum kit via noise + pitched oscillators
  function schedDrum(c, type, time) {
    if (type === 'kick') {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(150, time); o.frequency.exponentialRampToValueAtTime(30, time + 0.15);
      g.gain.setValueAtTime(0.7, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
      o.connect(g); g.connect(masterGain); o.start(time); o.stop(time + 0.2); oscs.push(o);
    } else if (type === 'snare') {
      // Noise burst + body tone
      const buf = c.createBuffer(1, c.sampleRate * 0.1, c.sampleRate);
      const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const n = c.createBufferSource(), gn = c.createGain();
      n.buffer = buf; gn.gain.setValueAtTime(0.4, time); gn.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
      n.connect(gn); gn.connect(masterGain); n.start(time); n.stop(time + 0.1); oscs.push(n);
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'triangle'; o.frequency.value = 200;
      g.gain.setValueAtTime(0.3, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
      o.connect(g); g.connect(masterGain); o.start(time); o.stop(time + 0.08); oscs.push(o);
    } else if (type === 'hihat') {
      const buf = c.createBuffer(1, c.sampleRate * 0.04, c.sampleRate);
      const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const n = c.createBufferSource(), gn = c.createGain();
      // High-pass filter for hihat
      const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 7000;
      n.buffer = buf; gn.gain.setValueAtTime(0.15, time); gn.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
      n.connect(hp); hp.connect(gn); gn.connect(masterGain); n.start(time); n.stop(time + 0.04); oscs.push(n);
    } else if (type === 'openhat') {
      const buf = c.createBuffer(1, c.sampleRate * 0.15, c.sampleRate);
      const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const n = c.createBufferSource(), gn = c.createGain();
      const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6000;
      n.buffer = buf; gn.gain.setValueAtTime(0.2, time); gn.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      n.connect(hp); hp.connect(gn); gn.connect(masterGain); n.start(time); n.stop(time + 0.15); oscs.push(n);
    } else if (type === 'tom') {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(100, time); o.frequency.exponentialRampToValueAtTime(50, time + 0.12);
      g.gain.setValueAtTime(0.5, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      o.connect(g); g.connect(masterGain); o.start(time); o.stop(time + 0.15); oscs.push(o);
    }
  }
  const N = { C2:65,D2:73,E2:82,F2:87,G2:98,A2:110,B2:123,C3:131,D3:147,E3:165,F3:175,Fs3:185,G3:196,A3:220,Bb3:233,B3:247,C4:262,Cs4:277,D4:294,Ds4:311,Eb4:311,E4:330,F4:349,Fs4:370,Gb4:370,G4:392,Gs4:415,Ab4:415,A4:440,Bb4:466,B4:494,C5:523,Cs5:554,D5:587,Ds5:622,Eb5:622,E5:659,F5:698,Fs5:740,G5:784,Gs5:831,A5:880,Bb5:932,B5:988,R:0 };
  const TRACKS = {
    // SC2 Title Theme - triumphant, heroic, reminiscent of SC2's iconic intro
    title: { tempo: 120, type: 'triangle',
      bass: [[N.C3,1],[N.G2,0.5],[N.C3,0.5],[N.E3,0.5],[N.G3,0.5],[N.C3,0.5],[N.G2,0.5],
             [N.F3,1],[N.E3,0.5],[N.C3,0.5],[N.G3,1],[N.F3,0.5],[N.G3,0.5],
             [N.A3,0.5],[N.G3,0.5],[N.F3,0.5],[N.E3,0.5],[N.D3,0.5],[N.C3,0.5],[N.G2,1]],
      lead: [[N.C5,0.5],[N.E5,0.5],[N.G5,1],[N.A5,0.5],[N.G5,0.5],
             [N.E5,0.5],[N.F5,0.5],[N.E5,0.5],[N.D5,0.5],[N.C5,1],[N.R,0.5],[N.G4,0.5],
             [N.A4,0.5],[N.B4,0.5],[N.C5,1],[N.E5,0.5],[N.D5,0.5],
             [N.C5,0.5],[N.B4,0.5],[N.A4,0.5],[N.G4,0.5],[N.A4,1],[N.G4,0.5],[N.R,0.5],
             [N.E5,0.5],[N.F5,0.5],[N.G5,1],[N.A5,0.5],[N.G5,0.5],[N.E5,0.5],[N.C5,0.5],
             [N.D5,1],[N.C5,1],[N.R,1]],
      // drums: kick on 1&3, snare on 2&4, hihat on all 8ths
      drums: [[1,'kick'],[0.5,'hihat'],[0.5,'snare'],[0.5,'hihat'],[0.5,'kick'],[0.5,'hihat'],[0.5,'snare'],[0.5,'hihat']],
      arp: [[N.C4,0.25],[N.E4,0.25],[N.G4,0.25],[N.E4,0.25],[N.C4,0.25],[N.E4,0.25],[N.G4,0.25],[N.C5,0.25],
            [N.F4,0.25],[N.A4,0.25],[N.C5,0.25],[N.A4,0.25],[N.G4,0.25],[N.B4,0.25],[N.D5,0.25],[N.B4,0.25]]
    },
    // SC2 HyperSpace (Red Alert) - tense, pulsing, mysterious
    map: { tempo: 100, type: 'triangle',
      bass: [[N.A2,1],[N.R,0.5],[N.A2,0.5],[N.E3,0.5],[N.A2,0.5],
             [N.D3,1],[N.R,0.5],[N.D3,0.5],[N.A3,0.5],[N.D3,0.5],
             [N.F3,1],[N.E3,0.5],[N.D3,0.5],[N.C3,0.5],[N.D3,0.5]],
      lead: [[N.A4,0.5],[N.C5,0.5],[N.E5,0.5],[N.A5,0.5],[N.E5,0.5],[N.C5,0.5],
             [N.D5,0.5],[N.F5,0.5],[N.A5,0.5],[N.F5,0.5],[N.D5,0.5],[N.R,0.5],
             [N.C5,0.5],[N.E5,0.5],[N.G5,0.5],[N.E5,0.5],[N.C5,0.5],[N.B4,0.5],
             [N.A4,1],[N.R,0.5],[N.E4,0.5],[N.A4,1],[N.R,1]],
      drums: [[1,'kick'],[0.5,'hihat'],[1,'kick'],[0.5,'hihat'],[1,'hihat'],[0.5,'hihat'],[0.5,'kick']],
      arp: [[N.A3,0.25],[N.C4,0.25],[N.E4,0.25],[N.A3,0.25],[N.C4,0.25],[N.E4,0.25],[N.A3,0.25],[N.C4,0.25],
            [N.D4,0.25],[N.F4,0.25],[N.A4,0.25],[N.D4,0.25],[N.F4,0.25],[N.A4,0.25],[N.D4,0.25],[N.F4,0.25]]
    },
    // SC2 Super Melee - intense, driving combat like Ur-Quan/Yehat battle themes
    combat: { tempo: 170, type: 'sawtooth',
      bass: [[N.E3,0.5],[N.E3,0.25],[N.R,0.25],[N.E3,0.25],[N.G3,0.25],[N.A3,0.5],
             [N.E3,0.5],[N.B3,0.25],[N.A3,0.25],[N.G3,0.5],[N.E3,0.5],
             [N.C3,0.5],[N.C3,0.25],[N.R,0.25],[N.E3,0.5],[N.G3,0.5],
             [N.A3,0.5],[N.B3,0.25],[N.A3,0.25],[N.G3,0.5],[N.E3,0.5]],
      lead: [[N.E5,0.25],[N.R,0.25],[N.E5,0.25],[N.G5,0.25],[N.A5,0.5],[N.G5,0.25],[N.E5,0.25],
             [N.D5,0.5],[N.E5,0.25],[N.R,0.25],[N.G5,0.5],[N.R,0.25],[N.E5,0.25],
             [N.A5,0.25],[N.R,0.25],[N.A5,0.25],[N.B5,0.25],[N.A5,0.5],[N.G5,0.25],[N.E5,0.25],
             [N.G5,0.5],[N.E5,0.25],[N.D5,0.25],[N.E5,1],[N.R,0.25],[N.B4,0.25],[N.D5,0.5]],
      drums: [[0.5,'kick'],[0.25,'hihat'],[0.25,'hihat'],[0.5,'snare'],[0.25,'hihat'],[0.25,'kick'],
              [0.5,'kick'],[0.25,'hihat'],[0.25,'hihat'],[0.5,'snare'],[0.25,'hihat'],[0.25,'openhat']],

    },
    // SC2 Dialogue - atmospheric, each race should have their own but this is the base

      bass: [[N.D3,1.5],[N.A3,0.5],[N.Bb3,1],[N.A3,1],
             [N.G3,1.5],[N.D3,0.5],[N.F3,1],[N.E3,0.5],[N.D3,0.5]],

             [N.E5,0.5],[N.D5,0.5],[N.R,0.5],[N.A4,0.5],
             [N.Bb4,1],[N.A4,0.5],[N.G4,0.5],[N.A4,1],[N.R,1],
             [N.D5,0.5],[N.E5,0.5],[N.F5,1],[N.E5,0.5],[N.D5,0.5],[N.Cs5,1],[N.R,1]],

             [N.R,0.5],[N.G4,0.25],[N.Gs4,0.25],[N.C5,0.5],[N.Ds5,0.5]],

              [0.5,'kick'],[0.25,'hihat'],[0.25,'tom'],[0.5,'snare'],[0.5,'openhat']],
      arp: [[N.C4,0.25],[N.Ds4,0.25],[N.G4,0.25],[N.Ds4,0.25],[N.C4,0.25],[N.Gs4,0.25],[N.G4,0.25],[N.Ds4,0.25]]
    },
    // SC2 Starbase - warm, safe, military feel
    starbase: { tempo: 90, type: 'triangle',
      bass: [[N.C3,1],[N.G2,0.5],[N.C3,0.5],[N.E3,1],[N.C3,0.5],[N.G2,0.5],
             [N.F3,1],[N.E3,0.5],[N.D3,0.5],[N.G3,1],[N.F3,0.5],[N.E3,0.5]],

             [N.G4,1],[N.E4,0.5],[N.R,0.5],
             [N.F4,0.5],[N.A4,0.5],[N.C5,1],[N.B4,0.5],[N.G4,0.5],
             [N.A4,1],[N.G4,0.5],[N.R,0.5],
             [N.E4,0.5],[N.G4,0.5],[N.B4,0.5],[N.C5,0.5],[N.D5,1],[N.C5,0.5],[N.R,0.5]],
      drums: [[1,'kick'],[1,'hihat'],[1,'snare'],[1,'hihat']],
      arp: [[N.C4,0.5],[N.E4,0.5],[N.G4,0.5],[N.E4,0.5],[N.F4,0.5],[N.A4,0.5],[N.C5,0.5],[N.A4,0.5]]
    },
    // SC2 Orbit/Planet - serene, exploratory
    orbit: { tempo: 85, type: 'sine',
      bass: [[N.C3,1.5],[N.G2,0.5],[N.A2,1],[N.E3,1],
             [N.F3,1.5],[N.C3,0.5],[N.D3,1],[N.G3,1]],
      lead: [[N.G4,1],[N.C5,0.5],[N.E5,0.5],[N.D5,1],[N.C5,0.5],[N.R,0.5],
             [N.A4,0.5],[N.C5,0.5],[N.E5,1],[N.D5,0.5],[N.B4,0.5],
             [N.C5,1.5],[N.R,0.5],[N.G4,0.5],[N.A4,0.5],[N.B4,1],[N.R,1]],
      drums: null,
      arp: [[N.C4,0.5],[N.E4,0.5],[N.G4,0.5],[N.R,0.5],[N.A3,0.5],[N.C4,0.5],[N.E4,0.5],[N.R,0.5]]
    },
    // SC2 Lander - tense surface exploration

      lead: [[N.A4,0.25],[N.C5,0.25],[N.E5,0.5],[N.R,0.5],[N.D5,0.25],[N.C5,0.25],
             [N.A4,0.5],[N.R,0.5],[N.F5,0.25],[N.E5,0.25],[N.D5,0.5],[N.R,0.5],
             [N.C5,0.25],[N.B4,0.25],[N.A4,0.5],[N.R,0.5],[N.E5,0.5],[N.R,0.5]],

      bass: [[N.C3,0.5],[N.E3,0.5],[N.G3,0.5],[N.C3,0.5],[N.F3,0.5],[N.A3,0.5],
             [N.G3,0.5],[N.B3,0.5],[N.C3,1],[N.R,2]],
      lead: [[N.C5,0.5],[N.E5,0.5],[N.G5,0.5],[N.C5,0.5],
             [N.E5,0.5],[N.G5,0.5],[N.A5,0.5],[N.G5,0.5],
             [N.F5,0.5],[N.E5,0.5],[N.G5,1],[N.C5,2],[N.R,2]],
      drums: [[0.5,'kick'],[0.5,'snare'],[0.5,'kick'],[0.5,'snare'],[0.5,'kick'],[0.5,'kick'],[1,'snare'],[1,'R']],
      arp: null
    },
  };
  function play(name) {
    if (currentTrack === name) return;
    stop(); currentTrack = name;
    const tr = TRACKS[name]; if (!tr) return;
    const c = getCtx(); if (c.state === 'suspended') return;
    let bi = 0, li = 0, di = 0, ai = 0;
    let bt = c.currentTime + 0.1, lt = c.currentTime + 0.1, dt = c.currentTime + 0.1, at = c.currentTime + 0.1;
    const bl = 60 / tr.tempo;
    function sched() {
      const now = c.currentTime;
      // Bass line
      while (bt < now + 2) {
        const [f,d] = tr.bass[bi % tr.bass.length];
        if (f > 0) { const o = c.createOscillator(), g = c.createGain(); o.type = 'square'; o.frequency.value = f; g.gain.setValueAtTime(0.45, bt); g.gain.linearRampToValueAtTime(0, bt+d*bl*0.9); o.connect(g); g.connect(masterGain); o.start(bt); o.stop(bt+d*bl); oscs.push(o); }
        bt += d * bl; bi++;
      }
      // Lead melody
      while (lt < now + 2) {
        const [f,d] = tr.lead[li % tr.lead.length];
        if (f > 0) { const o = c.createOscillator(), g = c.createGain(); o.type = tr.type || 'triangle'; o.frequency.value = f; g.gain.setValueAtTime(0.35, lt); g.gain.linearRampToValueAtTime(0, lt+d*bl*0.85); o.connect(g); g.connect(masterGain); o.start(lt); o.stop(lt+d*bl); oscs.push(o); }
        lt += d * bl; li++;
      }
      // Drum pattern
      if (tr.drums) {
        while (dt < now + 2) {
          const [d, type] = tr.drums[di % tr.drums.length];
          if (type !== 'R') schedDrum(c, type, dt);
          dt += d * bl; di++;
        }
      }
      // Arpeggio layer (accompaniment)
      if (tr.arp) {
        while (at < now + 2) {
          const [f,d] = tr.arp[ai % tr.arp.length];
          if (f > 0) { const o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(0.12, at); g.gain.linearRampToValueAtTime(0, at+d*bl*0.7); o.connect(g); g.connect(masterGain); o.start(at); o.stop(at+d*bl); oscs.push(o); }
          at += d * bl; ai++;
        }
      }
      if (oscs.length > 120) oscs.splice(0, 60);
    }
    sched(); loopTimer = setInterval(sched, 500);
  }
  return { play, stop, _getCtx: getCtx };
})();

    if ((questFlags.allies_found || 0) < 5) active.push(QUEST_DEFS.find_allies);
    if (artifacts < 3) active.push(QUEST_DEFS.get_seals);
  } else if (!questFlags.has_bomb) active.push(QUEST_DEFS.find_bomb);
  else if (!questFlags.samatra_destroyed) active.push(QUEST_DEFS.destroy_samatra);
  // Side quests (show if relevant)
  for (const [key, q] of Object.entries(QUEST_DEFS)) {

function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }
function angleTo(x1, y1, x2, y2) { return Math.atan2(y2-y1, x2-x1); }
function normAngle(a) { while (a > Math.PI) a -= TAU; while (a < -Math.PI) a += TAU; return a; }
function lerp(a, b, t) { return a + (b - a) * t; }
function rng(seed) { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ==================== PARTICLES ====================
class Particle {
  constructor(x, y, vx, vy, color, life, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.maxLife = life;
    this.type = type || 'spark'; // spark, ring, debris, glow
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.type === 'debris') { this.vx *= 0.97; this.vy *= 0.97; }
    this.life--;
  }
  draw(ox, oy) {
    const frac = this.life / this.maxLife;
    const sx = this.x - ox, sy = this.y - oy;
    if (this.type === 'ring') {
      // SC2 explosion ring - expands outward
      ctx.globalAlpha = frac * 0.6;
      ctx.strokeStyle = this.color; ctx.lineWidth = 2;
      const r = (1 - frac) * 20;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, TAU); ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (this.type === 'glow') {
      // Soft glow effect
      ctx.globalAlpha = frac * 0.4;
      ctx.fillStyle = this.color;
      const r = 4 + (1 - frac) * 6;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    } else if (this.type === 'debris') {
      // Ship debris chunks
      ctx.globalAlpha = frac;
      ctx.fillStyle = this.color;
      const sz = Math.max(1, Math.floor(3 * frac));
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate((this.maxLife - this.life) * 0.2);
      ctx.fillRect(-sz/2, -sz/2, sz, sz);
      ctx.restore();
      ctx.globalAlpha = 1;
    } else {
      // Standard spark
      ctx.globalAlpha = frac;
      ctx.fillStyle = this.color;
      const sz = Math.max(1, Math.floor(2 * frac));
      ctx.fillRect(sx, sy, sz, sz);
      ctx.globalAlpha = 1;
    }
  }
}
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * TAU, s = (speed || 3) * Math.random();
    particles.push(new Particle(x, y, Math.cos(a)*s, Math.sin(a)*s, color, 15 + Math.random() * 20, 'spark'));
  }
}
// SC2-style explosion: ring + sparks + debris + flash
function spawnExplosion(x, y, color, intensity) {
  const n = intensity || 1;
  // Expanding rings
  particles.push(new Particle(x, y, 0, 0, '#ffffff', 15, 'ring'));
  particles.push(new Particle(x, y, 0, 0, color, 20, 'ring'));
  // Central glow
  particles.push(new Particle(x, y, 0, 0, '#ffffff', 10, 'glow'));
  particles.push(new Particle(x, y, 0, 0, color, 18, 'glow'));
  // Sparks
  for (let i = 0; i < 8 * n; i++) {
    const a = Math.random() * TAU, s = 2 + Math.random() * 4 * n;
    particles.push(new Particle(x, y, Math.cos(a)*s, Math.sin(a)*s, color, 12 + Math.random() * 15, 'spark'));
  }
  // Debris chunks
  for (let i = 0; i < 4 * n; i++) {
    const a = Math.random() * TAU, s = 1 + Math.random() * 3;
    const debrisColors = [color, '#888', '#aaa', '#666'];
    particles.push(new Particle(x, y, Math.cos(a)*s, Math.sin(a)*s,
      debrisColors[Math.floor(Math.random() * debrisColors.length)], 20 + Math.random() * 20, 'debris'));
  }

// ==================== COMBAT SHIP ====================
class Ship {
  constructor(type, x, y, angle, isPlayer) {
    this.def = SHIP_TYPES[type];
    this.type = type;
    this.x = x; this.y = y; this.angle = angle || 0;
    this.vx = 0; this.vy = 0;
    this.crew = this.def.maxCrew;
    this.energy = this.def.maxEnergy;
    this.alive = true;
    this.fireTimer = 0;
    this.flash = 0;
    this.thrusting = false;
    this.shieldTimer = 0;
    this.specialCooldown = 0;
    this.isPlayer = isPlayer || false;
    this.drones = [];
    this.zapsats = [];
    this.pkunkResurrect = false;
  }
  update() {
    if (this.flash > 0) this.flash--;
    if (this.fireTimer > 0) this.fireTimer--;
    if (this.shieldTimer > 0) {
      this.shieldTimer--;
      if (this.shieldTimer <= 0 && this.cloaked) this.cloaked = false;
    }
    if (this.specialCooldown > 0) this.specialCooldown--;
    const rechargeBonus = this.isPlayer && this.energyRechargeBonus ? (1 + this.energyRechargeBonus) : 1;
    this.energy = Math.min(this.def.maxEnergy, this.energy + this.def.energyRegen * rechargeBonus);

    // Apply gravity from combat planet
    if (combatPlanet) {
      const dx = combatPlanet.x - this.x, dy = combatPlanet.y - this.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d > PLANET_RADIUS) {
        const g = GRAVITY_STRENGTH / (d * d);
        this.vx += (dx / d) * g;
        this.vy += (dy / d) * g;
      }
      if (d < PLANET_RADIUS + 4) {
        this.takeDamage(999);
        spawnParticles(this.x, this.y, '#ff8844', 20, 4);
      }
    }

    // Speed limit + drag
    const spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    if (spd > this.def.maxSpeed) {
      this.vx *= this.def.maxSpeed / spd;
      this.vy *= this.def.maxSpeed / spd;
    }
    this.vx *= this.def.drag;
    this.vy *= this.def.drag;

    this.x += this.vx; this.y += this.vy;

    // Wrap around arena
    const ARENA = 400;
    if (this.x < -ARENA) this.x += ARENA * 2;
    if (this.x > ARENA) this.x -= ARENA * 2;
    if (this.y < -ARENA) this.y += ARENA * 2;
    if (this.y > ARENA) this.y -= ARENA * 2;

    // Update drones
    for (const d of this.drones) {
      d.angle += 0.08;
      d.x = this.x + Math.cos(d.angle) * 25;
      d.y = this.y + Math.sin(d.angle) * 25;
      d.life--;
    }
    // Update zapsats (Chmmr orbiting satellites)
    if (this.zapsats) {
      const target = this.isPlayer ? enemyShip : playerShip;
      for (const z of this.zapsats) {
        z.angle += 0.04;
        z.x = this.x + Math.cos(z.angle) * z.dist;
        z.y = this.y + Math.sin(z.angle) * z.dist;
        z.life--;
        z.fireTimer--;
        // Auto-fire at enemy when in range
        if (z.fireTimer <= 0 && target && target.alive) {
          const d = dist(z.x, z.y, target.x, target.y);
          if (d < 200) {
            const a = Math.atan2(target.y - z.y, target.x - z.x);
            projectiles.push({ x: z.x, y: z.y, vx: Math.cos(a) * 10, vy: Math.sin(a) * 10, damage: 2, owner: this, color: '#aaccff', size: 2, life: 25, isBeam: true });
            z.fireTimer = 12; // SC2: ZapSats fire rapidly
          }
        }
      }
      this.zapsats = this.zapsats.filter(z => z.life > 0);
    }
    this.drones = this.drones.filter(d => d.life > 0);
  }
  turnLeft() { this.angle -= this.def.turnSpeed; }
  turnRight() { this.angle += this.def.turnSpeed; }
  thrustForward() {
    this.vx += Math.cos(this.angle - Math.PI/2) * this.def.thrust;
    this.vy += Math.sin(this.angle - Math.PI/2) * this.def.thrust;
    this.thrusting = true;
    // SC2-style engine exhaust trail
    const ex = this.x - Math.cos(this.angle - Math.PI/2) * 10;
    const ey = this.y - Math.sin(this.angle - Math.PI/2) * 10;
    if (frame % 2 === 0) {
      const colors = ['#ff4400', '#ff8844', '#ffcc66', '#ff6622'];
      const a = this.angle + Math.PI/2 + (Math.random() - 0.5) * 0.4;
      const s = 0.5 + Math.random() * 1.5;
      particles.push(new Particle(ex, ey, Math.cos(a)*s, Math.sin(a)*s,
        colors[Math.floor(Math.random() * colors.length)], 8 + Math.random() * 8, 'spark'));
    }
  }
  fire() {
    if (this.fireTimer > 0 || this.energy < this.def.weapon.cost) return;
    this.fireTimer = this.def.weapon.rate;
    this.energy -= this.def.weapon.cost;
    const w = this.def.weapon;
    const nx = Math.cos(this.angle - Math.PI/2), ny = Math.sin(this.angle - Math.PI/2);
    // SC2-style muzzle flash on fire
    particles.push(new Particle(this.x + nx * 12, this.y + ny * 12, nx * 0.5, ny * 0.5, w.color, 4, 'glow'));
    particles.push(new Particle(this.x + nx * 12, this.y + ny * 12, 0, 0, '#fff', 3, 'spark'));

    if (w.type === 'spread') {
      for (let i = -1; i <= 1; i++) {
        const a = this.angle - Math.PI/2 + i * 0.2;
        projectiles.push({ x: this.x + nx*10, y: this.y + ny*10, vx: Math.cos(a)*w.speed + this.vx*0.3, vy: Math.sin(a)*w.speed + this.vy*0.3, damage: w.damage, owner: this, color: w.color, size: w.size, life: 40 });
      }
    } else if (w.type === 'scatter') {
      const a = this.angle - Math.PI/2 + (Math.random() - 0.5) * 0.4;
      projectiles.push({ x: this.x + nx*8, y: this.y + ny*8, vx: Math.cos(a)*w.speed + this.vx*0.5, vy: Math.sin(a)*w.speed + this.vy*0.5, damage: w.damage, owner: this, color: w.color, size: w.size, life: 30 });
    } else if (w.type === 'homing') {
      const target = this.isPlayer ? enemyShip : playerShip;
      projectiles.push({ x: this.x + nx*10, y: this.y + ny*10, vx: nx*w.speed, vy: ny*w.speed, damage: w.damage, owner: this, color: w.color, size: w.size, life: 80, homing: true, target });
    } else if (w.type === 'autoaim') {
      // SC2 Arilou auto-aim laser — tracks nearest enemy
      const target = this.isPlayer ? enemyShip : playerShip;
      const aimAngle = Math.atan2(target.y - this.y, target.x - this.x);
      const ax = Math.cos(aimAngle), ay = Math.sin(aimAngle);
      projectiles.push({ x: this.x + ax*10, y: this.y + ay*10, vx: ax*w.speed, vy: ay*w.speed, damage: w.damage, owner: this, color: w.color, size: w.size, life: 25, isBeam: true });
      sfx.laser();
    } else if (w.type === 'cone') {
      // SC2 Umgah antimatter cone — short range, wide spread
      for (let ci = -2; ci <= 2; ci++) {
        const a = this.angle - Math.PI/2 + ci * 0.25;
        projectiles.push({ x: this.x + nx*6, y: this.y + ny*6, vx: Math.cos(a)*w.speed, vy: Math.sin(a)*w.speed, damage: w.damage, owner: this, color: w.color, size: w.size, life: 12, isCone: true });
      }
    } else if (w.type === 'beam') {
      // SC2-style beam weapon — longer range, faster projectile, beam visual
      projectiles.push({ x: this.x + nx*10, y: this.y + ny*10, vx: nx*w.speed*1.2 + this.vx*0.2, vy: ny*w.speed*1.2 + this.vy*0.2, damage: w.damage, owner: this, color: w.color, size: w.size, life: 35, isBeam: true, sx: this.x + nx*10, sy: this.y + ny*10 });
      sfx.beam();
    } else {
      projectiles.push({ x: this.x + nx*10, y: this.y + ny*10, vx: nx*w.speed + this.vx*0.3, vy: ny*w.speed + this.vy*0.3, damage: w.damage, owner: this, color: w.color, size: w.size, life: 50 });
    }
    if (w.type !== 'beam') sfx.shoot();
    // SC2 Druuge Mauler: massive cannon recoil pushes ship backward
    if (this.def.name === 'Mauler') {
      this.vx -= nx * 6;
      this.vy -= ny * 6;
      screenShake = 3;
    }
  }
  useSpecial() {
    if (this.specialCooldown > 0 || this.energy < this.def.special.cost) return;
    this.energy -= this.def.special.cost;
    const sp = this.def.special;
    if (sp.name === 'Shield') {
      this.shieldTimer = sp.duration;
      this.specialCooldown = sp.duration + 30;
      sfx.shield();
    } else if (sp.name === 'Afterburner') {
      // SC2 Thraddash: afterburner boost + leaves damaging flame trail
      const nx = Math.cos(this.angle - Math.PI/2), ny = Math.sin(this.angle - Math.PI/2);
      this.vx += nx * 8; this.vy += ny * 8;
      this.specialCooldown = 10; // can spam it to leave long trails
      // Spawn damaging flame projectiles behind the ship
      const bx = -nx, by = -ny; // backward direction
      for (let fi = 0; fi < 3; fi++) {
        projectiles.push({
          x: this.x + bx * (fi * 6), y: this.y + by * (fi * 6),
          vx: bx * 0.5 + (Math.random() - 0.5) * 0.5,
          vy: by * 0.5 + (Math.random() - 0.5) * 0.5,
          damage: 2, owner: this,
          color: fi === 0 ? '#ff4400' : '#ff8800',
          size: 3, life: 40, flameTrail: true
        });
      }
      spawnParticles(this.x, this.y, '#ff4400', 6, 3);
      sfx.thrust();
    } else if (sp.name === 'Heal') {
      this.crew = Math.min(this.def.maxCrew, this.crew + 5);
      this.specialCooldown = 120;
      spawnParticles(this.x, this.y, '#44ff88', 10, 2);
      sfx.pickup();
    } else if (sp.name === 'ZapSat') {
      // SC2 Chmmr Avatar: deploy orbiting zapsat drone (max 3)
      if (!this.zapsats) this.zapsats = [];
      if (this.zapsats.length < 3) {
        const angle = (this.zapsats.length / 3) * TAU;
        this.zapsats.push({ angle: angle, dist: 35, life: 600, fireTimer: 0 });
        this.specialCooldown = 45;
        sfx.confirm();
      } else {
        this.specialCooldown = 10;
      }
    } else if (sp.name === 'Drone') {
      this.drones.push({ x: this.x, y: this.y, angle: Math.random() * TAU, life: 300 });
      this.specialCooldown = 60;
      sfx.confirm();
    } else if (sp.name === 'Marines') {
      // SC2 Orz "Go! Go!" — launches space marines that board enemy ship and kill crew
      const target = this.isPlayer ? enemyShip : playerShip;
      const a = Math.atan2(target.y - this.y, target.x - this.x);
      // Launch 2 marines as homing projectiles that damage crew on impact
      for (let mi = 0; mi < 2; mi++) {
        projectiles.push({
          x: this.x, y: this.y,
          vx: Math.cos(a + (mi - 0.5) * 0.3) * 4,
          vy: Math.sin(a + (mi - 0.5) * 0.3) * 4,
          damage: 3, owner: this, color: '#55eebb', size: 3, life: 120,
          homing: true, target, isMarine: true
        });
      }
      this.specialCooldown = 60;
      spawnParticles(this.x, this.y, '#55eebb', 6, 2);
      gameMessage = 'Orz: Go! Go!';
      messageTimer = 30;
      sfx.launch();
    } else if (sp.name === 'Teleport') {
      spawnParticles(this.x, this.y, '#cc66ff', 15, 3);
      this.x = (Math.random() - 0.5) * 600;
      this.y = (Math.random() - 0.5) * 600;
      this.vx = 0; this.vy = 0;
      this.specialCooldown = 90;
      spawnParticles(this.x, this.y, '#cc66ff', 15, 3);
      sfx.warp();
    } else if (sp.name === 'Fighters') {
      // Ur-Quan launches fighter drones
      for (let fi = 0; fi < 3; fi++) {
        this.drones.push({ x: this.x, y: this.y, angle: Math.random() * TAU, life: 200 });
      }
      this.specialCooldown = 120;
      sfx.confirm();
    } else if (sp.name === 'Regenerate') {
      // Mycon regenerates crew
      this.crew = Math.min(this.def.maxCrew, this.crew + 3);
      this.specialCooldown = 90;
      spawnParticles(this.x, this.y, '#ff66aa', 10, 2);
      sfx.pickup();
    } else if (sp.name === 'Resurrect') {
      // SC2 Pkunk: insult stream regenerates energy + marks ship for resurrection on death
      this.energy = Math.min(this.def.maxEnergy, this.energy + 20);
      this.pkunkResurrect = true; // flag: will resurrect once on death
      this.specialCooldown = 40;
      // Insult text particles
      const insults = ['FOOL!','IDIOT!','DORK!','LOSER!','JERK!','DUMMY!'];
      gameMessage = 'Pkunk: ' + insults[Math.floor(Math.random() * insults.length)];
      messageTimer = 30;
      spawnParticles(this.x, this.y, '#66aaff', 8, 2);
      sfx.victory();
    } else if (sp.name === 'Confusion') {
      // Melnorme confusion blast - spawns decoy projectiles
      for (let ci = 0; ci < 8; ci++) {
        const ca = (ci / 8) * TAU;
        projectiles.push({ x: this.x, y: this.y, vx: Math.cos(ca) * 4, vy: Math.sin(ca) * 4, damage: 1, owner: this, color: '#ffdd44', size: 2, life: 40 });
      }
      this.specialCooldown = 60;
      sfx.alarm();
    } else if (sp.name === 'Fireblade') {
      // Kohr-Ah FRIED — single spinning blade that flies out then boomerangs back
      const fa = this.angle - Math.PI/2;
      projectiles.push({
        x: this.x, y: this.y,
        vx: Math.cos(fa) * 6, vy: Math.sin(fa) * 6,
        damage: 4, owner: this, color: '#ff2222', size: 5, life: 120,
        isFRIED: true, originShip: this, spinAngle: 0,
        phase: 'out', phaseTimer: 40
      });
      this.specialCooldown = 60;
      sfx.alarm();
    } else if (sp.name === 'Reverse') {
      // Supox/Umgah reverse thrust
      const nx = Math.cos(this.angle - Math.PI/2), ny = Math.sin(this.angle - Math.PI/2);
      this.vx -= nx * 6; this.vy -= ny * 6;
      this.specialCooldown = 30;
      spawnParticles(this.x, this.y, '#88ff44', 6, 2);
      sfx.thrust();
    } else if (sp.name === 'Absorb') {
      // Utwig absorb shield - absorbs incoming fire into energy
      this.shieldTimer = sp.duration;
      this.specialCooldown = sp.duration + 20;
      sfx.shield();
    } else if (sp.name === 'Cloak') {
      // SC2 Ilwrath cloaking — ship becomes invisible to enemy (AI won't track)
      this.shieldTimer = sp.duration;
      this.cloaked = true;
      this.specialCooldown = sp.duration + 60;
      sfx.warp();
    } else if (sp.name === 'Limpet') {
      // SC2 VUX Limpet — permanently reduces enemy max speed (stacks!)
      const target = this.isPlayer ? enemyShip : playerShip;
      target.vx *= 0.3; target.vy *= 0.3;
      target.def = { ...target.def, maxSpeed: Math.max(1, target.def.maxSpeed - 0.5) };
      target.def.turnSpeed = Math.max(0.02, target.def.turnSpeed - 0.005);
      spawnParticles(target.x, target.y, '#44ff88', 8, 2);
      gameMessage = 'Limpet attached! Speed reduced!';
      messageTimer = 30;
      this.specialCooldown = 90;
      sfx.alarm();
    } else if (sp.name === 'Furnace') {
      // Druuge burns crew for energy
      if (this.crew > 1) {
        this.crew--;
        this.energy = Math.min(this.def.maxEnergy, this.energy + 40);
        spawnParticles(this.x, this.y, '#ff4400', 6, 2);
        this.specialCooldown = 30;
        sfx.hit();
      }
    } else if (sp.name === 'BUTT') {
      // Spathi Backward Utilizing Tracking Torpedo — fires backward, homes on enemy
      const nx = Math.cos(this.angle - Math.PI/2), ny = Math.sin(this.angle - Math.PI/2);
      const target = this.isPlayer ? enemyShip : playerShip;
      projectiles.push({
        x: this.x - nx * 10, y: this.y - ny * 10,
        vx: -nx * 6 + this.vx * 0.3, vy: -ny * 6 + this.vy * 0.3,
        damage: 2, owner: this, color: '#ff8844', size: 3, life: 80,
        homing: true, target,
      });
      this.specialCooldown = 20;
      sfx.shoot();
    } else if (sp.name === 'Siren') {
      // SC2 Syreen Siren Song — crew dots fly from enemy to Syreen
      const target = this.isPlayer ? enemyShip : playerShip;
      if (target.crew > 1) {
        const stolen = Math.min(3, target.crew - 1);
        target.crew -= stolen;
        this.crew = Math.min(this.def.maxCrew, this.crew + stolen);
        // Crew dots flying from enemy to us
        for (let ci = 0; ci < stolen; ci++) {
          const a = Math.random() * TAU;
          particles.push(new Particle(
            target.x + Math.cos(a) * 10, target.y + Math.sin(a) * 10,
            (this.x - target.x) * 0.03 + (Math.random() - 0.5) * 2,
            (this.y - target.y) * 0.03 + (Math.random() - 0.5) * 2,
            '#88ff88', 30, 'glow'));
        }
        // Pink song wave around Syreen
        for (let wi = 0; wi < 12; wi++) {
          const wa = (wi / 12) * TAU;
          particles.push(new Particle(this.x, this.y, Math.cos(wa) * 3, Math.sin(wa) * 3, '#ff88cc', 20, 'spark'));
        }
        gameMessage = `Siren Song! Stole ${stolen} crew!`;
        messageTimer = 40;
      }
      this.specialCooldown = 120;
      sfx.shield();
    } else if (sp.name === 'Glory') {
      // SC2 Shofixti Glory Device — massive self-destruct damages EVERYTHING nearby
      // Damages both playerShip and enemyShip based on distance
      for (const target of [playerShip, enemyShip]) {
        if (target === this || !target.alive) continue;
        const d = dist(this.x, this.y, target.x, target.y);
        if (d < 150) {
          const dmg = Math.max(1, Math.floor(16 - d / 10));
          target.takeDamage(dmg);
        }
      }
      // Massive screen shake and explosion
      screenShake = 15;
      this.crew = 0; this.alive = false;
      spawnParticles(this.x, this.y, '#ffff44', 14, 4);
      spawnParticles(this.x, this.y, '#ff8844', 8, 3);
      sfx.explode();
    }
  }
  takeDamage(dmg) {
    if (this.shieldTimer > 0) {
      if (this.def.special && this.def.special.name === 'Shield') {
        // SC2 Yehat: shield absorbs hit but costs energy
        this.energy = Math.max(0, this.energy - dmg * 4);
        if (this.energy <= 0) this.shieldTimer = 0;
        // Shield impact flare
        spawnParticles(this.x, this.y, '#4488ff', 6, 3);
        particles.push(new Particle(this.x, this.y, 0, 0, '#ffffff', 5, 'ring'));
      } else if (this.def.special && this.def.special.name === 'Absorb') {
        // SC2 Utwig: absorb shield GAINS energy from incoming fire!
        this.energy = Math.min(this.def.maxEnergy, this.energy + dmg * 5);
        // Golden absorb flash
        spawnParticles(this.x, this.y, '#ffcc44', 8, 3);
        particles.push(new Particle(this.x, this.y, 0, 0, '#ffee88', 6, 'ring'));
      } else {
        this.shieldTimer = Math.max(0, this.shieldTimer - 10);
        spawnParticles(this.x, this.y, '#4488ff', 4, 2);
      }
      sfx.hit(); screenShake = 2;
      return;
    }
    this.crew -= dmg;
    this.flash = 4;
    screenShake = 3;
    if (this.crew <= 0) {
      // SC2 Pkunk resurrection: ~50% chance to come back from the dead
      if (this.pkunkResurrect && Math.random() < 0.5) {
        this.crew = this.def.maxCrew;
        this.energy = this.def.maxEnergy;
        // SC2: Pkunk can resurrect multiple times — each time has 50% chance
        spawnParticles(this.x, this.y, '#ffffff', 20, 4);
        spawnParticles(this.x, this.y, '#66aaff', 15, 3);
        gameMessage = 'Pkunk RESURRECTS!';
        messageTimer = 90;
        sfx.victory();
        return;
      }
      this.crew = 0; this.alive = false;
      // SC2 escape pod — captain ejects!
      spawnExplosion(this.x, this.y, this.def.color, 15);
      const podAngle = Math.random() * TAU;
      projectiles.push({
        x: this.x, y: this.y,
        vx: Math.cos(podAngle) * 3, vy: Math.sin(podAngle) * 3,
        damage: 0, owner: this, color: '#ffffff', size: 2, life: 180,
        isEscapePod: true
      });
    }
  }
  draw(cx, cy) {
    ctx.save();
    ctx.translate(this.x - cx, this.y - cy);
    ctx.rotate(this.angle);
    // SC2 Ilwrath cloak — nearly invisible (only player can see faint shimmer)
    if (this.cloaked && this.shieldTimer > 0) {
      ctx.globalAlpha = this.isPlayer ? 0.15 : 0.04; // player sees own cloak better
    }
    this.def.draw(this);
    if (this.cloaked && this.shieldTimer > 0) ctx.globalAlpha = 1;
    // SC2-style generic shield glow (for ships without custom shield draw)
    if (this.shieldTimer > 0 && !this.cloaked) {
      const pulse = Math.sin(frame * 0.3) * 0.15;
      ctx.globalAlpha = 0.25 + pulse;
      ctx.strokeStyle = this.def.color;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, 18, 0, TAU); ctx.stroke();
      ctx.globalAlpha = 0.1 + pulse * 0.5;
      ctx.fillStyle = this.def.color;
      ctx.beginPath(); ctx.arc(0, 0, 18, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.restore();
    this.thrusting = false;
  }
}

// ==================== COMBAT AI ====================
let screenShake = 0;

function updateAI(ship, target) {
  // SC2: Cloaked ships can't be targeted — AI wanders randomly
  if (target.cloaked && target.shieldTimer > 0) {
    // Can't see target — wander randomly
    if (Math.random() < 0.02) ship.turnLeft();
    else if (Math.random() < 0.02) ship.turnRight();
    if (Math.random() < 0.05) ship.thrustForward();
    return;
  }
  const dx = target.x - ship.x, dy = target.y - ship.y;
  const d = dist(ship.x, ship.y, target.x, target.y);
  const targetAngle = Math.atan2(dy, dx) + Math.PI / 2;
  const diff = normAngle(targetAngle - ship.angle);

  // SC2-authentic AI: each race fights differently
  const race = ship.type;
  const isRanged = ship.def.weapon.type === 'beam' || ship.def.weapon.type === 'homing';
  const isFast = ship.def.maxSpeed > 5;
  const isCoward = race === 'spathi' || race === 'zoqfotpik' || race === 'umgah';
  const isAggressive = race === 'urquan' || race === 'kohrah' || race === 'yehat' || race === 'shofixti';
  const isErratic = race === 'pkunk' || race === 'orz';
  const idealDist = isCoward ? 250 : isAggressive ? 60 : isRanged ? 180 : (isFast ? 100 : 120);

  // Turn toward target (with lead prediction)
  const leadX = target.x + target.vx * 8;
  const leadY = target.y + target.vy * 8;
  const leadAngle = Math.atan2(leadY - ship.y, leadX - ship.x) + Math.PI / 2;
  const leadDiff = normAngle(leadAngle - ship.angle);

  if (leadDiff > 0.08) ship.turnRight();
  else if (leadDiff < -0.08) ship.turnLeft();

  // Movement: race-specific behavior
  if (isCoward && d < idealDist) {
    // Cowards run away and fire backward (Spathi style)
    ship.thrustForward();
    // Turn AWAY from target
    const awayAngle = Math.atan2(-dy, -dx) + Math.PI / 2;
    const awayDiff = normAngle(awayAngle - ship.angle);
    if (awayDiff > 0.1) ship.turnRight();
    else if (awayDiff < -0.1) ship.turnLeft();
  } else if (isErratic) {
    // Erratic movement — unpredictable (Pkunk/Orz style)
    ship.thrustForward();
    if (frame % 20 < 7) ship.turnLeft();
    else if (frame % 20 < 14) ship.turnRight();
  } else if (d > idealDist + 30) {
    ship.thrustForward();
  } else if (d < idealDist - 40) {
    if (isAggressive) ship.thrustForward(); // aggressive ships keep pressing
    else if (Math.random() < 0.3) ship.thrustForward();
  } else {
    if (frame % 60 < 30) ship.thrustForward();
  }

  // Fire when aimed at target
  const fireAngle = isCoward ? 1.0 : 0.5; // Cowards fire at wider angles (rear weapons)
  if (Math.abs(diff) < fireAngle && d < 280) ship.fire();

  // Use special more strategically
  if (ship.energy > ship.def.special.cost && ship.specialCooldown <= 0) {
    if (ship.def.special.name === 'Fighters' && d < 200) ship.useSpecial();
    else if (ship.def.special.name === 'Teleport' && d < 50) ship.useSpecial();
    else if (ship.def.special.name === 'Marines' && d < 180) ship.useSpecial();
    else if (ship.def.special.name === 'Regenerate' && ship.crew < ship.def.maxCrew * 0.5) ship.useSpecial();
    else if (ship.def.special.name === 'Drone' && ship.drones.length < 3) ship.useSpecial();
    else if (ship.def.special.name === 'Confusion' && d < 150) ship.useSpecial();
    else if (ship.def.special.name === 'Fireblade' && d < 120) ship.useSpecial();
    else if (ship.def.special.name === 'Cloak' && ship.shieldTimer <= 0) ship.useSpecial();
    else if (ship.def.special.name === 'Limpet' && d < 200) ship.useSpecial();
    else if (ship.def.special.name === 'Absorb' && d < 150 && ship.shieldTimer <= 0) ship.useSpecial();
    else if (ship.def.special.name === 'Furnace' && ship.energy < 30 && ship.crew > 3) ship.useSpecial();
    else if (ship.def.special.name === 'Siren' && d < 150) ship.useSpecial();
    else if (ship.def.special.name === 'Glory' && d < 60 && ship.crew <= 2) ship.useSpecial();
    else if (ship.def.special.name === 'BUTT' && d < 200) ship.useSpecial();
    else if (ship.def.special.name === 'Reverse' && d < 60) ship.useSpecial();
    else if (d < 80) ship.useSpecial();
  }

  // Avoid planet
  if (combatPlanet) {
    const pd = dist(ship.x, ship.y, combatPlanet.x, combatPlanet.y);
    if (pd < PLANET_RADIUS + 30) ship.thrustForward();
  }
}

// ==================== STAR MAP GENERATION ====================
const STAR_COLORS = [
  { name: 'Yellow', fill: '#ffdd44', glow: '#ffee88' },
  { name: 'Red', fill: '#ff6644', glow: '#ff9977' },
  { name: 'Blue', fill: '#4488ff', glow: '#88bbff' },

  { name: 'Orange', fill: '#ff8833', glow: '#ffaa66' },
];

function generateStarMap() {
  starMap = [];
  const used = new Set();
  // Home star at center
  starMap.push({
    x: 0, y: 0, name: 'Sol', color: STAR_COLORS[0], type: 'home',
    planets: [
      { name: 'Mercury', type: 'Rocky', minerals: 25, fuel: 0, scanned: false, color: '#aa8866', radius: 8 },
      { name: 'Venus', type: 'Toxic', minerals: 15, fuel: 5, scanned: false, color: '#ccaa44', radius: 12 },
      { name: 'Earth', type: 'Water', minerals: 0, fuel: 50, scanned: true, color: '#4488ff', radius: 13 },
      { name: 'Mars', type: 'Desert', minerals: 20, fuel: 5, scanned: false, color: '#cc6633', radius: 10 },
      { name: 'Jupiter', type: 'Gas Giant', minerals: 5, fuel: 60, scanned: false, color: '#cc8844', radius: 24 },
      { name: 'Saturn', type: 'Gas Giant', minerals: 5, fuel: 45, scanned: false, color: '#ddbb66', radius: 22 },
      { name: 'Uranus', type: 'Ice', minerals: 10, fuel: 20, scanned: false, color: '#88ccdd', radius: 16 },
      { name: 'Neptune', type: 'Ice', minerals: 10, fuel: 20, scanned: false, color: '#4466cc', radius: 16 },
      { name: 'Pluto', type: 'Rocky', minerals: 30, fuel: 2, scanned: false, color: '#999999', radius: 6 },
    ],
    alien: null, territory: null, artifact: false, visited: true,
  });
  // === SC2-style territory regions — each race owns a cluster of stars ===
  const territories = [
    { race: 'urquan',    cx: -500, cy: -400, label: 'Ur-Quan Space' },
    { race: 'spathi',    cx:  500, cy: -300, label: 'Spathi Space' },
    { race: 'chmmr',     cx:  200, cy:  500, label: 'Chmmr Space' },
    { race: 'zoqfotpik', cx: -400, cy:  300, label: 'ZFP Space' },
    { race: 'mycon',     cx:  600, cy:  400, label: 'Mycon Space' },
    { race: 'pkunk',     cx: -600, cy:  100, label: 'Pkunk Space' },
    { race: 'melnorme',  cx:    0, cy: -600, label: 'Melnorme Space' },
    { race: 'orz',       cx: -200, cy: -700, label: 'Orz Space' },
    { race: 'kohrah',    cx:  700, cy: -600, label: 'Kohr-Ah Space' },
    { race: 'yehat',     cx: -800, cy: -200, label: 'Yehat Space' },
    { race: 'supox',     cx:  400, cy:  700, label: 'Supox Space' },
    { race: 'utwig',     cx:  800, cy:  100, label: 'Utwig Space' },
    { race: 'thraddash', cx: -700, cy: -600, label: 'Thraddash Space' },
    { race: 'ilwrath',   cx: -900, cy:  400, label: 'Ilwrath Space' },
    { race: 'umgah',     cx:  300, cy: -800, label: 'Umgah Space' },
    { race: 'vux',       cx:  900, cy: -200, label: 'VUX Space' },
    { race: 'arilou',    cx: -300, cy:  700, label: 'Arilou Space' },
    { race: 'druuge',    cx:  800, cy:  700, label: 'Druuge Space' },
    { race: 'syreen',    cx: -600, cy:  600, label: 'Syreen Space' },
    { race: 'shofixti',  cx: -100, cy:  900, label: 'Shofixti Space' },
  ];

  const constellations = [
    'Centauri','Draconis','Hyades','Lyncis','Cygni','Vulpeculae','Corvi','Serpentis',
    'Pavonis','Aquarii','Tucanae','Orionis','Gruis','Tauri','Crucis','Ophiuchi',
    'Librae','Persei','Andromedae','Lyrae','Normae','Indi','Mensae','Fornacis',
  ];
  const greekNames = ['Alpha','Beta','Gamma','Delta','Epsilon','Zeta','Eta','Theta',
    'Iota','Kappa','Lambda','Mu','Nu','Xi','Omicron','Rho','Sigma','Tau','Upsilon','Phi','Chi','Psi','Omega','Vega'];

  const planetTypes = [
    { type: 'Rocky', colors: ['#aa8866','#cc9955','#997744'], minR: 8, maxR: 14 },
    { type: 'Gas Giant', colors: ['#cc8844','#ddaa66','#bb7733'], minR: 18, maxR: 26 },
    { type: 'Water', colors: ['#4488cc','#3377aa','#5599dd'], minR: 10, maxR: 16 },
    { type: 'Jungle', colors: ['#44aa44','#66bb55','#338833'], minR: 10, maxR: 16 },
    { type: 'Ice', colors: ['#99bbdd','#aaccee','#88aacc'], minR: 8, maxR: 14 },
    { type: 'Volcanic', colors: ['#cc4422','#dd5533','#aa3311'], minR: 8, maxR: 14 },
    { type: 'Desert', colors: ['#ccaa44','#ddbb55','#bbaa33'], minR: 9, maxR: 15 },
    { type: 'Toxic', colors: ['#88aa22','#99bb33','#77aa11'], minR: 9, maxR: 13 },
    { type: 'Rainbow', colors: ['#ff4488','#44ff88','#4488ff','#ffcc44','#ff8844','#cc44ff'], minR: 12, maxR: 18 },
  ];
  const romanNums = ['I','II','III','IV','V','VI','VII','VIII'];

  function makePlanets(starName, count) {
    const plnts = [];
    for (let j = 0; j < count; j++) {
      // Rainbow worlds are rare (~3% chance)
      let pt;
      if (Math.random() < 0.03) {
        pt = planetTypes[planetTypes.length - 1]; // Rainbow
      } else {
        pt = planetTypes[Math.floor(Math.random() * (planetTypes.length - 1))];
      }
      const pColor = pt.colors[Math.floor(Math.random() * pt.colors.length)];
      const isGas = pt.type === 'Gas Giant';
      const isRainbow = pt.type === 'Rainbow';
      // SC2: each planet has mineral deposits on its surface
      const depositCount = isGas ? 0 : isRainbow ? 25 : Math.floor(5 + Math.random() * 15);
      const deposits = [];
      // Richer planets get rarer minerals
      const richness = isRainbow ? 10 : pt.type === 'Volcanic' ? 3 : pt.type === 'Rocky' ? 2 : pt.type === 'Desert' ? 1.5 : 1;
      for (let d = 0; d < depositCount; d++) {
        // Weighted mineral type based on richness
        let typeIdx = Math.floor(Math.random() * Math.min(MINERAL_TYPES.length, 3 + richness * 2));
        // Rare chance for exotic
        if (Math.random() < 0.02 * richness) typeIdx = 7;
        deposits.push({
          x: Math.random() * 600 + 20,
          y: 0, // set during lander init based on terrain
          type: typeIdx, collected: false,
        });
      }
      // Hazard level based on planet type
      const hazard = isRainbow ? 0 : pt.type === 'Volcanic' ? 3 : pt.type === 'Toxic' ? 2 :
        pt.type === 'Desert' ? 1 : pt.type === 'Ice' ? 1 : 0;
      // Bio life
      const bioCount = pt.type === 'Jungle' ? Math.floor(3 + Math.random() * 5) :
        pt.type === 'Water' ? Math.floor(2 + Math.random() * 3) :
        pt.type === 'Toxic' ? Math.floor(1 + Math.random() * 2) : 0;
      plnts.push({
        name: `${starName} ${romanNums[j]}`,
        type: pt.type, color: pColor,
        radius: pt.minR + Math.floor(Math.random() * (pt.maxR - pt.minR)),
        landable: !isGas || isRainbow,
        deposits: deposits,
        hazard: hazard,
        bioCount: bioCount,
        scanned: false,
        totalValue: deposits.reduce((s, d) => s + MINERAL_TYPES[d.type].value, 0),
      });
    }
    return plnts;
  }

  let starIdx = 0;
  // Generate 8 stars per territory + many neutral stars for a bigger galaxy (SC2 had 500+)
  for (let ti = 0; ti < territories.length; ti++) {
    const t = territories[ti];
    const constel = constellations[ti];
    for (let si = 0; si < 8; si++) {
      // Cluster stars around territory center with some spread
      const angle = (si / 4) * TAU + Math.random() * 0.8;
      const radius = 80 + Math.random() * 120;
      const x = t.cx + Math.cos(angle) * radius;
      const y = t.cy + Math.sin(angle) * radius;
      const col = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
      const sName = `${greekNames[starIdx % greekNames.length]} ${constel}`;
      const numPlanets = 3 + Math.floor(Math.random() * 6);
      // First star of first 3 territories gets an artifact (urquan, spathi, mycon)
      const hasArtifact = (si === 0 && (ti === 0 || ti === 4 || ti === 7));
      starMap.push({
        x, y, name: sName, color: col, type: 'normal',
        planets: makePlanets(greekNames[starIdx % greekNames.length], numPlanets),
        alien: si < 3 ? t.race : null, // First 3 stars per territory have alien encounters
        territory: t.race,
        artifact: hasArtifact, visited: false,
      });
      starIdx++;
    }
  }
  // Add 350 neutral/unowned stars scattered across the map (SC2 had 500+ total)
  for (let ni = 0; ni < 350; ni++) {
    let x, y, attempts = 0;
    do {
      x = (Math.random() - 0.5) * MAP_SIZE;
      y = (Math.random() - 0.5) * MAP_SIZE;
      attempts++;
    } while (attempts < 50 && starMap.some(s => dist(s.x, s.y, x, y) < 35));
    const col = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
    const sName = `${greekNames[(starIdx + ni) % greekNames.length]} ${constellations[(ni) % constellations.length]}`;
    starMap.push({
      x, y, name: sName, color: col, type: 'normal',
      planets: makePlanets(greekNames[(starIdx + ni) % greekNames.length], 2 + Math.floor(Math.random() * 6)),
      alien: null, territory: null,
      artifact: false, visited: false,
    });
  }
}

// ==================== INIT FUNCTIONS ====================
function initGame() {
  fuel = 100; minerals = 50; crew = 20; maxCrew = 20;
  artifacts = 0; modules = [];
  fleet = ['player']; // Start with just your flagship
  fleetCursor = 0;
  visitedStars = new Set([0]);
  defeatedAliens = new Set();
  currentStarIdx = 0;
  questFlags = { visited_starbase: false, allies_found: 0 };
  generateStarMap();
  // HyperSpace — player starts at Sol
  hyperX = 0; hyperY = 0; hyperVX = 0; hyperVY = 0;
  hyperAngle = -Math.PI / 2; hyperDest = null;
  hyperEncounterTimer = 0;
  inQuasiSpace = false;
  quasiX = 0; quasiY = 0; quasiVX = 0; quasiVY = 0; quasiAngle = 0;
  mapCamX = 0; mapCamY = 0;
  selectedStar = null;
  gameMessage = null; messageTimer = 0;
  particles = [];
  gameClock = 0; // SC2: time ticks in HyperSpace
  deathMarchWarning = 0; // escalating warnings
}

// SC2 game time (Kohr-Ah Death March — time pressure)
let gameClock = 0;
let deathMarchWarning = 0;
const DEATH_MARCH_TIME = 36000; // ~10 minutes at 60fps of HyperSpace travel

function saveGame() {
  try {
    const save = {
      fuel, minerals, crew, maxCrew, artifacts, modules,
      fleet: [...fleet],
      visitedStars: [...visitedStars],
      defeatedAliens: [...defeatedAliens],
      currentStarIdx, questFlags: { ...questFlags },
      hyperX, hyperY, hyperAngle,
      inQuasiSpace, quasiX, quasiY, quasiAngle,
      gameClock, deathMarchWarning, mapZoom,
      starMap: starMap.map(s => ({
        ...s,
        planets: s.planets.map(p => ({
          ...p,
          deposits: p.deposits ? p.deposits.map(d => ({ ...d })) : [],
        })),
      })),
    };
    localStorage.setItem('sc2_save', JSON.stringify(save));
    return true;
  } catch (e) { console.error('Save failed:', e); return false; }
}

function loadGame() {
  try {
    const raw = localStorage.getItem('sc2_save');
    if (!raw) return false;
    const save = JSON.parse(raw);
    fuel = save.fuel; minerals = save.minerals;
    crew = save.crew; maxCrew = save.maxCrew;
    artifacts = save.artifacts; modules = save.modules;
    fleet = save.fleet;
    visitedStars = new Set(save.visitedStars);
    defeatedAliens = new Set(save.defeatedAliens);
    currentStarIdx = save.currentStarIdx;
    hyperX = save.hyperX; hyperY = save.hyperY;
    hyperAngle = save.hyperAngle;
    hyperVX = 0; hyperVY = 0; hyperDest = null;
    hyperEncounterTimer = 0;
    inQuasiSpace = save.inQuasiSpace || false;
    quasiX = save.quasiX || 0; quasiY = save.quasiY || 0;
    quasiAngle = save.quasiAngle || 0;
    quasiVX = 0; quasiVY = 0;
    gameClock = save.gameClock || 0;
    deathMarchWarning = save.deathMarchWarning || 0;
    mapZoom = save.mapZoom || 0.2;
    questFlags = save.questFlags || {};
    starMap = save.starMap;
    mapCamX = hyperX; mapCamY = hyperY;
    selectedStar = null;
    gameMessage = 'Game loaded!'; messageTimer = 90;
    particles = [];
    state = 'map';
    return true;
  } catch (e) { console.error('Load failed:', e); return false; }
}

function getModuleStat(stat) {
  return modules.reduce((sum, m) => {
    const def = MODULE_DEFS.find(d => d.name === m);
    return def && def.stat === stat ? sum + def.val : sum;
  }, 0);
}

  const turnBonus = getModuleStat('turn');
  const firerateMult = modules.some(m => MODULE_DEFS.find(d => d.name === m && d.stat === 'firerate')) ? getModuleStat('firerate') : 1;
  playerShip = new Ship('player', -120, 0, 0, true);
  playerShip.crew = Math.min(crew, pDef.maxCrew + crewBonus);
  playerShip.def = {
    ...pDef,
    maxCrew: pDef.maxCrew + crewBonus,
    thrust: pDef.thrust + thrustBonus,
    maxSpeed: pDef.maxSpeed + speedBonus,
    turnSpeed: pDef.turnSpeed + turnBonus,
    weapon: { ...pDef.weapon, damage: pDef.weapon.damage + weaponBonus, cooldown: Math.floor(pDef.weapon.cooldown * firerateMult) },
    draw: pDef.draw, special: pDef.special,
  };
  playerShip.hasPointDef = getModuleStat('pointdef') > 0;
  playerShip.energyRechargeBonus = getModuleStat('energy');

  // SC2: VUX warp-in — starts right next to the player!
  const vuxWarp = enemyType === 'vux';
  const enemyStartX = vuxWarp ? -80 : 120;
  enemyShip = new Ship(enemyType, enemyStartX, vuxWarp ? 20 : 0, Math.PI, false);
  projectiles = []; particles = [];
  combatPlanet = { x: 0, y: 0, radius: PLANET_RADIUS };
  window._combatZoom = 0.5;
  window._pdLasers = [];
  // SC2 combat asteroids — random debris floating in the arena
  window._asteroids = [];
  const numAsteroids = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < numAsteroids; i++) {
    window._asteroids.push({
      x: (Math.random() - 0.5) * 600,
      y: (Math.random() - 0.5) * 600,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      size: 3 + Math.random() * 5,
      rot: Math.random() * TAU,
      rotSpeed: (Math.random() - 0.5) * 0.03,
      color: ['#887766','#666655','#998877','#554433'][Math.floor(Math.random() * 4)]
    });
  }
}

function drawStarField(ox, oy, density, hyperspace) {
  // SC2-style starfield with colorful stars
  const starColors = ['#ffffff','#ffccaa','#aaccff','#ffff88','#ff8888','#88ff88','#88ccff','#ffaaff'];
  for (let i = 0; i < (density || 60); i++) {
    const seed = i * 7919;
    const sx = ((seed * 13 + 4729) % (W * 4)) - ox * 0.03;
    const sy = ((seed * 17 + 6271) % (H * 4)) - oy * 0.03;
    const bx = ((sx % (W * 4)) + W * 4) % (W * 4);
    const by = ((sy % (H * 4)) + H * 4) % (H * 4);
    if (bx < W && by < H) {
      const b = (seed % 100) / 100;
      const twinkle = Math.sin(frame * 0.05 + seed) * 0.2 + 0.8;
      ctx.globalAlpha = (0.4 + b * 0.6) * twinkle;
      ctx.fillStyle = starColors[seed % starColors.length];
      const sz = b > 0.92 ? 2 : 1;
      ctx.fillRect(Math.floor(bx), Math.floor(by), sz, sz);
      // Bright stars get a cross sparkle
      if (b > 0.95 && twinkle > 0.9) {
        ctx.globalAlpha *= 0.4;
        ctx.fillRect(Math.floor(bx) - 1, Math.floor(by), 3, 1);
        ctx.fillRect(Math.floor(bx), Math.floor(by) - 1, 1, 3);
      }
    }
  }
  ctx.globalAlpha = 1;
  // HyperSpace green grid overlay for star map
  if (hyperspace) {
    ctx.strokeStyle = 'rgba(0,180,0,0.12)';
    ctx.lineWidth = 1;
    const gridSize = 60;
    const gox = (-ox % gridSize + gridSize) % gridSize;
    const goy = (-oy % gridSize + gridSize) % gridSize;
    for (let x = gox; x < W; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = goy; y < H; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    // Brighter grid intersection dots
    ctx.fillStyle = 'rgba(0,220,0,0.2)';
    for (let x = gox; x < W; x += gridSize) {
      for (let y = goy; y < H; y += gridSize) {
        ctx.fillRect(x - 1, y - 1, 2, 2);
      }
    }
  }
}

    ctx.fillStyle = '#dd9966';
    ctx.beginPath(); ctx.moveTo(x + 18, y + 18); ctx.lineTo(x + 12, y + 6); ctx.lineTo(x + 22, y + 16); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 46, y + 18); ctx.lineTo(x + 52, y + 6); ctx.lineTo(x + 42, y + 16); ctx.fill();
    // Furry round head
    ctx.fillStyle = '#886633';
    ctx.beginPath(); ctx.arc(x + 32, y + 28, 14, 0, TAU); ctx.fill();
    ctx.fillStyle = '#aa8844';
    ctx.beginPath(); ctx.arc(x + 32, y + 26, 11, 0, TAU); ctx.fill();
    // Lighter face patch
    ctx.fillStyle = '#ccaa66';
    ctx.beginPath(); ctx.ellipse(x + 32, y + 26, 8, 9, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ddbb77';
    ctx.beginPath(); ctx.ellipse(x + 32, y + 25, 6, 7, 0, 0, TAU); ctx.fill();
    // Red warrior headband (iconic)
    ctx.fillStyle = '#dd2200'; ctx.fillRect(x + 18, y + 18, 28, 3);
    ctx.fillStyle = '#ff3300'; ctx.fillRect(x + 18, y + 19, 28, 1);
    // Headband tails
    ctx.fillStyle = '#dd2200';
    ctx.beginPath(); ctx.moveTo(x + 46, y + 18); ctx.lineTo(x + 56, y + 14); ctx.lineTo(x + 54, y + 20); ctx.lineTo(x + 46, y + 21); ctx.fill();
    // Determined dark eyes
    ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(x + 27, y + 24, 3, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 37, y + 24, 3, 0, TAU); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillRect(x + 26, y + 23, 1, 1); ctx.fillRect(x + 36, y + 23, 1, 1);
    // Small black nose
    ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(x + 32, y + 28, 2, 0, TAU); ctx.fill();
    // Determined grin
    ctx.fillStyle = '#775522';
    ctx.beginPath(); ctx.arc(x + 32, y + 32, 4, 0.2, Math.PI - 0.2); ctx.fill();
    // Whiskers
