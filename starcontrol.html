    ctx.fillRect(x + 14, y + 28, 10, 1); ctx.fillRect(x + 40, y + 28, 10, 1);
    ctx.fillRect(x + 16, y + 30, 8, 1); ctx.fillRect(x + 40, y + 30, 8, 1);
    // Small body
    ctx.fillStyle = '#aa8844'; ctx.fillRect(x + 26, y + 42, 12, 16);
    ctx.fillStyle = '#ccaa66'; ctx.fillRect(x + 28, y + 44, 8, 12);
  }
}

// ==================== SCREEN: TITLE ====================
function drawTitle() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  // === SC2 Title: Deep space with slowly rotating star system ===
  // Distant stars (denser than normal, multi-colored like SC2 intro)
  for (let i = 0; i < 120; i++) {
    const sx = (i * 137.5 + frame * 0.05) % W;
    const sy = (i * 91.3 + Math.sin(i * 0.3) * 40) % H;
    const brightness = 0.3 + Math.sin(frame * 0.01 + i) * 0.2;
    ctx.globalAlpha = brightness;
    const colors = ['#ffffff', '#aaccff', '#ffccaa', '#ffff88', '#ffaaaa'];
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(sx, sy, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Large spinning planet (SC2's Earth or alien world)
  const plX = W/2, plY = H/2 + 30;
  const plR = 50;
  // Atmospheric glow
  ctx.globalAlpha = 0.04; ctx.fillStyle = '#4488ff';
  ctx.beginPath(); ctx.arc(plX, plY, plR + 25, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.08;
  ctx.beginPath(); ctx.arc(plX, plY, plR + 15, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.15;
  ctx.beginPath(); ctx.arc(plX, plY, plR + 6, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  // Planet body
  ctx.fillStyle = '#0a2244';
  ctx.beginPath(); ctx.arc(plX, plY, plR, 0, TAU); ctx.fill();
  ctx.fillStyle = '#1a3366';
  ctx.beginPath(); ctx.arc(plX, plY, plR - 1, 0, TAU); ctx.fill();
  // Rotating surface (continents + oceans)
  ctx.save(); ctx.beginPath(); ctx.arc(plX, plY, plR - 1, 0, TAU); ctx.clip();
  const pRot = frame * 0.004;
  ctx.fillStyle = '#225522'; ctx.globalAlpha = 0.5;
  for (let c = 0; c < 8; c++) {
    const ca = pRot + c * 0.9;
    const cr = 8 + (c % 3) * 5;
    ctx.beginPath(); ctx.arc(plX + Math.cos(ca) * 24, plY + Math.sin(c * 1.7) * 16, cr, 0, TAU); ctx.fill();
  }
  // Ice caps
  ctx.globalAlpha = 0.4; ctx.fillStyle = '#bbddff';
  ctx.fillRect(plX - 20, plY - plR + 2, 40, 6);
  ctx.fillRect(plX - 16, plY + plR - 8, 32, 6);
  // Cloud wisps
  ctx.globalAlpha = 0.2; ctx.fillStyle = '#fff';
  for (let c = 0; c < 4; c++) {
    const ca = pRot * 1.2 + c * 1.5;
    ctx.fillRect(plX + Math.cos(ca) * 20 - 10, plY - 15 + c * 10, 20, 2);
  }
  ctx.globalAlpha = 1; ctx.restore();
  // Shadow (SC2 had strong terminator shadow)
  ctx.globalAlpha = 0.5; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(plX + 18, plY + 14, plR + 2, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;

  // Orbiting ships around planet (SC2 intro had ships in orbit)
  const orbitShips = ['player', 'urquan', 'spathi', 'chmmr', 'yehat'];
  for (let si = 0; si < orbitShips.length; si++) {
    const def = SHIP_TYPES[orbitShips[si]];
    const oa = frame * (0.008 + si * 0.003) + si * TAU / orbitShips.length;
    const orR = plR + 20 + si * 12;
    const sx = plX + Math.cos(oa) * orR;
    const sy = plY + Math.sin(oa) * orR * 0.35;
    // Only draw if in front of planet (simple z-sort)
    if (Math.sin(oa) > -0.3) {
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(oa + Math.PI/2); ctx.scale(0.4, 0.4);
      def.draw({ flash: 0, thrusting: true, def, shieldTimer: 0 }); ctx.restore();
    }
  }

  ctx.textAlign = 'center';

  // === SC2 Title Block ===
  // Dark backdrop for title
  ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(W/2 - 130, 20, 260, 80);
  // Red top line
  ctx.fillStyle = '#cc0000'; ctx.fillRect(W/2 - 130, 20, 260, 2);
  // Blue bottom line
  ctx.fillStyle = '#0000cc'; ctx.fillRect(W/2 - 130, 98, 260, 2);

  // "STAR" in red (SC2's two-tone title)
  ctx.fillStyle = '#440000'; ctx.font = 'bold 28px monospace';
  ctx.fillText('STAR', W/2 - 48 + 1, 52 + 1);
  ctx.fillStyle = '#dd0000';
  ctx.fillText('STAR', W/2 - 48, 52);
  // "CONTROL" in blue
  ctx.fillStyle = '#000044'; ctx.font = 'bold 28px monospace';
  ctx.fillText('CONTROL', W/2 + 30 + 1, 52 + 1);
  ctx.fillStyle = '#4444dd';
  ctx.fillText('CONTROL', W/2 + 30, 52);
  // "II" in gold
  ctx.fillStyle = '#886600'; ctx.font = 'bold 18px monospace';
  ctx.fillText('II', W/2 + 1, 72 + 1);
  ctx.fillStyle = '#ffcc44';
  ctx.fillText('II', W/2, 72);

  // Subtitle — SC2 style
  ctx.fillStyle = '#6688aa'; ctx.font = 'bold 9px monospace';
  ctx.fillText('THE VOID BEYOND', W/2, 88);

  // Red/blue divider line (SC2's iconic split)
  ctx.fillStyle = '#cc0000'; ctx.fillRect(W/2 - 130, 92, 130, 2);
  ctx.fillStyle = '#0000cc'; ctx.fillRect(W/2, 92, 130, 2);

  // Story text
  ctx.fillStyle = '#88aacc'; ctx.font = '8px monospace';
  ctx.fillText('The Sa-Matra is destroyed.', W/2, 115);
  ctx.fillText('But its explosion tore a rift between dimensions...', W/2, 127);

  // Controls
  ctx.fillStyle = '#445566'; ctx.font = '7px monospace';
  ctx.fillText('ARROWS move   Z shoot   X special   SPACE interact', W/2, H - 14);

  // Blinking start
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace';
  if (Math.floor(Date.now() / 500) % 2) ctx.fillText('PRESS ANY KEY TO START', W/2, H - 3);
  ctx.textAlign = 'left';
}

// ==================== SCREEN: STAR MAP ====================
function updateQuasiSpace() {
  // QuasiSpace flight — similar to HyperSpace but in the green dimension
  const turnRate = 0.06;
  const thrustPower = 0.5;
  const maxSpeed = 5;
  const drag = 0.97;

  if (keys['ArrowLeft'] || keys['KeyA']) quasiAngle -= turnRate;
  if (keys['ArrowRight'] || keys['KeyD']) quasiAngle += turnRate;
  if (keys['ArrowUp'] || keys['KeyW']) {
    quasiVX += Math.cos(quasiAngle) * thrustPower;
    quasiVY += Math.sin(quasiAngle) * thrustPower;
  }
  if (keys['ArrowDown'] || keys['KeyS']) {
    quasiVX *= 0.92; quasiVY *= 0.92;
  }
  const spd = Math.hypot(quasiVX, quasiVY);
  if (spd > maxSpeed) {
    quasiVX = quasiVX / spd * maxSpeed;
    quasiVY = quasiVY / spd * maxSpeed;
  }
  quasiX += quasiVX; quasiY += quasiVY;
  quasiVX *= drag; quasiVY *= drag;
  // No fuel cost in QuasiSpace (SC2 authentic)

  // Check portal proximity
  let nearestPortal = null, nearestDist = Infinity;
  for (let i = 0; i < QUASI_PORTALS.length; i++) {
    const p = QUASI_PORTALS[i];
    const d = dist(quasiX, quasiY, p.qx, p.qy);
    if (d < nearestDist) { nearestDist = d; nearestPortal = i; }
  }

  // Enter portal
  if ((justPressed['Space'] || justPressed['Enter']) && nearestPortal !== null && nearestDist < 25) {
    const p = QUASI_PORTALS[nearestPortal];
    inQuasiSpace = false;
    hyperX = p.hx; hyperY = p.hy;
    hyperVX = 0; hyperVY = 0;
    mapCamX = hyperX; mapCamY = hyperY;
    gameMessage = `Exited to ${p.label}`;
    messageTimer = 120;
    sfx.warp();
  }
}

function updateMap() {
  // === QuasiSpace mode ===
  if (inQuasiSpace) {
    updateQuasiSpace();
    return;
  }

  // === SC2-style HyperSpace flight ===
  // Player flies the ship with arrow keys, burns fuel while moving
  const turnRate = 0.06;
  const thrustPower = 0.4;
  const maxHyperSpeed = 6;
  const drag = 0.98;

  if (keys['ArrowLeft'] || keys['KeyA']) hyperAngle -= turnRate;
  if (keys['ArrowRight'] || keys['KeyD']) hyperAngle += turnRate;
  if (keys['ArrowUp'] || keys['KeyW']) {
    hyperVX += Math.cos(hyperAngle) * thrustPower;
    hyperVY += Math.sin(hyperAngle) * thrustPower;
  }
  // Brake
  if (keys['ArrowDown'] || keys['KeyS']) {
    hyperVX *= 0.92; hyperVY *= 0.92;
  }

  // Speed limit
  const spd = Math.hypot(hyperVX, hyperVY);
  if (spd > maxHyperSpeed) {
    hyperVX = hyperVX / spd * maxHyperSpeed;
    hyperVY = hyperVY / spd * maxHyperSpeed;
  }

  // Apply velocity
  hyperX += hyperVX;
  hyperY += hyperVY;
  hyperVX *= drag; hyperVY *= drag;

  // Burn fuel while moving (1 fuel per ~60 frames of movement)
  if (spd > 0.5) {
    if (frame % 60 === 0 && fuel > 0) fuel--;
    if (fuel <= 0) {
      hyperVX *= 0.9; hyperVY *= 0.9; // slow down when out of fuel
    }
  }

  // Camera follows ship
  mapCamX = hyperX;
  mapCamY = hyperY;

  // === Map zoom controls (+ / - or PageUp/PageDown) ===
  if (justPressed['Equal'] || justPressed['NumpadAdd'] || justPressed['PageUp']) {
    mapZoom = Math.min(0.6, mapZoom + 0.05);
  }
  if (justPressed['Minus'] || justPressed['NumpadSubtract'] || justPressed['PageDown']) {
    mapZoom = Math.max(0.08, mapZoom - 0.05);
  }

  // === SC2 Game Clock / Kohr-Ah Death March ===
  gameClock++;
  const marchPct = gameClock / DEATH_MARCH_TIME;
  if (marchPct > 0.5 && deathMarchWarning === 0) {
    deathMarchWarning = 1;
    gameMessage = 'WARNING: The Kohr-Ah Death March has begun! Find the Seals!';
    messageTimer = 180;
  } else if (marchPct > 0.75 && deathMarchWarning === 1) {
    deathMarchWarning = 2;
    gameMessage = 'DANGER: Kohr-Ah are cleansing nearby star systems!';
    messageTimer = 180;
  } else if (marchPct > 0.9 && deathMarchWarning === 2) {
    deathMarchWarning = 3;
    gameMessage = 'CRITICAL: Kohr-Ah approaching Sol! Hurry!';
    messageTimer = 180;
  } else if (marchPct >= 1.0 && deathMarchWarning === 3) {
    deathMarchWarning = 4;
    // Game over — Kohr-Ah cleansed everything
    state = 'gameover';
    gameMessage = 'The Kohr-Ah Death March has cleansed all life...';
    messageTimer = 300;
    music.stop(); sfx.defeat();
    return;
  }
  // Increased random encounters as Death March progresses
  if (marchPct > 0.5 && Math.random() < 0.002 * marchPct) {
    hyperEncounterTimer = 0; // Force encounter check
  }

  // Find nearest star to player ship
  let best = null, bestD = Infinity;
  for (let i = 0; i < starMap.length; i++) {
    const d = dist(hyperX, hyperY, starMap[i].x, starMap[i].y);
    if (d < bestD) { bestD = d; best = i; }
  }
  if (bestD < 80) selectedStar = best;
  else selectedStar = null;

  // Enter star system when close enough
  if ((justPressed['Space'] || justPressed['Enter']) && selectedStar !== null && bestD < 40) {
    const s = starMap[selectedStar];
    currentStarIdx = selectedStar;
    s.visited = true;
    visitedStars.add(selectedStar);
    sfx.warp();
    if (s.alien && !defeatedAliens.has(selectedStar)) {
      state = 'dialogue';
      const greetText = getQuestGreeting(s.alien) || DIALOGUES[s.alien].greeting;
      dialogue = { race: s.alien, stage: 'greeting', text: greetText, starIdx: selectedStar };
      dialogueChoice = 0;
    } else {
      if (selectedStar === 0) { state = 'starbase'; starbaseCursor = 0; starbaseMsg = null; music.play('starbase'); }
      else { state = 'orbit'; orbitCursor = 0; scanTimer = 0; music.play('orbit'); }
    }
  }

  // === Autopilot toward selected star (SC2: set destination) ===
  if (selectedStar !== null && (keys['KeyA'] || keys['KeyZ'])) {
    const target = starMap[selectedStar];
    const dx = target.x - hyperX, dy = target.y - hyperY;
    const targetAngle = Math.atan2(dy, dx);
    // Smoothly turn toward target
    let angleDiff = targetAngle - hyperAngle;
    while (angleDiff > Math.PI) angleDiff -= TAU;
    while (angleDiff < -Math.PI) angleDiff += TAU;
    hyperAngle += Math.sign(angleDiff) * Math.min(Math.abs(angleDiff), 0.06);
    // Thrust if roughly facing target
    if (Math.abs(angleDiff) < 0.5) {
      hyperVX += Math.cos(hyperAngle) * thrustPower;
      hyperVY += Math.sin(hyperAngle) * thrustPower;
    }
  }

  // === QuasiSpace Portal Spawner (Q key) ===
  if (justPressed['KeyQ'] && getModuleStat('quasi') > 0) {
    inQuasiSpace = true;
    quasiX = 0; quasiY = 0; quasiVX = 0; quasiVY = 0;
    quasiAngle = -Math.PI / 2;
    gameMessage = 'QuasiSpace portal opened!';
    messageTimer = 90;
    sfx.warp();
    return;
  }

  // === Random encounters in alien territory ===
  hyperEncounterTimer--;
  if (hyperEncounterTimer <= 0 && spd > 1) {
    hyperEncounterTimer = 180 + Math.floor(Math.random() * 300); // check every 3-8 seconds
    // Find which territory we're in
    let inTerritory = null;
    for (let i = 0; i < starMap.length; i++) {
      const s = starMap[i];
      if (s.territory && !defeatedAliens.has(i) && dist(hyperX, hyperY, s.x, s.y) < 200) {
        inTerritory = s.territory;
        break;
      }
    }
    if (inTerritory && Math.random() < 0.3) {
      // Random encounter!
      state = 'dialogue';
      dialogue = { race: inTerritory, stage: 'greeting', text: getQuestGreeting(inTerritory) || DIALOGUES[inTerritory].greeting, starIdx: -1 };
      dialogueChoice = 0;
      gameMessage = `${SHIP_TYPES[inTerritory].race} patrol intercepts you!`;
      messageTimer = 90;
    } else if (!inTerritory && Math.random() < 0.08) {
      // SC2: Melnorme traders appear in neutral/deep space
      state = 'dialogue';
      dialogue = { race: 'melnorme', stage: 'greeting', text: DIALOGUES.melnorme.greeting, starIdx: -1 };
      dialogueChoice = 0;
      gameMessage = 'A Melnorme trader approaches!';
      messageTimer = 90;
    }
  }
}

let mapZoom = 0.2; // adjustable zoom (SC2 had zoom in/out)

function returnToHyperSpace() {
  state = 'map';
  hyperX = starMap[currentStarIdx].x;
  hyperY = starMap[currentStarIdx].y;
  hyperVX = 0; hyperVY = 0;
  mapCamX = hyperX; mapCamY = hyperY;
}
function returnAfterDialogue() {
  // If encounter was in HyperSpace (starIdx === -1), return to map
  if (dialogue && dialogue.starIdx === -1) { returnToHyperSpace(); }
  else { state = 'orbit'; orbitCursor = 0; scanTimer = 0; music.play('orbit'); }
}

// HyperSpace trail particles
let hyperTrail = [];

function drawQuasiSpace() {
  const hudH = 40;
  const mapH = H - hudH;
  const spd = Math.hypot(quasiVX, quasiVY);

  // === SC2 QuasiSpace — eerie GREEN void ===
  ctx.fillStyle = '#001a00'; ctx.fillRect(0, 0, W, mapH);

  // Swirling green nebula clouds
  const t = frame * 0.008;
  for (let layer = 0; layer < 3; layer++) {
    const cloudAlpha = 0.08 - layer * 0.02;
    ctx.globalAlpha = cloudAlpha;
    for (let ci = 0; ci < 10; ci++) {
      const seed = ci * 137.5 + layer * 47;
      const cx = ((seed * 73.1 + Math.sin(t + ci) * 20) % W + W) % W;
      const cy = ((seed * 91.3 + Math.cos(t * 0.7 + ci) * 15) % mapH + mapH) % mapH;
      const cRadius = 30 + (seed % 50);
      ctx.fillStyle = layer === 0 ? '#004400' : layer === 1 ? '#003308' : '#002a04';
      ctx.beginPath(); ctx.arc(cx, cy, cRadius, 0, TAU); ctx.fill();
      ctx.fillStyle = layer === 0 ? '#006600' : '#004a08';
      ctx.beginPath(); ctx.arc(cx, cy, cRadius * 0.5, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Faint green grid
  const gridSz = 50;
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#004400'; ctx.lineWidth = 1;
  const gox = ((-quasiX * 0.8) % gridSz + gridSz) % gridSz;
  const goy = ((-quasiY * 0.8) % gridSz + gridSz) % gridSz;
  for (let gx = gox; gx < W; gx += gridSz) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, mapH); ctx.stroke(); }
  for (let gy = goy; gy < mapH; gy += gridSz) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
  ctx.globalAlpha = 1;

  // Green speed streaks
  if (spd > 0.5) {
    for (let i = 0; i < Math.min(3, spd); i++) {
      hyperTrail.push({
        x: Math.random() * W, y: Math.random() * mapH,
        len: 2 + spd * 2, life: 8 + Math.floor(Math.random() * 8),
        angle: quasiAngle + Math.PI,
        color: ['#44ff44', '#22cc22', '#66ff66', '#88ffaa'][Math.floor(Math.random() * 4)]
      });
    }
  }
  for (let i = hyperTrail.length - 1; i >= 0; i--) {
    const tr = hyperTrail[i];
    ctx.globalAlpha = tr.life / 16;
    ctx.strokeStyle = tr.color; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tr.x, tr.y);
    ctx.lineTo(tr.x + Math.cos(tr.angle) * tr.len, tr.y + Math.sin(tr.angle) * tr.len);
    ctx.stroke();
    tr.x += Math.cos(tr.angle) * 2;
    tr.y += Math.sin(tr.angle) * 2;
    tr.life--;
    if (tr.life <= 0) hyperTrail.splice(i, 1);
  }
  ctx.globalAlpha = 1;
  if (hyperTrail.length > 60) hyperTrail.splice(0, hyperTrail.length - 60);

  // === Draw portals (swirling green/cyan vortexes) ===
  const qzoom = 0.7;
  let nearestPortal = null, nearestDist = Infinity;
  for (let i = 0; i < QUASI_PORTALS.length; i++) {
    const p = QUASI_PORTALS[i];
    const px = W / 2 + (p.qx - quasiX) * qzoom;
    const py = mapH / 2 + (p.qy - quasiY) * qzoom;
    const d = dist(quasiX, quasiY, p.qx, p.qy);
    if (d < nearestDist) { nearestDist = d; nearestPortal = i; }
    if (px < -30 || px > W + 30 || py < -30 || py > mapH + 30) continue;

    // Portal glow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#00ff88';
    ctx.beginPath(); ctx.arc(px, py, 14, 0, TAU); ctx.fill();

    // Spinning portal rings
    ctx.globalAlpha = 0.7;
    ctx.strokeStyle = '#44ffaa'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, py, 8 + Math.sin(frame * 0.05 + i) * 2, 0, TAU);
    ctx.stroke();
    ctx.strokeStyle = '#00cc66'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(px, py, 12 + Math.cos(frame * 0.03 + i * 2) * 3, frame * 0.02 + i, frame * 0.02 + i + Math.PI * 1.3);
    ctx.stroke();

    // Bright center
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#aaffcc';
    ctx.beginPath(); ctx.arc(px, py, 3, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;

    // Portal label
    ctx.fillStyle = '#44ff88'; ctx.font = '6px monospace'; ctx.textAlign = 'center';
    ctx.fillText(p.label, px, py + 20);
    ctx.textAlign = 'left';

    // Selected portal cursor
    if (i === nearestPortal && d < 40) {
      const cr = 16, bLen = 5;
      ctx.strokeStyle = '#88ffcc'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px - cr, py - cr + bLen); ctx.lineTo(px - cr, py - cr); ctx.lineTo(px - cr + bLen, py - cr);
      ctx.moveTo(px + cr - bLen, py - cr); ctx.lineTo(px + cr, py - cr); ctx.lineTo(px + cr, py - cr + bLen);
      ctx.moveTo(px - cr, py + cr - bLen); ctx.lineTo(px - cr, py + cr); ctx.lineTo(px - cr + bLen, py + cr);
      ctx.moveTo(px + cr - bLen, py + cr); ctx.lineTo(px + cr, py + cr); ctx.lineTo(px + cr, py + cr - bLen);
      ctx.stroke();
    }
  }

  // Player ship
  const isThrusting = keys['ArrowUp'] || keys['KeyW'];
  ctx.save();
  ctx.translate(W / 2, mapH / 2);
  ctx.rotate(quasiAngle + Math.PI / 2);
  ctx.scale(0.5, 0.5);
  SHIP_TYPES.player.draw({ flash: 0, thrusting: isThrusting, def: SHIP_TYPES.player, shieldTimer: 0 });
  ctx.restore();

  // Thruster
  if (isThrusting) {
    ctx.globalAlpha = 0.4 + Math.random() * 0.3;
    ctx.fillStyle = '#44ff88';
    const fx = W / 2 - Math.cos(quasiAngle) * 8;
    const fy = mapH / 2 - Math.sin(quasiAngle) * 8;
    ctx.beginPath(); ctx.arc(fx, fy, 3 + Math.random() * 2, 0, TAU); ctx.fill();
    ctx.fillStyle = '#aaffcc';
    ctx.beginPath(); ctx.arc(fx, fy, 2, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === QuasiSpace HUD ===
  ctx.fillStyle = '#0a120a'; ctx.fillRect(0, mapH, W, hudH);
  ctx.fillStyle = '#228844'; ctx.fillRect(0, mapH, W, 2);
  ctx.fillStyle = '#114422'; ctx.fillRect(0, mapH + 2, W, 1);

  // Title
  ctx.fillStyle = '#44ff88'; ctx.font = 'bold 8px monospace';
  ctx.fillText('QUASISPACE', 4, mapH + 13);

  // Position
  ctx.fillStyle = '#44aa66'; ctx.font = '7px monospace';
  ctx.fillText(`POS ${Math.floor(quasiX)},${Math.floor(quasiY)}`, 4, mapH + 25);
  ctx.fillText(`VEL ${spd.toFixed(1)}`, 4, mapH + 35);

  // Portal info
  if (nearestPortal !== null && nearestDist < 40) {
    const p = QUASI_PORTALS[nearestPortal];
    ctx.fillStyle = '#88ffaa'; ctx.font = '8px monospace';
    ctx.fillText(`► ${p.label}`, 120, mapH + 13);
    ctx.fillStyle = '#44aa66'; ctx.font = '7px monospace';
    ctx.fillText(`DIST ${Math.floor(nearestDist)}`, 120, mapH + 25);
    if (nearestDist < 25 && Math.floor(frame / 15) % 2) {
      ctx.fillStyle = '#88ffcc'; ctx.font = '8px monospace';
      ctx.fillText('ENTER to warp', 120, mapH + 35);
    }
  }

  // Fuel/crew/minerals on right side
  ctx.fillStyle = '#44aa66'; ctx.font = '7px monospace';
  ctx.fillText('FUEL', 220, mapH + 13);
  ctx.fillStyle = '#44ff88'; ctx.fillText(fuel.toString(), 248, mapH + 13);
  ctx.fillStyle = '#44aa66'; ctx.fillText('CREW', 220, mapH + 25);
  ctx.fillStyle = '#44ff88'; ctx.fillText(`${crew}/${maxCrew}`, 248, mapH + 25);
  ctx.fillStyle = '#44aa66'; ctx.fillText('RU', 220, mapH + 35);
  ctx.fillStyle = '#ffcc44'; ctx.fillText(minerals.toString(), 236, mapH + 35);

  // Game message overlay
  if (messageTimer > 0) {
    ctx.fillStyle = '#44ff88'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    ctx.fillText(gameMessage, W / 2, 20);
    ctx.textAlign = 'left';
    messageTimer--;
  }
}

function drawMap() {
  if (inQuasiSpace) { drawQuasiSpace(); return; }

  const hudH = 40; // SC2 bottom HUD bar (taller, like SC2)
  const mapH = H - hudH; // playable map area
  const spd = Math.hypot(hyperVX, hyperVY);

  // === SC2 HYPERSPACE — deep RED void ===
  // SC2's HyperSpace is famously RED, not black
  ctx.fillStyle = '#1a0000'; ctx.fillRect(0, 0, W, mapH);

  // === Swirling red nebula clouds (the iconic SC2 HyperSpace look) ===
  // Multiple layers of slowly moving red/crimson clouds
  const t = frame * 0.006;
  const ox = mapCamX - W / 2 / mapZoom, oy = mapCamY - H / 2 / mapZoom;
  for (let layer = 0; layer < 3; layer++) {
    const parallax = 0.02 + layer * 0.01;
    const cloudAlpha = 0.06 - layer * 0.015;
    ctx.globalAlpha = cloudAlpha;
    for (let ci = 0; ci < 12; ci++) {
      // Deterministic cloud positions that scroll with camera
      const seed = ci * 137.5 + layer * 47;
      const cloudBaseX = (seed * 73.1) % 2000 - 200;
      const cloudBaseY = (seed * 91.3) % 1600 - 200;
      const cx = cloudBaseX - ox * parallax * mapZoom;
      const cy = cloudBaseY - oy * parallax * mapZoom;
      // Wrap clouds
      const wrappedX = ((cx % (W + 200)) + W + 200) % (W + 200) - 100;
      const wrappedY = ((cy % (mapH + 200)) + mapH + 200) % (mapH + 200) - 100;
      const cRadius = 40 + (seed % 60);
      const red = layer === 0 ? '#440000' : layer === 1 ? '#330808' : '#2a0404';
      ctx.fillStyle = red;
      ctx.beginPath(); ctx.arc(wrappedX, wrappedY, cRadius, 0, TAU); ctx.fill();
      // Brighter core
      ctx.fillStyle = layer === 0 ? '#660000' : '#4a0808';
      ctx.beginPath(); ctx.arc(wrappedX, wrappedY, cRadius * 0.5, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // === Subtle red grid (SC2 had faint grid lines in HyperSpace) ===
  const gridSz = 60;
  const gox = ((-mapCamX * mapZoom) % gridSz + gridSz) % gridSz;
  const goy = ((-mapCamY * mapZoom) % gridSz + gridSz) % gridSz;
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#440000'; ctx.lineWidth = 1;
  for (let gx = gox; gx < W; gx += gridSz) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, mapH); ctx.stroke(); }
  for (let gy = goy; gy < mapH; gy += gridSz) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
  ctx.globalAlpha = 1;

  // === HyperSpace speed streaks (red/orange when moving, like SC2) ===
  if (spd > 0.8) {
    for (let i = 0; i < Math.min(4, spd * 1.5); i++) {
      const colors = ['#ff4422', '#ff6633', '#ff2211', '#cc3311', '#ff8844'];
      hyperTrail.push({
        x: Math.random() * W, y: Math.random() * mapH,
        len: 3 + spd * 3, life: 10 + Math.floor(Math.random() * 10),
        angle: hyperAngle + Math.PI,
        color: colors[Math.floor(Math.random() * colors.length)]
      });
    }
  }
  for (let i = hyperTrail.length - 1; i >= 0; i--) {
    const tr = hyperTrail[i];
    ctx.globalAlpha = tr.life / 20;
    ctx.strokeStyle = tr.color || '#ff4422'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tr.x, tr.y);
    ctx.lineTo(tr.x + Math.cos(tr.angle) * tr.len, tr.y + Math.sin(tr.angle) * tr.len);
    ctx.stroke();
    tr.x += Math.cos(tr.angle) * 2.5;
    tr.y += Math.sin(tr.angle) * 2.5;
    tr.life--;
    if (tr.life <= 0) hyperTrail.splice(i, 1);
  }
  ctx.globalAlpha = 1;
  if (hyperTrail.length > 80) hyperTrail.splice(0, hyperTrail.length - 80);

  // === Territory spheres of influence (SC2 style — colored circles on red void) ===
  const terr = {};
  for (let i = 0; i < starMap.length; i++) {
    const s = starMap[i];
    if (s.territory) {
      if (!terr[s.territory]) terr[s.territory] = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
      terr[s.territory].minX = Math.min(terr[s.territory].minX, s.x);
      terr[s.territory].minY = Math.min(terr[s.territory].minY, s.y);
      terr[s.territory].maxX = Math.max(terr[s.territory].maxX, s.x);
      terr[s.territory].maxY = Math.max(terr[s.territory].maxY, s.y);
    }
  }
  for (const race in terr) {
    const tb = terr[race];
    const tcx = (tb.minX + tb.maxX) / 2, tcy = (tb.minY + tb.maxY) / 2;
    const tr2 = Math.max(140, Math.hypot(tb.maxX - tb.minX, tb.maxY - tb.minY) / 2 + 100);
    const tsx = (tcx - ox) * mapZoom, tsy = (tcy - oy) * mapZoom, tsr = tr2 * mapZoom;
    if (tsx < -tsr - 20 || tsx > W + tsr + 20 || tsy < -tsr - 20 || tsy > mapH + tsr + 20) continue;
    const rc = SHIP_TYPES[race].color;
    // SC2: translucent colored sphere
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = rc;
    ctx.beginPath(); ctx.arc(tsx, tsy, tsr, 0, TAU); ctx.fill();
    // Border ring
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = rc; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(tsx, tsy, tsr, 0, TAU); ctx.stroke();
    // Race name at center of sphere
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = rc; ctx.font = '7px monospace'; ctx.textAlign = 'center';
    ctx.fillText(SHIP_TYPES[race].race, tsx, tsy - tsr + 8);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // === Stars (SC2: small bright colored dots on the red void) ===
  for (let i = 0; i < starMap.length; i++) {
    const s = starMap[i];
    const sx = (s.x - ox) * mapZoom, sy = (s.y - oy) * mapZoom;
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > mapH + 20) continue;

    // Star glow (subtle)
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = s.color.fill;
    ctx.beginPath(); ctx.arc(sx, sy, 4, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;

    // Star dot — clean bright pixel cross like SC2
    ctx.fillStyle = s.color.fill;
    const r = (i === 0) ? 3 : 2;
    ctx.fillRect(Math.floor(sx) - 1, Math.floor(sy) - 1, 3, 3); // center
    ctx.fillRect(Math.floor(sx), Math.floor(sy) - r, 1, r * 2 + 1); // vertical
    ctx.fillRect(Math.floor(sx) - r, Math.floor(sy), r * 2 + 1, 1); // horizontal

    // Star name in star color
    ctx.fillStyle = s.color.fill; ctx.font = '6px monospace';
    const label = s.name.split(' ');
    ctx.fillText(label[0], sx + 5, sy + 2);
    if (label[1]) {
      ctx.globalAlpha = 0.5;
      ctx.fillText(label[1], sx + 5, sy + 9);
      ctx.globalAlpha = 1;
    }

    // Sol marker
    if (i === 0) {
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(sx, sy, 6, 0, TAU); ctx.stroke();
    }

    // Selected star cursor — green brackets (SC2 style)
    if (i === selectedStar) {
      const cr = 9, bLen = 4;
      ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx - cr, sy - cr + bLen); ctx.lineTo(sx - cr, sy - cr); ctx.lineTo(sx - cr + bLen, sy - cr);
      ctx.moveTo(sx + cr - bLen, sy - cr); ctx.lineTo(sx + cr, sy - cr); ctx.lineTo(sx + cr, sy - cr + bLen);
      ctx.moveTo(sx - cr, sy + cr - bLen); ctx.lineTo(sx - cr, sy + cr); ctx.lineTo(sx - cr + bLen, sy + cr);
      ctx.moveTo(sx + cr - bLen, sy + cr); ctx.lineTo(sx + cr, sy + cr); ctx.lineTo(sx + cr, sy + cr - bLen);
      ctx.stroke();
    }
  }

  // === SC2 Fuel Range Circle — shows how far you can travel ===
  if (fuel > 0) {
    const fuelRange = fuel * 10 * mapZoom; // visual radius based on fuel
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = '#22cc44'; ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(W/2, mapH/2, fuelRange, 0, TAU); ctx.stroke();
    ctx.setLineDash([]);
    // Inner safe-return range (half fuel = can get there and back)
    const safeRange = fuel * 5 * mapZoom;
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#22cc44';
    ctx.beginPath(); ctx.arc(W/2, mapH/2, safeRange, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === Player ship at center (SC2 — small flagship sprite) ===
  const isThrusting = keys['ArrowUp'] || keys['KeyW'];
  ctx.save();
  ctx.translate(W/2, (mapH)/2);
  ctx.rotate(hyperAngle + Math.PI / 2);
  ctx.scale(0.5, 0.5);
  SHIP_TYPES.player.draw({ flash: 0, thrusting: isThrusting, def: SHIP_TYPES.player, shieldTimer: 0 });
  ctx.restore();

  // === Thruster flame trail behind ship (SC2 had visible engine glow) ===
  if (isThrusting) {
    ctx.globalAlpha = 0.4 + Math.random() * 0.3;
    ctx.fillStyle = '#ff6622';
    const flameX = W/2 - Math.cos(hyperAngle) * 8;
    const flameY = (mapH)/2 - Math.sin(hyperAngle) * 8;
    ctx.beginPath(); ctx.arc(flameX, flameY, 3 + Math.random() * 2, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath(); ctx.arc(flameX, flameY, 2, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === SC2 BOTTOM HUD BAR ===
  // SC2 had a dark panel at bottom with distinct sections
  ctx.fillStyle = '#0a0a12'; ctx.fillRect(0, mapH, W, hudH);
  // Top border — bright colored line (SC2 used blue/teal borders)
  ctx.fillStyle = '#2244aa'; ctx.fillRect(0, mapH, W, 2);
  ctx.fillStyle = '#112255'; ctx.fillRect(0, mapH + 2, W, 1);

  // === LEFT: Ship status panel ===
  // Fuel gauge (SC2 style — horizontal bar with label)
  ctx.fillStyle = '#8888aa'; ctx.font = '7px monospace';
  ctx.fillText('FUEL', 4, mapH + 13);
  const fuelBarX = 30, fuelBarY = mapH + 7, fuelBarW = 56, fuelBarH = 8;
  ctx.fillStyle = '#111122'; ctx.fillRect(fuelBarX, fuelBarY, fuelBarW, fuelBarH);
  const fuelFrac = Math.min(1, fuel / 200);
  // SC2 fuel bar was segmented
  const fuelSegs = Math.floor(fuelFrac * 10);
  for (let i = 0; i < fuelSegs; i++) {
    ctx.fillStyle = fuelFrac > 0.25 ? '#22cc44' : '#cc4400';
    ctx.fillRect(fuelBarX + 1 + i * 5.4, fuelBarY + 1, 4.4, fuelBarH - 2);
  }
  ctx.strokeStyle = '#334488'; ctx.lineWidth = 1;
  ctx.strokeRect(fuelBarX, fuelBarY, fuelBarW, fuelBarH);
  ctx.fillStyle = '#44cc66'; ctx.fillText(fuel.toString(), fuelBarX + fuelBarW + 3, mapH + 14);

  // Crew count
  ctx.fillStyle = '#8888aa'; ctx.fillText('CREW', 4, mapH + 25);
  ctx.fillStyle = '#44cc66'; ctx.fillText(`${crew}/${maxCrew}`, 34, mapH + 25);

  // Minerals
  ctx.fillStyle = '#8888aa'; ctx.fillText('RU', 4, mapH + 35);
  ctx.fillStyle = '#ffcc44'; ctx.fillText(minerals.toString(), 20, mapH + 35);

  // === CENTER: Position & speed readout ===
  // Vertical separator
  ctx.fillStyle = '#223366'; ctx.fillRect(105, mapH + 5, 1, hudH - 8);

  ctx.fillStyle = '#6688bb'; ctx.font = '7px monospace';
  const coordX = Math.floor(hyperX / 10), coordY = Math.floor(hyperY / 10);
  ctx.fillText('POS', 112, mapH + 13);
  ctx.fillStyle = '#aaccff';
  ctx.fillText(`${coordX.toString().padStart(4)}.${Math.abs(Math.floor(hyperX % 10))} : ${coordY.toString().padStart(4)}.${Math.abs(Math.floor(hyperY % 10))}`, 132, mapH + 13);

  ctx.fillStyle = '#6688bb';
  ctx.fillText('VEL', 112, mapH + 25);
  ctx.fillStyle = spd > 4 ? '#ff8844' : '#aaccff';
  ctx.fillText(spd.toFixed(2), 132, mapH + 25);

  // Heading
  ctx.fillStyle = '#6688bb';
  ctx.fillText('HDG', 112, mapH + 35);
  ctx.fillStyle = '#aaccff';
  const hdgDeg = Math.floor(((hyperAngle * 180 / Math.PI) % 360 + 360) % 360);
  ctx.fillText(`${hdgDeg}°`, 132, mapH + 35);

  // === RIGHT: Star info & artifacts ===
  ctx.fillStyle = '#223366'; ctx.fillRect(210, mapH + 5, 1, hudH - 8);

  // SC2 Game Date (starts FEB 2155)
  const gameMonths = Math.floor(gameClock / 3600); // ~1 month per minute
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const startMonth = 1; // FEB
  const dateMonth = months[(startMonth + gameMonths) % 12];
  const dateYear = 2155 + Math.floor((startMonth + gameMonths) / 12);
  // Death March warning color
  const marchPctHud = gameClock / DEATH_MARCH_TIME;
  ctx.fillStyle = marchPctHud > 0.75 ? (Math.floor(frame / 10) % 2 ? '#ff2222' : '#ff8844') :
    marchPctHud > 0.5 ? '#ff8844' : '#6688bb';
  ctx.font = '7px monospace';
  ctx.fillText(`${dateMonth} ${dateYear}`, 285, mapH + 35);

  // Artifacts/seals
  ctx.fillStyle = '#8888aa'; ctx.fillText('SEALS', 218, mapH + 35);
  ctx.fillStyle = '#ffcc44';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < artifacts ? '#ffcc44' : '#333344';
    ctx.fillRect(250 + i * 10, mapH + 28, 7, 7);
  }

  // Nearest star info
  if (selectedStar !== null) {
    const s = starMap[selectedStar];
    const sd = dist(hyperX, hyperY, s.x, s.y);
    ctx.fillStyle = s.color.fill; ctx.font = '8px monospace';
    ctx.fillText(s.name, 218, mapH + 13);
    ctx.fillStyle = '#6688bb'; ctx.font = '7px monospace';
    ctx.fillText(`DIST ${Math.floor(sd)}`, 218, mapH + 23);

    if (sd < 40 && Math.floor(frame / 15) % 2) {
      ctx.fillStyle = '#00ff44'; ctx.font = '8px monospace';
      ctx.fillText('► ENTER', 280, mapH + 13);
    }
    if (s.territory && !defeatedAliens.has(selectedStar)) {
      ctx.fillStyle = SHIP_TYPES[s.territory].color;
      ctx.font = '6px monospace';
      ctx.fillText(SHIP_TYPES[s.territory].race + ' SPACE', 280, mapH + 23);
    }
  } else {
    ctx.fillStyle = '#444466'; ctx.font = '7px monospace';
    ctx.fillText('NO STAR NEARBY', 218, mapH + 13);
  }

  // Fleet icons along top right (SC2 showed your fleet)
  if (fleet.length > 1) {
    ctx.fillStyle = '#8888aa'; ctx.font = '6px monospace';
    ctx.fillText('FLEET', W - 58, 8);
    for (let fi = 0; fi < fleet.length; fi++) {
      const fDef = SHIP_TYPES[fleet[fi]];
      if (fDef) {
        ctx.fillStyle = fDef.color;
        ctx.fillRect(W - 58 + fi * 9, 10, 7, 7);
      }
    }
  }

  // === QUEST LOG (top-right, SC2 style objectives) ===
  checkQuestTriggers();
  const quests = getActiveQuests();
  if (quests.length > 0) {
    const qlX = W - 110, qlY = 24;
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#04041a';
    ctx.fillRect(qlX - 2, qlY - 8, 112, quests.length * 10 + 12);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#334488'; ctx.lineWidth = 1;
    ctx.strokeRect(qlX - 2, qlY - 8, 112, quests.length * 10 + 12);
    ctx.fillStyle = '#6688bb'; ctx.font = 'bold 6px monospace';
    ctx.fillText('OBJECTIVES', qlX, qlY);
    for (let qi = 0; qi < Math.min(quests.length, 4); qi++) {
      const q = quests[qi];
      ctx.fillStyle = '#aaccdd'; ctx.font = '6px monospace';
      ctx.fillText('► ' + (q.progress ? q.progress() : q.desc), qlX, qlY + 10 + qi * 10);
    }
  }

  // === KOHR-AH DEATH MARCH (visible cleansing wave on map) ===
  if (gameClock > DEATH_MARCH_TIME * 0.3) {
    const marchFrac = Math.min(1, (gameClock - DEATH_MARCH_TIME * 0.3) / (DEATH_MARCH_TIME * 0.7));
    // Expanding red circle from Kohr-Ah territory (top-right of galaxy)
    const marchCX = 700, marchCY = -600; // Kohr-Ah home
    const marchRadius = marchFrac * 1200 * mapZoom;
    const msx = W / 2 + (marchCX - mapCamX) * mapZoom;
    const msy = mapH / 2 + (marchCY - mapCamY) * mapZoom;
    ctx.globalAlpha = 0.08 + Math.sin(frame * 0.03) * 0.03;
    ctx.fillStyle = '#ff0000';
    ctx.beginPath(); ctx.arc(msx, msy, marchRadius, 0, TAU); ctx.fill();
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(msx, msy, marchRadius, 0, TAU); ctx.stroke();
    ctx.globalAlpha = 1;
    // "DEATH MARCH" label if visible
    if (marchFrac > 0.1) {
      ctx.fillStyle = Math.floor(frame / 20) % 2 ? '#ff2222' : '#881111';
      ctx.font = 'bold 7px monospace';
      ctx.fillText('KOHR-AH CLEANSING', msx - 45, msy - marchRadius - 5);
    }
  }

  // Autopilot hint
  if (selectedStar !== null) {
    ctx.fillStyle = '#334466'; ctx.font = '6px monospace';
    ctx.fillText('A=auto +/-=zoom L=log', 218, mapH + 35 - (artifacts > 0 ? 0 : 10));
  }

  // Message overlay
  if (messageTimer > 0) {
    messageTimer--;
    ctx.fillStyle = '#ff4444'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
    ctx.fillText(gameMessage, W/2, mapH - 20);
    ctx.textAlign = 'left';
  }

  // Module menu shortcut
  if (justPressed['KeyU'] && minerals >= 20) {
    state = 'upgrade';
  }
}

// ==================== SCREEN: MODULES ====================
let upgradeCursor = 0;
const MAX_MODULES = 8;
function updateUpgrade() {
  if (justPressed['ArrowUp'] || justPressed['KeyW']) { upgradeCursor = (upgradeCursor - 1 + MODULE_DEFS.length) % MODULE_DEFS.length; sfx.select(); }
  if (justPressed['ArrowDown'] || justPressed['KeyS']) { upgradeCursor = (upgradeCursor + 1) % MODULE_DEFS.length; sfx.select(); }
  if (justPressed['Space'] || justPressed['Enter']) {
    const mod = MODULE_DEFS[upgradeCursor];
    if (modules.length < MAX_MODULES && minerals >= mod.cost) {
      minerals -= mod.cost;
      modules.push(mod.name);
      if (mod.stat === 'crew') { maxCrew = 20 + getModuleStat('crew'); }
      sfx.confirm();
    } else {
      sfx.alarm();
    }
  }
  // Remove last module with backspace
  if (justPressed['Backspace'] && modules.length > 0) {
    const removed = modules.pop();
    const mod = MODULE_DEFS.find(d => d.name === removed);
    if (mod) minerals += Math.floor(mod.cost * 0.75); // 75% refund
    maxCrew = 20 + getModuleStat('crew');
    sfx.select();
  }
  if (justPressed['Escape'] || justPressed['KeyU'] || justPressed['KeyQ']) {
    if (currentStarIdx === 0) { state = 'starbase'; music.play('starbase'); } else { returnToHyperSpace(); }
    sfx.select();
  }
}

function drawUpgrade() {
  ctx.fillStyle = '#04041a'; ctx.fillRect(0, 0, W, H);

  // === SC2 Ship Outline Outfit Screen ===
  // Top bar
  ctx.fillStyle = '#2244aa'; ctx.fillRect(0, 0, W, 2);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#4488ff'; ctx.font = 'bold 10px monospace';
  ctx.fillText('SHIP CONFIGURATION', W/2, 16);
  ctx.fillStyle = '#6688aa'; ctx.font = '7px monospace';
  ctx.fillText(`Resource Units: ${minerals}`, W/2, 26);

  // === CENTER: Ship outline with module slots around it ===
  const shipCX = W/2, shipCY = 100;
  // Ship outline (large wireframe Vindicator)
  ctx.strokeStyle = '#224488'; ctx.lineWidth = 1;
  // Hull outline
  ctx.beginPath();
  ctx.moveTo(shipCX, shipCY - 30); // nose
  ctx.lineTo(shipCX - 8, shipCY - 20);
  ctx.lineTo(shipCX - 6, shipCY + 14);
  ctx.lineTo(shipCX - 12, shipCY + 16); // engine wing left
  ctx.lineTo(shipCX - 12, shipCY + 24);
  ctx.lineTo(shipCX - 4, shipCY + 22);
  ctx.lineTo(shipCX + 4, shipCY + 22);
  ctx.lineTo(shipCX + 12, shipCY + 24);
  ctx.lineTo(shipCX + 12, shipCY + 16);
  ctx.lineTo(shipCX + 6, shipCY + 14);
  ctx.lineTo(shipCX + 8, shipCY - 20);
  ctx.closePath();
  ctx.stroke();
  // Module pod outlines (left + right)
  ctx.strokeRect(shipCX - 22, shipCY - 8, 10, 16);
  ctx.strokeRect(shipCX + 12, shipCY - 8, 10, 16);
  // Cockpit
  ctx.fillStyle = '#224488'; ctx.fillRect(shipCX - 3, shipCY - 22, 6, 4);
  // Engine glow
  ctx.fillStyle = '#223366';
  ctx.fillRect(shipCX - 10, shipCY + 22, 4, 3);
  ctx.fillRect(shipCX - 2, shipCY + 22, 4, 3);
  ctx.fillRect(shipCX + 6, shipCY + 22, 4, 3);

  // Module slots arranged around the ship (SC2 style - 4 left, 4 right)
  for (let i = 0; i < MAX_MODULES; i++) {
    const side = i < 4 ? -1 : 1;
    const idx = i % 4;
    const slotX = shipCX + side * 44 - (side > 0 ? 0 : 30);
    const slotY = 58 + idx * 24;
    const hasModule = i < modules.length;
    // Slot background
    ctx.fillStyle = hasModule ? 'rgba(34,68,34,0.6)' : 'rgba(10,10,30,0.6)';
    ctx.fillRect(slotX, slotY, 30, 18);
    ctx.strokeStyle = hasModule ? '#44aa44' : '#223344';
    ctx.strokeRect(slotX, slotY, 30, 18);
    // Connector line to ship
    ctx.strokeStyle = '#1a2244';
    ctx.beginPath();
    ctx.moveTo(side < 0 ? slotX + 30 : slotX, slotY + 9);
    ctx.lineTo(shipCX + side * 12, shipCY - 8 + idx * 5);
    ctx.stroke();
    // Module content
    if (hasModule) {
      const mod = MODULE_DEFS.find(d => d.name === modules[i]);
      if (mod) {
        ctx.fillStyle = mod.icon; ctx.fillRect(slotX + 2, slotY + 2, 5, 5);
        ctx.fillStyle = '#aaddaa'; ctx.font = '6px monospace';
        ctx.fillText(mod.name.substring(0, 6), slotX + 9, slotY + 7);
        ctx.fillStyle = '#668866'; ctx.fillText(mod.desc.substring(0, 8), slotX + 2, slotY + 14);
      }
    } else {
      ctx.fillStyle = '#333'; ctx.font = '6px monospace';
      ctx.fillText('empty', slotX + 6, slotY + 11);
    }
  }

  // === BOTTOM: Available modules list ===
  const listY = 160;
  ctx.fillStyle = '#0a0a22'; ctx.fillRect(4, listY, W - 8, H - listY - 16);
  ctx.strokeStyle = '#223366'; ctx.strokeRect(4, listY, W - 8, H - listY - 16);
  ctx.fillStyle = '#4488ff'; ctx.fillRect(4, listY, W - 8, 2);

  ctx.fillStyle = '#6688bb'; ctx.font = 'bold 7px monospace';
  ctx.fillText('AVAILABLE MODULES', W/2, listY + 12);

  ctx.textAlign = 'left';
  const cols = 2;
  const colW = (W - 20) / cols;
  for (let i = 0; i < MODULE_DEFS.length; i++) {
    const mod = MODULE_DEFS[i];
    const col = i < 5 ? 0 : 1;
    const row = i < 5 ? i : i - 5;
    const mx = 10 + col * colW;
    const my = listY + 20 + row * 14;
    const sel = i === upgradeCursor;
    const canBuy = minerals >= mod.cost && modules.length < MAX_MODULES;

    if (sel) {
      ctx.fillStyle = 'rgba(34,68,170,0.3)';
      ctx.fillRect(mx - 2, my - 6, colW - 4, 13);
      ctx.strokeStyle = '#4488ff'; ctx.strokeRect(mx - 2, my - 6, colW - 4, 13);
    }
    ctx.fillStyle = mod.icon; ctx.fillRect(mx, my - 4, 5, 5);
    ctx.fillStyle = sel ? '#fff' : '#8888aa'; ctx.font = '7px monospace';
    ctx.fillText(mod.name, mx + 8, my + 1);
    ctx.fillStyle = canBuy ? '#ffcc44' : '#664422';
    ctx.fillText(`${mod.cost}`, mx + colW - 30, my + 1);
  }

  // Description of selected module
  const selMod = MODULE_DEFS[upgradeCursor];
  ctx.fillStyle = '#aaccff'; ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${selMod.name}: ${selMod.desc}`, W/2, H - 20);

  ctx.fillStyle = '#445566'; ctx.font = '7px monospace';
  ctx.fillText('SPACE install   BACKSPACE remove   Q back', W/2, H - 4);
  ctx.textAlign = 'left';
}

// ==================== SCREEN: STARBASE ====================
let starbaseCursor = 0;
let starbaseMsg = null;
let starbaseMsgTimer = 0;

const HAYES_MSGS = [
  // Changes based on artifacts found
];

function getHayesMsg() {
  questFlags.visited_starbase = true;
  const marchPct = gameClock / DEATH_MARCH_TIME;
  // Bomb assembled — go fight!
  if (questFlags.has_bomb) return 'Captain! The Precursor Bomb is ready! Fly to the Kohr-Ah homeworld and use it to destroy the Sa-Matra! This is our last chance! The fate of the galaxy rests with you!';
  // All 3 seals + enough allies = can assemble bomb
  if (artifacts >= 3 && (questFlags.allies_found || 0) >= 3) {
    questFlags.has_bomb = true;
    return 'Captain! You have all three Precursor Seals AND enough allies! Commander Hayes has assembled the Precursor Bomb! Now fly to the Kohr-Ah homeworld and DESTROY THE SA-MATRA! GO!';
  }
  if (artifacts >= 3) return 'All three Seals collected! But we need more allies to assault the Sa-Matra. Recruit at least 3 races to your fleet, Captain!';
  // Death March urgency
  if (marchPct > 0.75) return 'CAPTAIN! The Kohr-Ah Death March is nearly complete! They are CLEANSING entire sectors! We are running out of TIME! Find the remaining Seals!';
  if (marchPct > 0.5) return 'The situation is dire, Captain. The Kohr-Ah have begun their cleansing sweep. We MUST find the Seals before all is lost.';
  // Quest-specific hints
  if (questFlags.sun_device && !questFlags.chmmr_awakened) return 'Captain, you have the Sun Device! Take it to the Chmmr — they need it to complete their Process!';
  if (questFlags.shofixti_females && !questFlags.shofixti_revived) return 'You found Shofixti survivors! Return to Tanaka in Shofixti space — this will change everything!';
  if (questFlags.ultron_parts && !questFlags.ultron_repaired) return 'You have the Ultron parts! Bring them to the Utwig — they will be eternally grateful!';
  // Progress-based messages
  if (artifacts === 2) return 'Two Seals found, Captain! One more to go. Our sensors detect Orz activity increasing. The Arilou may know more about the threat. Have you spoken with the Chmmr about the Sun Device?';
  if (artifacts === 1) return 'Good work finding that Seal! Two remain. Talk to the alien races — the Mycon hold secrets, the Shofixti need help, and the Yehat may yet be swayed. The Melnorme can sell you valuable intel.';
  if ((questFlags.allies_found || 0) > 0) return `You have ${questFlags.allies_found} allies. Good start. Keep exploring for Precursor Seals — they are guarded by hostile races at the edges of the galaxy. Talk to every species you meet!`;
  if (defeatedAliens.size > 3) return 'You have made contact with several species, Captain. Keep exploring. The Precursor Seals are hidden at the edges of the galaxy. The Chmmr and Arilou may have crucial information.';
  return 'Welcome back, Captain. The Sa-Matra is destroyed, but a dimensional rift has opened. The Kohr-Ah have begun a Death March to cleanse all life. You must find three Precursor Seals to stop them. Talk to alien races for clues. The Starbase will always be here for fuel and crew.';
}

function updateStarbase() {
  const options = 8; // Talk, Refuel, Crew, Fleet Crew, Upgrade, Save, Load, Depart
  if (justPressed['ArrowUp'] || justPressed['KeyW']) { starbaseCursor = (starbaseCursor - 1 + options) % options; sfx.select(); }
  if (justPressed['ArrowDown'] || justPressed['KeyS']) { starbaseCursor = (starbaseCursor + 1) % options; sfx.select(); }

  if (justPressed['Space'] || justPressed['Enter']) {
    if (starbaseCursor === 0) {
      // Talk to Hayes
      starbaseMsg = getHayesMsg();
      starbaseMsgTimer = 180;
      sfx.confirm();
    } else if (starbaseCursor === 1) {
      // Refuel (SC2: costs 1 mineral per 5 fuel)
      const fuelNeeded = 200 - fuel;
      if (fuelNeeded <= 0) {
        starbaseMsg = 'Fuel tanks are already full.';
        starbaseMsgTimer = 60;
      } else {
        const cost = Math.ceil(fuelNeeded / 5);
        if (minerals >= cost) {
          minerals -= cost;
          fuel = 200;
          starbaseMsg = `Fuel topped off! (-${cost} RU)`;
          starbaseMsgTimer = 90;
          sfx.pickup();
        } else {
          // Partial refuel with what we can afford
          const canBuy = minerals * 5;
          if (canBuy > 0) {
            fuel = Math.min(200, fuel + canBuy);
            starbaseMsg = `+${canBuy} fuel (-${minerals} RU)`;
            minerals = 0;
            starbaseMsgTimer = 90;
            sfx.pickup();
          } else {
            starbaseMsg = 'Need minerals to buy fuel! (1 RU = 5 fuel)';
            starbaseMsgTimer = 90;
            sfx.alarm();
          }
        }
      }
    } else if (starbaseCursor === 2) {
      // Recruit crew (10 minerals per 5 crew)
      if (crew >= maxCrew) {
        starbaseMsg = 'Crew quarters are full, Captain.';
        starbaseMsgTimer = 60;
      } else if (minerals >= 10) {
        minerals -= 10;
        crew = Math.min(maxCrew, crew + 5);
        starbaseMsg = `+5 crew recruited! (${crew}/${maxCrew})`;
        starbaseMsgTimer = 90;
        sfx.confirm();
      } else {
        starbaseMsg = 'Need 10 minerals to recruit crew.';
        starbaseMsgTimer = 60;
        sfx.alarm();
      }
    } else if (starbaseCursor === 3) {
      // SC2 Crew Transfer — distribute crew to fleet ships
      if (fleet.length <= 1) {
        starbaseMsg = 'No allied ships in fleet to transfer crew to.';
        starbaseMsgTimer = 90;
      } else {
        // Cycle through fleet ships and top up their crew
        let transferred = 0;
        for (const shipType of fleet) {
          if (shipType === 'player') continue;
          const def = SHIP_TYPES[shipType];
          if (!def) continue;
          // Each fleet ship can hold its maxCrew
          // We track fleet crew in a map
          if (!window._fleetCrew) window._fleetCrew = {};
          const current = window._fleetCrew[shipType] || def.maxCrew;
          if (current < def.maxCrew && crew > 1) {
            const need = Math.min(def.maxCrew - current, crew - 1, 3);
            window._fleetCrew[shipType] = current + need;
            crew -= need;
            transferred += need;
          }
        }
        if (transferred > 0) {
          starbaseMsg = `Transferred ${transferred} crew to fleet ships.`;
          sfx.confirm();
        } else {
          starbaseMsg = 'All fleet ships are fully crewed.';
        }
        starbaseMsgTimer = 90;
      }
    } else if (starbaseCursor === 4) {
      // Upgrades
      state = 'upgrade';
      upgradeCursor = 0;
    } else if (starbaseCursor === 5) {
      // Save game
      if (saveGame()) {
        starbaseMsg = 'Game saved!';
        starbaseMsgTimer = 90;
        sfx.confirm();
      } else {
        starbaseMsg = 'Save failed!';
        starbaseMsgTimer = 60;
        sfx.alarm();
      }
    } else if (starbaseCursor === 6) {
      // Load game
      if (loadGame()) {
        sfx.confirm();
      } else {
        starbaseMsg = 'No saved game found.';
        starbaseMsgTimer = 60;
        sfx.alarm();
      }
    } else if (starbaseCursor === 7) {
      // Depart (auto-save on departure)
      saveGame();
      returnToHyperSpace();
      sfx.warp();
    }
  }

  if (justPressed['Escape'] || justPressed['KeyQ']) {
    returnToHyperSpace(); sfx.select();
  }

  if (starbaseMsgTimer > 0) starbaseMsgTimer--;
}

function drawStarbase() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  // === SC2 Starbase Layout: Left=Hayes portrait, Right=Station+Menu ===
  const portW = Math.floor(W * 0.35);
  const portH = Math.floor(H * 0.55);

  // === LEFT PANEL: Commander Hayes Portrait ===
  ctx.fillStyle = '#08081a'; ctx.fillRect(0, 0, portW, portH);
  // Hayes face - human military commander
  const hx = portW / 2, hy = portH / 2 - 10;
  // Dark uniform background
  ctx.fillStyle = '#1a1a2a'; ctx.fillRect(4, 4, portW - 8, portH - 8);
  // Uniform body
  ctx.fillStyle = '#1a2244'; ctx.fillRect(hx - 28, hy + 20, 56, 40);
  ctx.fillStyle = '#223366'; ctx.fillRect(hx - 24, hy + 22, 48, 36);
  // Collar
  ctx.fillStyle = '#2a3a6a'; ctx.fillRect(hx - 14, hy + 18, 28, 6);
  // Rank pins
  ctx.fillStyle = '#ddaa44'; ctx.fillRect(hx - 12, hy + 20, 3, 2);
  ctx.fillRect(hx + 9, hy + 20, 3, 2);
  // Head
  ctx.fillStyle = '#cc9977';
  ctx.beginPath(); ctx.ellipse(hx, hy, 16, 20, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = '#ddaa88';
  ctx.beginPath(); ctx.ellipse(hx, hy - 2, 14, 17, 0, 0, TAU); ctx.fill();
  // Hair (short military cut)
  ctx.fillStyle = '#443322';
  ctx.beginPath(); ctx.ellipse(hx, hy - 12, 15, 10, 0, Math.PI, TAU); ctx.fill();
  ctx.fillStyle = '#554433';
  ctx.fillRect(hx - 14, hy - 14, 28, 4);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(hx - 6, hy - 4, 3, 2.5, 0, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx + 6, hy - 4, 3, 2.5, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = '#336699';
  ctx.beginPath(); ctx.arc(hx - 6, hy - 4, 1.5, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(hx + 6, hy - 4, 1.5, 0, TAU); ctx.fill();
  ctx.fillStyle = '#000'; ctx.fillRect(hx - 7, hy - 5, 1, 1); ctx.fillRect(hx + 5, hy - 5, 1, 1);
  // Eyebrows
  ctx.fillStyle = '#443322';
  ctx.fillRect(hx - 9, hy - 8, 6, 1); ctx.fillRect(hx + 3, hy - 8, 6, 1);
  // Nose
  ctx.fillStyle = '#cc9977'; ctx.fillRect(hx - 1, hy, 2, 5);
  // Mouth
  ctx.fillStyle = '#aa7766';
  ctx.fillRect(hx - 4, hy + 8, 8, 1);
  // Chin
  ctx.fillStyle = '#cc9977';
  ctx.beginPath(); ctx.arc(hx, hy + 12, 6, 0, Math.PI); ctx.fill();
  // Ears
  ctx.fillStyle = '#cc9977';
  ctx.beginPath(); ctx.arc(hx - 15, hy - 2, 3, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(hx + 15, hy - 2, 3, 0, TAU); ctx.fill();
  // Portrait border
  ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 2;
  ctx.strokeRect(2, 2, portW - 4, portH - 4);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
  ctx.strokeRect(4, 4, portW - 8, portH - 8);

  // Name plate below portrait
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, portH, portW, H - portH);
  ctx.strokeStyle = '#4488ff'; ctx.strokeRect(0, portH, portW, H - portH);
  ctx.fillStyle = '#4488ff'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('COMMANDER HAYES', portW / 2, portH + 12);
  ctx.fillStyle = '#667788'; ctx.font = '7px monospace';
  ctx.fillText('EARTH STARBASE', portW / 2, portH + 22);
  // Mini starbase icon
  ctx.strokeStyle = '#556677'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(portW / 2, portH + 38, 20, 6, 0, 0, TAU); ctx.stroke();
  ctx.fillStyle = '#445566'; ctx.fillRect(portW / 2 - 5, portH + 30, 10, 16);
  ctx.fillStyle = '#88aacc'; ctx.fillRect(portW / 2 - 2, portH + 42, 4, 2);

  // === RIGHT SIDE: Menu + Status ===
  const menuX = portW + 4;
  const menuW = W - portW - 8;

  // SC2-style dark panel background
  ctx.fillStyle = '#04041a'; ctx.fillRect(menuX, 0, menuW, H);
  ctx.fillStyle = '#4488ff'; ctx.fillRect(menuX, 0, menuW, 2);

  // Station status header
  ctx.fillStyle = '#4488ff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';

  ctx.fillStyle = '#0a0a22'; ctx.fillRect(menuX + 4, 22, menuW - 8, 44);

  ctx.save(); ctx.translate(menuX + 28, 44); ctx.scale(0.5, 0.5);

  ctx.restore();
  // Ship stats
  ctx.fillStyle = '#6688bb'; ctx.font = '7px monospace';
  ctx.fillText(`FUEL`, menuX + 52, 32);
  ctx.fillText(`CREW`, menuX + 52, 42);
  ctx.fillText(`MODS`, menuX + 52, 52);
  ctx.fillText(`RU`, menuX + 52, 62);
  // Fuel bar
  const fbx = menuX + 80, fbw = menuW - 92;
  ctx.fillStyle = '#111'; ctx.fillRect(fbx, 26, fbw, 6);
  ctx.fillStyle = fuel > 50 ? '#22cc44' : '#cc4400';
  ctx.fillRect(fbx, 26, fbw * Math.min(1, fuel / 200), 6);
  ctx.fillStyle = '#aaccff'; ctx.font = '7px monospace';
  ctx.fillText(`${fuel}/200`, fbx + fbw + 2, 32);
  // Crew bar
  ctx.fillStyle = '#111'; ctx.fillRect(fbx, 36, fbw, 6);
  ctx.fillStyle = '#4488ff';
  ctx.fillRect(fbx, 36, fbw * Math.min(1, crew / maxCrew), 6);
  ctx.fillText(`${crew}/${maxCrew}`, fbx + fbw + 2, 42);
  // Module count
  ctx.fillText(`${modules.length}/${MAX_MODULES}`, fbx, 52);
  // Minerals
  ctx.fillStyle = '#ffcc44';
  ctx.fillText(minerals.toString(), fbx, 62);

  // Menu options (SC2 style - centered, highlighted)
  const menuItems = [
    'TALK TO COMMANDER',
    `REFUEL (1 RU = 5 fuel) [${fuel}/200]`,
    `RECRUIT CREW (10 RU) [${crew}/${maxCrew}]`,
    `FLEET CREW TRANSFER [${fleet.length} ships]`,
    `OUTFIT MODULES [${modules.length}/${MAX_MODULES}]`,
    'SAVE GAME',
    'LOAD GAME',
    'DEPART STARBASE',
  ];

  ctx.textAlign = 'center';
  for (let i = 0; i < menuItems.length; i++) {
    const my = 80 + i * 18;
    const sel = i === starbaseCursor;
    if (sel) {
      ctx.fillStyle = 'rgba(34,68,170,0.2)';
      ctx.fillRect(menuX + 4, my - 4, menuW - 8, 16);
      ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 1;
      ctx.strokeRect(menuX + 4, my - 4, menuW - 8, 16);
    }
    ctx.fillStyle = sel ? '#ffffff' : '#6688aa'; ctx.font = sel ? 'bold 8px monospace' : '8px monospace';
    ctx.fillText((sel ? '\u25B6 ' : '') + menuItems[i], menuX + menuW / 2, my + 6);
  }

  // Seals display
  ctx.fillStyle = '#6688aa'; ctx.font = '7px monospace';
  ctx.fillText('PRECURSOR SEALS', menuX + menuW / 2, 176);
  for (let i = 0; i < 3; i++) {
    const sx = menuX + menuW / 2 - 20 + i * 16;
    ctx.fillStyle = i < artifacts ? '#ffcc44' : '#222233';
    ctx.fillRect(sx, 180, 10, 10);
    ctx.strokeStyle = i < artifacts ? '#ffdd66' : '#333344';
    ctx.strokeRect(sx, 180, 10, 10);
    if (i < artifacts) {
      ctx.fillStyle = '#ffee88'; ctx.fillRect(sx + 3, 183, 4, 4);
    }
  }

  // === FLEET ROSTER (SC2 showed all your ships) ===
  if (fleet.length > 1) {
    const fy = 196;
    ctx.fillStyle = '#6688aa'; ctx.font = '7px monospace';
    ctx.fillText('FLEET', menuX + menuW / 2, fy);
    ctx.textAlign = 'left';
    for (let fi = 0; fi < fleet.length; fi++) {
      const fDef = SHIP_TYPES[fleet[fi]];
      if (!fDef) continue;
      const fx = menuX + 8 + (fi % 5) * 32;
      const ffy = fy + 4 + Math.floor(fi / 5) * 18;
      // Ship icon
      ctx.save(); ctx.translate(fx + 8, ffy + 8); ctx.scale(0.35, 0.35);
      fDef.draw({ flash: 0, thrusting: false, def: fDef, shieldTimer: 0 });
      ctx.restore();
      // Ship race label
      ctx.fillStyle = fDef.color; ctx.font = '4px monospace';
      ctx.fillText(fDef.race.substring(0, 5), fx, ffy + 18);
    }
    ctx.textAlign = 'center';
  }

  // Controls help
  ctx.fillStyle = '#445566'; ctx.font = '7px monospace';
  ctx.fillText('UP/DOWN select  SPACE choose  Q leave', menuX + menuW / 2, H - 4);
  ctx.textAlign = 'left';

  // Hayes message overlay (SC2 style - in the text area)
  if (starbaseMsg && starbaseMsgTimer > 0) {
    ctx.fillStyle = 'rgba(4,4,30,0.95)';
    ctx.fillRect(menuX + 2, 72, menuW - 4, 120);
    ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 1;
    ctx.strokeRect(menuX + 2, 72, menuW - 4, 120);
    ctx.fillStyle = '#33ff33'; ctx.font = '8px monospace';
    const words = starbaseMsg.split(' ');
    let line = '', ty = 86;
    const maxChars = Math.floor((menuW - 20) / 5);
    for (const word of words) {
      const test = line + word + ' ';
      if (test.length > maxChars) {
        ctx.fillText(line, menuX + 8, ty);
        line = word + ' '; ty += 11;
      } else { line = test; }
    }
    ctx.fillText(line, menuX + 8, ty);
  }
}

// ==================== SCREEN: ORBIT ====================
let orbitCursor = 0;
let scanTimer = 0;

function updateOrbit() {
  const s = starMap[currentStarIdx];
  if (justPressed['ArrowLeft'] || justPressed['KeyA']) { orbitCursor = (orbitCursor - 1 + s.planets.length) % s.planets.length; sfx.select(); scanTimer = 0; }
  if (justPressed['ArrowRight'] || justPressed['KeyD']) { orbitCursor = (orbitCursor + 1) % s.planets.length; sfx.select(); scanTimer = 0; }

  // Scan planet (hold Space to scan, reveals deposit info)
  const p = s.planets[orbitCursor];
  if (keys['Space'] || keys['Enter']) {
    if (!p.scanned) {
      scanTimer++;
      if (scanTimer >= 30) {
        p.scanned = true;
        sfx.confirm();
        gameMessage = `Scan complete: ${p.deposits.length} deposits detected`;
        messageTimer = 60;
      }
    }
  } else {
    if (scanTimer > 0 && scanTimer < 30) scanTimer = 0;
  }

  // Launch lander (L key or Z key) — SC2's core planet exploration
  if ((justPressed['KeyL'] || justPressed['KeyZ']) && p.landable) {
    initLander(orbitCursor);
    state = 'lander';
    music.play('lander');
    sfx.confirm();
  }

  // Collect artifact
  if (s.artifact && !defeatedAliens.has(currentStarIdx) && s.alien) {
    // Need to defeat alien first
  } else if (s.artifact && justPressed['KeyC']) {
    s.artifact = false;
    artifacts++;
    sfx.victory();
    gameMessage = `PRECURSOR SEAL RECOVERED! (${artifacts}/3)`;
    messageTimer = 120;
    if (artifacts >= 3) {
      gameMessage = 'ALL SEALS FOUND! Close the rift - find the Orz!';
      messageTimer = 180;
    }
  }

  if (justPressed['Escape'] || justPressed['KeyQ']) { returnToHyperSpace(); sfx.select(); }
}

function drawOrbit() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  const s = starMap[currentStarIdx];

  // === SC2 Solar System View ===
  // Deeper starfield
  for (let i = 0; i < 60; i++) {
    const sx = (i * 137.5 + currentStarIdx * 50) % W;
    const sy = (i * 91.3 + currentStarIdx * 30) % H;
    ctx.fillStyle = i % 5 === 0 ? '#aaccff' : '#666';
    ctx.globalAlpha = 0.3 + (i % 3) * 0.15;
    ctx.fillRect(sx, sy, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Central star with proper corona (SC2 had beautiful star rendering)
  const starX = W * 0.35, starY = H * 0.45;
  // Multi-layered corona
  ctx.globalAlpha = 0.04; ctx.fillStyle = s.color.glow;
  ctx.beginPath(); ctx.arc(starX, starY, 55, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.08;
  ctx.beginPath(); ctx.arc(starX, starY, 42, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.15;
  ctx.beginPath(); ctx.arc(starX, starY, 30, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.arc(starX, starY, 22, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  // Star body
  ctx.fillStyle = s.color.fill;
  ctx.beginPath(); ctx.arc(starX, starY, 16, 0, TAU); ctx.fill();
  // Bright center
  ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.arc(starX, starY, 8, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  // Solar flares
  ctx.fillStyle = s.color.glow; ctx.globalAlpha = 0.3;
  for (let f = 0; f < 5; f++) {
    const fa = frame * 0.008 + f * 1.3;
    const fr = 18 + Math.sin(frame * 0.04 + f * 2) * 5;
    ctx.beginPath(); ctx.arc(starX + Math.cos(fa) * fr, starY + Math.sin(fa) * fr, 3 + Math.sin(frame * 0.06 + f) * 2, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Planets orbiting (SC2 style - elliptical orbits, good spacing)
  for (let i = 0; i < s.planets.length; i++) {
    const p = s.planets[i];
    const orbitR = 50 + i * Math.min(24, 160 / s.planets.length);
    const angle = frame * 0.004 * (1 + i * 0.25) + i * 2.1;
    const px = starX + Math.cos(angle) * orbitR;
    const py = starY + Math.sin(angle) * orbitR * 0.4;

    // Orbit line (subtle dotted feel)
    ctx.strokeStyle = 'rgba(60,80,120,0.15)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(starX, starY, orbitR, orbitR * 0.4, 0, 0, TAU); ctx.stroke();

    const sel = i === orbitCursor;
    const baseR = (p.radius || 10) * 0.5;
    const r = sel ? baseR + 2 : baseR;

    // Selection glow
    if (sel) {
      ctx.globalAlpha = 0.2; ctx.fillStyle = '#4488ff';
      ctx.beginPath(); ctx.arc(px, py, r + 6, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // Planet body
    if (p.type === 'Rainbow') {
      // Rainbow world: cycling hue
      const hue = (frame * 2 + i * 60) % 360;
      ctx.fillStyle = `hsl(${hue}, 80%, 50%)`;
    } else {
      ctx.fillStyle = p.color;
    }
    ctx.beginPath(); ctx.arc(px, py, r, 0, TAU); ctx.fill();
    // Surface detail
    ctx.save(); ctx.beginPath(); ctx.arc(px, py, r, 0, TAU); ctx.clip();
    const pRot = frame * 0.006 + i * 3;
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px + Math.cos(pRot) * r * 0.4, py - r * 0.3, r * 0.3, 0, TAU); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(px + Math.cos(pRot + 1.5) * r * 0.3, py + r * 0.2, r * 0.25, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1; ctx.restore();
    // Shadow
    ctx.globalAlpha = 0.35; ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(px + r * 0.3, py + r * 0.3, r, 0, TAU); ctx.fill();
    ctx.globalAlpha = 0.2; ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px - r * 0.25, py - r * 0.25, r * 0.3, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;

    if (sel) {
      ctx.strokeStyle = '#ffcc44'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(px, py, r + 5, 0, TAU); ctx.stroke();
    }

    // Planet number (SC2 showed roman numerals)
    ctx.fillStyle = sel ? '#fff' : '#556677'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
    const numerals = ['I','II','III','IV','V','VI','VII','VIII','IX'];
    ctx.fillText(numerals[i] || (i + 1).toString(), px, py + r + 8);
    ctx.textAlign = 'left';
  }

  // === SC2 Planet Scan Panel (right side, taller) ===
  const p = s.planets[orbitCursor];
  const panX = W - 115, panY = 2, panW2 = 113, panH2 = H - 18;
  ctx.fillStyle = '#04041a'; ctx.fillRect(panX, panY, panW2, panH2);
  ctx.strokeStyle = '#223366'; ctx.lineWidth = 1; ctx.strokeRect(panX, panY, panW2, panH2);
  ctx.fillStyle = '#2244aa'; ctx.fillRect(panX, panY, panW2, 2);

  // Planet close-up (large rotating planet)
  const ppx = panX + panW2/2, ppy = panY + 50, ppr = 36;
  // Atmosphere
  const closeUpColor = p.type === 'Rainbow' ? `hsl(${(frame * 2) % 360}, 80%, 50%)` : p.color;
  ctx.globalAlpha = 0.1; ctx.fillStyle = closeUpColor;
  ctx.beginPath(); ctx.arc(ppx, ppy, ppr + 4, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = closeUpColor;
  ctx.beginPath(); ctx.arc(ppx, ppy, ppr, 0, TAU); ctx.fill();
  // Rotating surface features
  ctx.save(); ctx.beginPath(); ctx.arc(ppx, ppy, ppr, 0, TAU); ctx.clip();
  const pRot2 = frame * 0.008;
  for (let ci = 0; ci < 6; ci++) {
    const ca = pRot2 + ci * 1.1;
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = ci % 2 ? '#fff' : '#000';
    ctx.beginPath(); ctx.arc(ppx + Math.cos(ca) * ppr * 0.4, ppy + Math.sin(ci * 1.5) * ppr * 0.3, ppr * 0.15 + ci * 2, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.restore();
  // Shadow
  ctx.globalAlpha = 0.4; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(ppx + 10, ppy + 8, ppr, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.15; ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ppx - 10, ppy - 10, ppr * 0.3, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;

  // Scan data (SC2 style readout)
  ctx.fillStyle = '#223366'; ctx.fillRect(panX + 4, ppy + ppr + 6, panW2 - 8, 1);
  ctx.fillStyle = '#4488ff'; ctx.font = 'bold 8px monospace';
  ctx.fillText(p.name, panX + 6, ppy + ppr + 18);
  ctx.fillStyle = '#6688aa'; ctx.font = '7px monospace';
  ctx.fillText('Type:', panX + 6, ppy + ppr + 30);
  ctx.fillStyle = '#aaccff'; ctx.fillText(p.type || 'Unknown', panX + 40, ppy + ppr + 30);
  // SC2-style data readout
  if (p.scanned) {
    // SC2-style full planet scan readout
    let sy2 = ppy + ppr + 28;
    const lbl = (text, val, valColor) => {
      ctx.fillStyle = '#6688aa'; ctx.font = '7px monospace';
      ctx.fillText(text, panX + 6, sy2);
      ctx.fillStyle = valColor || '#aaccff';
      ctx.fillText(val, panX + 52, sy2);
      sy2 += 10;
    };
    // SC2 planet stats: gravity, temp, weather, tectonics
    const grav = p.type === 'Gas Giant' ? 'High' : p.radius > 14 ? 'Med' : 'Low';
    const gravC = grav === 'High' ? '#ff4444' : grav === 'Med' ? '#ffcc44' : '#44ff44';
    const tempMap = { Ice: 'Cold', Desert: 'Hot', Volcanic: 'Inferno', Toxic: 'Warm', Jungle: 'Warm', Water: 'Mild', Rocky: 'Cold', Rainbow: 'Mild', 'Gas Giant': 'Frigid' };
    const temp = tempMap[p.type] || 'Mild';
    const tempC = { Cold: '#4488ff', Frigid: '#4488ff', Mild: '#44ff44', Warm: '#ffcc44', Hot: '#ff8844', Inferno: '#ff4444' }[temp] || '#aaccff';
    const weatherMap = { Toxic: 'Caustic', Volcanic: 'Firestorm', Water: 'Storms', Jungle: 'Rain', Desert: 'Dust', Ice: 'Blizzard', Rocky: 'None', Rainbow: 'Prismatic', 'Gas Giant': 'Violent' };
    const weather = weatherMap[p.type] || 'None';
    const weatherC = weather === 'None' ? '#44ff44' : weather === 'Rain' ? '#88ccff' : '#ffcc44';
    const tecMap = { Volcanic: 'Class 6', Rocky: 'Class 2', Desert: 'Class 1', Water: 'Class 3', Jungle: 'Class 2', Toxic: 'Class 4', Ice: 'Class 1', Rainbow: 'Class 3', 'Gas Giant': 'N/A' };
    const tec = tecMap[p.type] || 'Class 1';
    const tecC = tec === 'Class 6' || tec === 'Class 5' ? '#ff4444' : tec === 'Class 4' || tec === 'Class 3' ? '#ffcc44' : '#44ff44';
    lbl('Gravity:', grav, gravC);
    lbl('Temp:', temp, tempC);
    lbl('Weather:', weather, weatherC);
    lbl('Tectonic:', tec, tecC);
    // Separator
    ctx.fillStyle = '#223366'; ctx.fillRect(panX + 4, sy2 - 2, panW2 - 8, 1); sy2 += 4;
    // Deposits and value
    const remaining = p.deposits.filter(d => !d.collected).length;
    lbl('Minerals:', `${remaining}/${p.deposits.length}`, '#ffcc44');
    const remValue = p.deposits.filter(d => !d.collected).reduce((s, d) => s + MINERAL_TYPES[d.type].value, 0);
    lbl('Value:', `${remValue} RU`, '#ffcc44');
    lbl('Bio life:', `${p.bioCount || 0}`, '#44ff44');
    const hazLevels = ['None', 'Low', 'Medium', 'High'];
    const hazColors = ['#44ff44', '#ffcc44', '#ff8844', '#ff4444'];
    lbl('Danger:', hazLevels[p.hazard || 0], hazColors[p.hazard || 0]);

    // SC2 mineral type breakdown (colored dots)
    ctx.fillStyle = '#223366'; ctx.fillRect(panX + 4, sy2 - 2, panW2 - 8, 1); sy2 += 4;
    const mineralCounts = {};
    for (const d of p.deposits.filter(d => !d.collected)) {
      mineralCounts[d.type] = (mineralCounts[d.type] || 0) + 1;
    }
    for (const typeIdx in mineralCounts) {
      const mt = MINERAL_TYPES[typeIdx];
      ctx.fillStyle = mt.color;
      ctx.fillRect(panX + 6, sy2 - 4, 5, 5);
      ctx.fillStyle = '#8899aa'; ctx.font = '6px monospace';
      ctx.fillText(`${mt.name} x${mineralCounts[typeIdx]}`, panX + 14, sy2);
      sy2 += 9;
      if (sy2 > panH2 - 30) break;
    }
  } else {
    ctx.fillStyle = '#6688aa'; ctx.fillText('HOLD SPACE', panX + 6, ppy + ppr + 42);
    ctx.fillStyle = '#6688aa'; ctx.fillText('to scan', panX + 6, ppy + ppr + 54);
  }

  // Land prompt (for landable planets)
  if (p.landable) {
    ctx.fillStyle = '#223366'; ctx.fillRect(panX + 4, panH2 - 20, panW2 - 8, 16);
    ctx.fillStyle = Math.floor(frame / 20) % 2 ? '#88ccff' : '#4488cc'; ctx.font = 'bold 8px monospace';
    ctx.fillText('Z/L to LAND', panX + 10, panH2 - 8);
  } else {
    ctx.fillStyle = '#223344'; ctx.fillRect(panX + 4, panH2 - 20, panW2 - 8, 16);
    ctx.fillStyle = '#664444'; ctx.font = '7px monospace';
    ctx.fillText('Cannot land', panX + 14, panH2 - 8);
  }

  // Scan progress
  if (scanTimer > 0 && !p.scanned) {
    ctx.fillStyle = '#111'; ctx.fillRect(panX + 4, panH2 - 34, panW2 - 8, 8);
    ctx.fillStyle = '#44aaff'; ctx.fillRect(panX + 4, panH2 - 34, (panW2 - 8) * (scanTimer / 40), 8);
    ctx.fillStyle = '#88ddff'; ctx.fillRect(panX + 4, panH2 - 34, (panW2 - 8) * (scanTimer / 40), 3);
    ctx.fillStyle = '#aaccff'; ctx.font = '7px monospace';
    ctx.fillText('SCANNING...', panX + 20, panH2 - 38);
  }

  // === Star info (top-left, SC2 style) ===
  ctx.fillStyle = '#04041a'; ctx.fillRect(2, 2, 90, 36);
  ctx.strokeStyle = '#223366'; ctx.strokeRect(2, 2, 90, 36);
  ctx.fillStyle = '#2244aa'; ctx.fillRect(2, 2, 90, 2);
  ctx.fillStyle = s.color.fill; ctx.font = 'bold 8px monospace';
  ctx.fillText(s.name, 6, 14);
  ctx.fillStyle = '#6688aa'; ctx.font = '7px monospace';
  ctx.fillText(`${s.planets.length} planet${s.planets.length > 1 ? 's' : ''}`, 6, 24);
  ctx.fillText(`Planet ${orbitCursor + 1}/${s.planets.length}`, 6, 34);

  // Artifact indicator
  if (s.artifact) {
    ctx.fillStyle = '#04041a'; ctx.fillRect(2, 40, 90, 18);
    ctx.strokeStyle = '#ffaa22'; ctx.strokeRect(2, 40, 90, 18);
    ctx.fillStyle = '#ffcc44'; ctx.font = 'bold 7px monospace';
    if (s.alien && !defeatedAliens.has(currentStarIdx)) {
      ctx.fillText('SEAL GUARDED', 6, 52);
    } else {
      ctx.fillText('SEAL! Press C', 6, 52);
    }
  }

  // Bottom HUD bar (SC2 style)
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, H - 16, W, 16);
  ctx.fillStyle = '#2244aa'; ctx.fillRect(0, H - 16, W, 1);
  ctx.fillStyle = '#6688aa'; ctx.font = '7px monospace';
  ctx.fillText(`FUEL:${fuel}`, 4, H - 4);
  ctx.fillStyle = '#ffcc44'; ctx.fillText(`RU:${minerals}`, 55, H - 4);
  ctx.fillStyle = '#44cc88'; ctx.fillText(`CREW:${crew}`, 100, H - 4);
  ctx.fillStyle = '#445566'; ctx.textAlign = 'right'; ctx.font = '7px monospace';
  ctx.fillText('LEFT/RIGHT  SPACE scan  Z land  Q back', W - 4, H - 4);
  ctx.textAlign = 'left';

  // Message
  if (messageTimer > 0) {
    messageTimer--;
    ctx.fillStyle = '#ffcc44'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText(gameMessage, starX, H/2 + 70);
    ctx.textAlign = 'left';
  }
}

// ==================== SCREEN: DIALOGUE ====================
function updateDialogue() {
  const d = DIALOGUES[dialogue.race];
  if (dialogue.stage === 'greeting') {
    // Merge base choices with quest-specific choices
    const questExtra = getQuestChoices(dialogue.race);
    const choices = [...questExtra, ...d.choices];
    if (justPressed['ArrowUp'] || justPressed['KeyW']) { dialogueChoice = (dialogueChoice - 1 + choices.length) % choices.length; sfx.select(); }
    if (justPressed['ArrowDown'] || justPressed['KeyS']) { dialogueChoice = (dialogueChoice + 1) % choices.length; sfx.select(); }
    if (justPressed['Space'] || justPressed['Enter']) {
      const choice = choices[dialogueChoice];
      dialogue.stage = 'response';
      dialogue.text = choice.response;
      dialogue.action = choice.action;
      dialogue.cost = choice.cost;
      dialogue.give = choice.give;
      dialogue.quest = choice.quest;
      sfx.confirm();
    }
  } else if (dialogue.stage === 'response') {
    if (justPressed['Space'] || justPressed['Enter']) {
      const act = dialogue.action;
      if (act === 'fight' || act === 'spar') {
        combatEnemy = dialogue.race;
        if (fleet.length > 1) {
          state = 'fleetselect';
          fleetCursor = 0;
          sfx.confirm();
        } else {
          state = 'combat';
          initCombat(combatEnemy);
          music.play(combatEnemy === 'orz' ? 'boss' : 'combat');
        }
      } else if (act === 'trade') {
        if (minerals >= (dialogue.cost || 0)) {
          minerals -= dialogue.cost;
          defeatedAliens.add(dialogue.starIdx);
          gameMessage = 'Trade successful. They will let you pass.';
          messageTimer = 90;
        } else {
          gameMessage = 'Not enough minerals!';
          messageTimer = 60;
        }
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'swtrade') {
        if (minerals >= (dialogue.cost || 0)) {
          minerals -= dialogue.cost;
          fuel += dialogue.give || 0;
          defeatedAliens.add(dialogue.starIdx);
          gameMessage = `Traded ${dialogue.cost} minerals for ${dialogue.give} fuel!`;
          messageTimer = 90;
        } else {
          gameMessage = 'Not enough minerals!';
          messageTimer = 60;
        }
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'techupgrade') {
        // Melnorme tech upgrade — buy permanent ship enhancements
        if (minerals >= (dialogue.cost || 50)) {
          minerals -= dialogue.cost || 50;
          // Cycle through tech upgrades
          if (!window._melnormeTech) window._melnormeTech = 0;
          const techs = ['recharge', 'thrust', 'turn', 'weapon'];
          const tech = techs[window._melnormeTech % techs.length];
          window._melnormeTech++;
          if (tech === 'recharge') { SHIP_TYPES.player.energyRegen *= 1.25; gameMessage = 'Tech upgrade: Energy recharge +25%!'; }
          else if (tech === 'thrust') { SHIP_TYPES.player.thrust += 0.05; gameMessage = 'Tech upgrade: Thrust power increased!'; }
          else if (tech === 'turn') { SHIP_TYPES.player.turnSpeed += 0.01; gameMessage = 'Tech upgrade: Turn speed increased!'; }
          else { SHIP_TYPES.player.weapon.damage += 1; gameMessage = 'Tech upgrade: Weapon damage +1!'; }
          messageTimer = 120;
          sfx.victory();
        } else {
          gameMessage = 'Not enough minerals for tech upgrade!';
          messageTimer = 60;
        }
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'starlocs') {
        // Melnorme reveals Rainbow world locations
        if (minerals >= (dialogue.cost || 20)) {
          minerals -= dialogue.cost || 20;
          // Mark some unvisited stars as revealed
          let revealed = 0;
          for (const s of starMap) {
            if (!s.visited && s.planets.some(p => p.type === 'Rainbow') && revealed < 3) {
              s.visited = true; // show on map
              revealed++;
            }
          }
          gameMessage = revealed > 0 ? `Revealed ${revealed} Rainbow world locations!` : 'No new locations to reveal!';
          messageTimer = 120;
          sfx.scan();
        } else {
          gameMessage = 'Not enough minerals!';
          messageTimer = 60;
        }
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'sellbio') {
        // Sell bio-data for minerals
        // Count bio-data collected (tracked as a counter)
        if (!window._bioData) window._bioData = 0;
        if (window._bioData > 0) {
          const payment = window._bioData * 3;
          minerals += payment;
          gameMessage = `Sold ${window._bioData} bio-data for ${payment} RU!`;
          window._bioData = 0;
          messageTimer = 90;
          sfx.pickup();
        } else {
          gameMessage = 'No bio-data to sell! Collect specimens on planet surfaces.';
          messageTimer = 90;
        }
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'heal') {
        crew = Math.min(maxCrew, crew + 10);
        defeatedAliens.add(dialogue.starIdx);
        gameMessage = '+10 crew restored!';
        messageTimer = 90;
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'fuel') {
        fuel += 30;
        defeatedAliens.add(dialogue.starIdx);
        gameMessage = '+30 fuel!';
        messageTimer = 90;
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'minerals') {
        minerals += 30;
        defeatedAliens.add(dialogue.starIdx);
        gameMessage = '+30 minerals!';
        messageTimer = 90;
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'ally') {
        // Alien joins your fleet! (SC2's alliance system)
        const race = dialogue.race;
        if (!fleet.includes(race)) {
          fleet.push(race);
          defeatedAliens.add(dialogue.starIdx);
          gameMessage = `${SHIP_TYPES[race].race} joins your fleet!`;
          messageTimer = 120;
          sfx.victory();
        } else {
          gameMessage = 'Already in your fleet.';
          messageTimer = 60;
        }
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'quasispace') {
        // Enter QuasiSpace!
        inQuasiSpace = true;
        quasiX = 0; quasiY = 0; quasiVX = 0; quasiVY = 0;
        quasiAngle = -Math.PI / 2;
        state = 'map';
        gameMessage = 'Entered QuasiSpace!';
        messageTimer = 120;
        sfx.warp();
      } else if (act === 'flee') {
        returnToHyperSpace(); sfx.warp();
      } else if (act === 'fight_quest') {
        // Quest-triggered fight — set quest flag on victory
        window._pendingQuest = dialogue.quest;
        combatEnemy = dialogue.race;
        if (fleet.length > 1) {
          state = 'fleetselect'; fleetCursor = 0; sfx.confirm();
        } else {
          state = 'combat'; initCombat(combatEnemy);
          music.play('combat');
        }
      } else if (act === 'buy_quest') {
        // Buy a quest item
        if (minerals >= (dialogue.cost || 0)) {
          minerals -= dialogue.cost;
          questFlags[dialogue.quest] = true;
          gameMessage = 'Acquired quest item!';
          messageTimer = 120; sfx.victory();
        } else {
          gameMessage = 'Not enough minerals!';
          messageTimer = 60;
        }
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'trigger_quest') {
        // Instantly complete a quest
        const q = dialogue.quest;
        if (q === 'yehat_rebellion') { questFlags.yehat_rebelled = true; if (!fleet.includes('yehat')) fleet.push('yehat'); }
        else if (q === 'shofixti_revival') { questFlags.shofixti_revived = true; if (!fleet.includes('shofixti')) fleet.push('shofixti'); }
        else if (q === 'syreen_vault') { questFlags.syreen_vault = true; if (!fleet.includes('syreen')) fleet.push('syreen'); }
        else questFlags[q] = true;
        gameMessage = 'Quest completed!';
        messageTimer = 120; sfx.victory();
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'ally_quest') {
        // Join fleet + set quest flag
        const race = dialogue.race;
        if (!fleet.includes(race)) fleet.push(race);
        questFlags[dialogue.quest] = true;
        gameMessage = `${SHIP_TYPES[race].race} joins your fleet! Quest updated!`;
        messageTimer = 120; sfx.victory();
        returnAfterDialogue(); sfx.confirm();
      } else {
        // info - just dismiss
        returnAfterDialogue(); sfx.confirm();
      }
    }
  }
}

function drawDialogue() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
