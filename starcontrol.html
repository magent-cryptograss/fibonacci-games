  const d = DIALOGUES[dialogue.race];
  const raceColor = SHIP_TYPES[dialogue.race].color;

  // === SC2 Comm Screen Layout ===
  // Portrait fills entire left half (SC2 style — big alien face)
  const portW = Math.floor(W * 0.45);
  const portH = Math.floor(H * 0.7);

  // Portrait background — race-tinted dark
  ctx.fillStyle = '#060610'; ctx.fillRect(0, 0, portW, portH);
  // Draw portrait scaled up to fill the area
  ctx.save();
  ctx.beginPath(); ctx.rect(2, 2, portW - 4, portH - 4); ctx.clip();
  const pScale = Math.min((portW - 8) / 64, (portH - 8) / 64);
  ctx.translate(portW / 2 - 32 * pScale, portH / 2 - 32 * pScale);
  ctx.scale(pScale, pScale);
  drawAlienPortrait(dialogue.race, 0, 0);
  ctx.restore();
  // SC2 comm screen scanlines (CRT effect on portrait)
  ctx.globalAlpha = 0.08;
  for (let sl = 0; sl < portH; sl += 2) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, sl, portW, 1);
  }
  ctx.globalAlpha = 1;
  // SC2 comm static flicker (occasional)
  if (Math.random() < 0.03) {
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#ffffff';
    const staticY = Math.random() * portH;
    ctx.fillRect(0, staticY, portW, 2);
    ctx.globalAlpha = 1;
  }
  // SC2 comm border — double line in race color
  ctx.strokeStyle = raceColor; ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, portW - 2, portH - 2);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
  ctx.strokeRect(3, 3, portW - 6, portH - 6);

  // SC2-style talking animation — mouth moves during speech
  // Mouth overlay drawn over portrait at scaled position
  if (dialogue.text) {
    ctx.save();
    ctx.beginPath(); ctx.rect(2, 2, portW - 4, portH - 4); ctx.clip();
    const mScale = Math.min((portW - 8) / 64, (portH - 8) / 64);
    ctx.translate(portW / 2 - 32 * mScale, portH / 2 - 32 * mScale);
    ctx.scale(mScale, mScale);
    // Animated mouth — opens and closes rhythmically
    const mouthOpen = Math.abs(Math.sin(frame * 0.25)) * 4 + 1;
    const mouthX = 32, mouthY = 50;
    ctx.fillStyle = '#110808';
    ctx.beginPath();
    ctx.ellipse(mouthX, mouthY, 6, mouthOpen, 0, 0, TAU);
    ctx.fill();
    // Lip highlight
    ctx.strokeStyle = DIALOGUES[dialogue.race]?.portrait?.skin || '#884444';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(mouthX, mouthY, 6, mouthOpen, 0, 0, TAU);
    ctx.stroke();
    ctx.restore();
  }

  // Race name plate (below portrait, SC2 style)
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, portH, portW, H - portH);
  ctx.strokeStyle = raceColor; ctx.lineWidth = 1;
  ctx.strokeRect(0, portH, portW, H - portH);
  ctx.fillStyle = raceColor; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText(SHIP_TYPES[dialogue.race].race.toUpperCase(), portW / 2, portH + 14);
  // Ship sprite
  ctx.save(); ctx.translate(portW / 2, portH + 38); ctx.scale(0.7, 0.7);
  SHIP_TYPES[dialogue.race].draw({ flash: 0, thrusting: false, def: SHIP_TYPES[dialogue.race], shieldTimer: 0 });
  ctx.restore();
  ctx.textAlign = 'left';

  // === Right side: Text area (SC2 comm style) ===
  const textX = portW + 4;
  const textW2 = W - portW - 8;

  // SC2 speech area — dark blue background with race-colored border
  ctx.fillStyle = '#04041a'; ctx.fillRect(textX, 0, textW2, portH);
  ctx.strokeStyle = '#222'; ctx.strokeRect(textX, 0, textW2, portH);
  // Top accent line
  ctx.fillStyle = raceColor; ctx.fillRect(textX, 0, textW2, 2);

  // SC2-style alien voice — play vocal syllables periodically
  if (frame % 25 === 0) {
    sfx.alienVoice(dialogue.race);
  }

  // SC2 green/race-colored alien speech text
  ctx.fillStyle = '#33ff33'; ctx.font = '8px monospace';
  const words = dialogue.text.split(' ');
  let line = '', y = 16;
  const maxChars = Math.floor(textW2 / 5) - 1;
  for (const word of words) {
    const test = line + word + ' ';
    if (test.length > maxChars) {
      ctx.fillText(line, textX + 6, y);
      line = word + ' '; y += 10;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, textX + 6, y);

  // Choices or continue prompt
  if (dialogue.stage === 'greeting') {
    const questExtra = getQuestChoices(dialogue.race);
    const choices = [...questExtra, ...d.choices];
    const choiceY0 = Math.max(y + 16, portH * 0.45);
    // SC2 style: player responses in different color
    ctx.fillStyle = '#224488'; ctx.fillRect(textX, choiceY0 - 6, textW2, portH - choiceY0 + 6);
    ctx.fillStyle = raceColor; ctx.fillRect(textX, choiceY0 - 6, textW2, 1);
    for (let i = 0; i < choices.length; i++) {
      const cy = choiceY0 + i * 18;
      const sel = i === dialogueChoice;
      if (sel) {
        ctx.fillStyle = 'rgba(68,136,255,0.25)';
        ctx.fillRect(textX + 2, cy - 2, textW2 - 4, 16);
      }
      ctx.fillStyle = sel ? '#ffcc00' : '#8888cc'; ctx.font = '8px monospace';
      const cText = (sel ? '\u25B6 ' : '  ') + choices[i].text;
      // Word wrap choices
      if (cText.length > maxChars) {
        ctx.fillText(cText.substring(0, maxChars), textX + 6, cy + 6);
        ctx.fillText('  ' + cText.substring(maxChars), textX + 6, cy + 14);
      } else {
        ctx.fillText(cText, textX + 6, cy + 8);
      }
    }
  } else {
    ctx.fillStyle = '#ffcc00'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    if (Math.floor(Date.now() / 400) % 2) ctx.fillText('- SPACE to continue -', textX + textW2 / 2, portH - 10);
    ctx.textAlign = 'left';
  }

  // Bottom status bar (SC2 style)
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(portW, portH, textW2 + 8, H - portH);
  ctx.strokeStyle = '#333'; ctx.strokeRect(portW, portH, textW2 + 8, H - portH);
  // Player ship info
  ctx.fillStyle = '#4488ff'; ctx.font = '8px monospace';
  ctx.fillText(`Crew: ${crew}`, portW + 8, portH + 14);
  ctx.fillText(`Fuel: ${fuel}`, portW + 8, portH + 24);
  ctx.fillStyle = '#ffcc44';
  ctx.fillText(`Minerals: ${minerals}`, portW + 70, portH + 14);
  ctx.fillText(`Artifacts: ${artifacts}/3`, portW + 70, portH + 24);
  // Controls
  ctx.fillStyle = '#444'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('UP/DOWN select  SPACE confirm', W / 2 + portW / 4, H - 4);
  ctx.textAlign = 'left';
}

// ==================== SCREEN: PLANET LANDER (SC2 Surface Exploration) ====================
function initLander(planetIdx) {
  currentPlanetIdx = planetIdx;
  const s = starMap[currentStarIdx];
  const p = s.planets[planetIdx];
  surfaceWidth = 640;
  surfaceHeight = 200;
  // Generate terrain height map (SC2 had scrolling terrain)
  surfaceTerrain = [];
  const baseH = p.type === 'Rocky' ? 40 : p.type === 'Volcanic' ? 50 : p.type === 'Desert' ? 30 : p.type === 'Ice' ? 35 : 25;
  for (let i = 0; i <= surfaceWidth; i++) {
    const h = baseH + Math.sin(i * 0.02) * 15 + Math.sin(i * 0.05) * 8 + Math.sin(i * 0.13) * 4;
    surfaceTerrain.push(Math.floor(h));
  }
  // Place mineral deposits on terrain
  surfaceDeposits = [];
  for (const dep of p.deposits) {
    const dx = Math.floor(dep.x / 640 * surfaceWidth);
    const tx = clamp(dx, 5, surfaceWidth - 5);
    surfaceDeposits.push({
      x: tx, y: surfaceHeight - surfaceTerrain[tx] - 2,
      type: dep.type, collected: dep.collected,
      origIdx: p.deposits.indexOf(dep),
    });
  }
  // Place biological lifeforms
  surfaceBio = [];
  for (let i = 0; i < (p.bioCount || 0); i++) {
    const bx = 40 + Math.random() * (surfaceWidth - 80);
    surfaceBio.push({
      x: bx, y: surfaceHeight - surfaceTerrain[Math.floor(bx)] - 4,
      type: Math.floor(Math.random() * 4), alive: true,
      vx: (Math.random() - 0.5) * 1.5, vy: 0,
    });
  }
  // Precursor artifacts (rare finds on planet surfaces — SC2 had various artifacts)
  surfaceArtifacts = [];
  if (Math.random() < 0.08) { // ~8% chance per planet
    const artifactTypes = [
      { name: 'Precursor Data Core', bonus: 'minerals', value: 50, color: '#ffcc44' },
      { name: 'Ancient Power Cell', bonus: 'fuel', value: 30, color: '#44ffaa' },
      { name: 'Alien Lifeform', bonus: 'bio', value: 20, color: '#ff88cc' },
      { name: 'Warp Field Amplifier', bonus: 'minerals', value: 100, color: '#cc88ff' },
    ];
    const art = artifactTypes[Math.floor(Math.random() * artifactTypes.length)];
    const ax = 50 + Math.random() * (surfaceWidth - 100);
    surfaceArtifacts.push({
      ...art, x: ax,
      y: surfaceHeight - surfaceTerrain[Math.floor(ax)] - 4,
      collected: false,
    });
  }
  // Hazard timers
  surfaceHazards = [];
  // Lander state
  landerX = surfaceWidth / 2;
  landerY = 20; // starts high (descending)
  landerVX = 0; landerVY = 0;
  landerAngle = 0;
  landerFuel = 50;
  landerCargo = [];
  landerMaxCargo = 10;
  landerHP = 5;
  landerMaxHP = 5;
}

function updateLander() {
  const s = starMap[currentStarIdx];
  const p = s.planets[currentPlanetIdx];
  const gravity = 0.08;
  const thrustPow = 0.2;

  // Controls — SC2 lander: left/right move, up thrusts against gravity
  if (keys['ArrowLeft'] || keys['KeyA']) landerVX -= 0.15;
  if (keys['ArrowRight'] || keys['KeyD']) landerVX += 0.15;
  if (keys['ArrowUp'] || keys['KeyW']) {
    landerVY -= thrustPow;
    if (landerFuel > 0) landerFuel -= 0.05;
  }

  // Gravity
  landerVY += gravity;
  // Drag
  landerVX *= 0.97; landerVY *= 0.99;
  // Speed limit
  landerVX = clamp(landerVX, -4, 4);
  landerVY = clamp(landerVY, -4, 4);
  // Move
  landerX += landerVX;
  landerY += landerVY;
  // Wrap horizontally (planet surface wraps)
  if (landerX < 0) landerX += surfaceWidth;
  if (landerX >= surfaceWidth) landerX -= surfaceWidth;
  // Terrain collision
  const terrH = surfaceTerrain[clamp(Math.floor(landerX), 0, surfaceWidth)];
  const groundY = surfaceHeight - terrH;
  if (landerY >= groundY - 4) {
    landerY = groundY - 4;
    landerVY = Math.min(0, landerVY);
    // Hard landing damage
    if (landerVY > 2) { landerHP--; sfx.hit(); }
    landerVX *= 0.9; // ground friction
  }
  // Ceiling
  if (landerY < 2) landerY = 2;

  // Collect mineral deposits
  for (const dep of surfaceDeposits) {
    if (!dep.collected && Math.abs(landerX - dep.x) < 8 && Math.abs(landerY - dep.y) < 8) {
      if (landerCargo.length < landerMaxCargo) {
        dep.collected = true;
        landerCargo.push(dep.type);
        // Mark original deposit as collected
        p.deposits[dep.origIdx].collected = true;
        sfx.pickup();
      }
    }
  }

  // Collect bio
  for (const bio of surfaceBio) {
    if (bio.alive && Math.abs(landerX - bio.x) < 8 && Math.abs(landerY - bio.y) < 8) {
      if (landerCargo.length < landerMaxCargo) {
        bio.alive = false;
        landerCargo.push(-1); // -1 = bio data
        sfx.pickup();
      }
    }
  }

  // Collect Precursor artifacts
  if (surfaceArtifacts) {
    for (const art of surfaceArtifacts) {
      if (!art.collected && Math.abs(landerX - art.x) < 10 && Math.abs(landerY - art.y) < 10) {
        art.collected = true;
        if (art.bonus === 'minerals') minerals += art.value;
        else if (art.bonus === 'fuel') fuel = Math.min(200, fuel + art.value);
        else if (art.bonus === 'bio') minerals += art.value;
        gameMessage = `ARTIFACT: ${art.name}! +${art.value} ${art.bonus}`;
        messageTimer = 120;
        sfx.victory();
      }
    }
  }

  // Update bio creatures
  for (const bio of surfaceBio) {
    if (!bio.alive) continue;
    bio.x += bio.vx;
    if (bio.x < 10 || bio.x > surfaceWidth - 10) bio.vx *= -1;
    const bTerrH = surfaceTerrain[clamp(Math.floor(bio.x), 0, surfaceWidth)];
    bio.y = surfaceHeight - bTerrH - 4;
  }

  // SC2-style hazards based on planet type
  if (p.hazard > 0 && frame % 40 === 0 && Math.random() < p.hazard * 0.2) {
    const hx = landerX + (Math.random() - 0.5) * 250;
    let hType;
    if (p.type === 'Volcanic') hType = Math.random() < 0.7 ? 'lava' : 'quake';
    else if (p.type === 'Toxic') hType = Math.random() < 0.6 ? 'acid' : 'lightning';
    else if (p.type === 'Water') hType = Math.random() < 0.5 ? 'lightning' : 'quake';
    else if (p.type === 'Ice') hType = Math.random() < 0.5 ? 'quake' : 'lightning';
    else if (p.type === 'Desert') hType = 'meteorite';
    else if (p.type === 'Jungle') hType = Math.random() < 0.5 ? 'lightning' : 'bioattack';
    else hType = ['quake', 'lightning', 'meteorite'][Math.floor(Math.random() * 3)];
    surfaceHazards.push({ x: hx, y: hType === 'lightning' ? 0 : hType === 'meteorite' ? 0 : surfaceHeight - 10, type: hType, timer: hType === 'lightning' ? 15 : hType === 'meteorite' ? 60 : 40 + Math.random() * 30, vy: hType === 'meteorite' ? 3 : 0 });
  }
  // Hostile bio creatures attack lander (SC2 had aggressive life forms)
  for (const bio of surfaceBio) {
    if (!bio.alive) continue;
    const dx = landerX - bio.x;
    if (Math.abs(dx) < 60 && Math.abs(landerY - bio.y) < 30) {
      bio.vx = Math.sign(dx) * 1.5; // chase lander
      if (Math.abs(dx) < 10 && Math.abs(landerY - bio.y) < 12 && frame % 20 === 0) {
        landerHP--; sfx.hit(); screenShake = 2;
        gameMessage = 'Bio-hazard attack!'; messageTimer = 30;
      }
    }
  }
  // Update hazards
  for (let i = surfaceHazards.length - 1; i >= 0; i--) {
    const h = surfaceHazards[i];
    h.timer--;
    if (h.type === 'meteorite') {
      h.y += h.vy; h.x += (Math.random() - 0.5) * 0.5;
      if (h.y > surfaceHeight - 10) { h.timer = 0; screenShake = 4; sfx.hit(); }
    }
    // Damage lander if close
    if (h.type === 'lightning' && h.timer < 5 && h.timer > 0) {
      if (Math.abs(landerX - h.x) < 15) { landerHP -= 2; sfx.explode(); screenShake = 5; }
    } else if (h.type === 'meteorite' && Math.abs(landerX - h.x) < 12 && Math.abs(landerY - h.y) < 12) {
      landerHP -= 2; sfx.hit(); screenShake = 4; h.timer = 0;
    } else if (h.timer > 10 && h.timer < 30 && Math.abs(landerX - h.x) < 20 && landerY > surfaceHeight - 40) {
      if (frame % 15 === 0) { landerHP--; sfx.hit(); screenShake = 3; }
    }
    if (h.timer <= 0) surfaceHazards.splice(i, 1);
  }

  // Launch back to orbit (Escape or Q)
  if (justPressed['Escape'] || justPressed['KeyQ'] || landerHP <= 0) {
    // Return cargo to ship
    let totalMinerals = 0;
    let bioData = 0;
    for (const c of landerCargo) {
      if (c === -1) { bioData++; minerals += 3; totalMinerals += 3; if (!window._bioData) window._bioData = 0; window._bioData++; }
      else { const val = MINERAL_TYPES[c].value; minerals += val; totalMinerals += val; }
    }
    if (landerHP <= 0) {
      crew = Math.max(0, crew - 3);
      gameMessage = `Lander destroyed! Lost 3 crew. Salvaged ${totalMinerals} RU`;
    } else {
      gameMessage = `Collected ${totalMinerals} RU${bioData > 0 ? `, ${bioData} bio` : ''}`;
    }
    messageTimer = 90;
    state = 'orbit';
    music.play('orbit');
    sfx.confirm();
  }
}

function drawLander() {
  const s = starMap[currentStarIdx];
  const p = s.planets[currentPlanetIdx];
  const camX = clamp(landerX - W / 2, 0, Math.max(0, surfaceWidth - W));

  // === SC2 Planet Surface Background ===
  // Sky color based on planet type
  const skyColors = {
    Rocky: '#1a0800', Volcanic: '#2a0800', Desert: '#1a1400',
    Water: '#001122', Jungle: '#001808', Ice: '#0a1020',
    Toxic: '#0a1400', 'Gas Giant': '#0a0000', Rainbow: '#0a0014',
  };
  if (p.type === 'Rainbow') {
    const hue = (frame * 0.5) % 360;
    ctx.fillStyle = `hsl(${hue}, 30%, 5%)`;
  } else {
    ctx.fillStyle = skyColors[p.type] || '#0a0a0a';
  }
  ctx.fillRect(0, 0, W, H);

  // Stars in sky (top portion)
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = '#888';
    ctx.fillRect((i * 47 + 3) % W, (i * 29 + 5) % (surfaceHeight - 30), 1, 1);
  }

  // Terrain
  const terrColor1 = {
    Rocky: '#664422', Volcanic: '#442211', Desert: '#886633',
    Water: '#224466', Jungle: '#225522', Ice: '#556688',
    Toxic: '#445522', 'Gas Giant': '#443322', Rainbow: '#444444',
  };
  const terrColor2 = {
    Rocky: '#553311', Volcanic: '#331100', Desert: '#775522',
    Water: '#113355', Jungle: '#114411', Ice: '#445577',
    Toxic: '#334411', 'Gas Giant': '#332211', Rainbow: '#333333',
  };

  // Draw terrain fill
  for (let sx = 0; sx < W; sx++) {
    const wx = Math.floor(sx + camX);
    if (wx < 0 || wx >= surfaceWidth) continue;
    const th = surfaceTerrain[wx];
    if (p.type === 'Rainbow') {
      const hue = (wx * 2 + frame * 0.3) % 360;
      ctx.fillStyle = `hsl(${hue}, 60%, 30%)`;
    } else {
      ctx.fillStyle = terrColor1[p.type] || '#444';
    }
    ctx.fillRect(sx, surfaceHeight - th, 1, th);
  }
  // Terrain surface line
  for (let sx = 0; sx < W; sx++) {
    const wx = Math.floor(sx + camX);
    if (wx < 0 || wx >= surfaceWidth) continue;
    const th = surfaceTerrain[wx];
    if (p.type === 'Rainbow') {
      const hue = (wx * 2 + frame * 0.3 + 30) % 360;
      ctx.fillStyle = `hsl(${hue}, 70%, 45%)`;
    } else {
      ctx.fillStyle = terrColor2[p.type] || '#333';
    }
    ctx.fillRect(sx, surfaceHeight - th, 1, 2);
  }

  // Mineral deposits
  for (const dep of surfaceDeposits) {
    if (dep.collected) continue;
    const dx = dep.x - camX;
    if (dx < -10 || dx > W + 10) continue;
    const mt = MINERAL_TYPES[dep.type];
    ctx.fillStyle = mt.color;
    // SC2 mineral deposits: small colored squares with sparkle
    ctx.fillRect(dx - 2, dep.y - 2, 4, 4);
    ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.4;
    ctx.fillRect(dx - 1, dep.y - 1, 1, 1);
    ctx.globalAlpha = 1;
    // SC2-style sparkle — periodic glint
    if ((frame + dep.x * 7) % 40 < 4) {
      ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.7;
      ctx.fillRect(dx - 4, dep.y, 8, 1);
      ctx.fillRect(dx, dep.y - 4, 1, 8);
      ctx.globalAlpha = 1;
    }
  }

  // Bio creatures
  for (const bio of surfaceBio) {
    if (!bio.alive) continue;
    const bx = bio.x - camX;
    if (bx < -10 || bx > W + 10) continue;
    const bioColors = ['#44ff44', '#44ffaa', '#aaff44', '#ffaa44'];
    ctx.fillStyle = bioColors[bio.type % bioColors.length];
    // Simple creature shapes
    ctx.fillRect(bx - 3, bio.y - 3, 6, 4);
    ctx.fillRect(bx - 1, bio.y - 5, 2, 2); // head
    // Legs
    ctx.fillRect(bx - 3, bio.y + 1, 1, 2);
    ctx.fillRect(bx + 2, bio.y + 1, 1, 2);
  }

  // Precursor artifacts (glowing, pulsing items)
  if (surfaceArtifacts) {
    for (const art of surfaceArtifacts) {
      if (art.collected) continue;
      const ax = art.x - camX;
      if (ax < -10 || ax > W + 10) continue;
      // Pulsing glow
      ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.15;
      ctx.fillStyle = art.color;
      ctx.beginPath(); ctx.arc(ax, art.y, 8, 0, TAU); ctx.fill();
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = art.color;
      ctx.fillRect(ax - 3, art.y - 3, 6, 6);
      // Star sparkle
      ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.6 + Math.sin(frame * 0.15) * 0.3;
      ctx.fillRect(ax - 1, art.y - 5, 2, 10);
      ctx.fillRect(ax - 5, art.y - 1, 10, 2);
      ctx.globalAlpha = 1;
    }
  }

  // Hazards
  for (const h of surfaceHazards) {
    const hx = h.x - camX;
    if (hx < -30 || hx > W + 30) continue;
    if (h.type === 'lava') {
      ctx.fillStyle = '#ff4400'; ctx.globalAlpha = 0.5 + Math.sin(frame * 0.2) * 0.3;
      ctx.fillRect(hx - 10, surfaceHeight - 15, 20, 15);
      ctx.fillStyle = '#ffcc00'; ctx.globalAlpha = 0.6;
      ctx.fillRect(hx - 6, surfaceHeight - 10, 12, 8);
      ctx.globalAlpha = 1;
    } else if (h.type === 'acid') {
      ctx.fillStyle = '#88ff00'; ctx.globalAlpha = 0.4;
      for (let i = 0; i < 3; i++) {
        const ax = hx + Math.sin(frame * 0.1 + i * 2) * 8;
        ctx.fillRect(ax - 2, surfaceHeight - 20 - i * 6, 4, 4);
      }
      ctx.globalAlpha = 1;
    } else if (h.type === 'lightning') {
      // SC2 lightning bolt — jagged line from sky to ground
      if (h.timer < 10) {
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
        ctx.globalAlpha = h.timer / 10;
        ctx.beginPath(); ctx.moveTo(hx, 20);
        let lx2 = hx, ly2 = 20;
        for (let seg = 0; seg < 8; seg++) {
          lx2 += (Math.random() - 0.5) * 20;
          ly2 += (surfaceHeight - 20) / 8;
          ctx.lineTo(lx2, ly2);
        }
        ctx.stroke();
        // Flash glow
        ctx.strokeStyle = '#88ccff'; ctx.lineWidth = 4; ctx.globalAlpha *= 0.3;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    } else if (h.type === 'meteorite') {
      // Falling meteorite
      ctx.fillStyle = '#ff8844';
      ctx.beginPath(); ctx.arc(hx, h.y, 3, 0, TAU); ctx.fill();
      ctx.fillStyle = '#ffcc66';
      ctx.beginPath(); ctx.arc(hx, h.y, 1.5, 0, TAU); ctx.fill();
      // Trail
      ctx.globalAlpha = 0.4; ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(hx, h.y); ctx.lineTo(hx - 1, h.y - 15); ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (h.type === 'bioattack') {
      // Bio creature attack — green danger circle
      ctx.globalAlpha = 0.3 + Math.sin(frame * 0.3) * 0.2;
      ctx.fillStyle = '#44ff00';
      ctx.beginPath(); ctx.arc(hx, surfaceHeight - 10, 8, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Quake — screen shake + ground crack visual
      if (h.timer > 15 && h.timer < 35) {
        screenShake = 2;
        ctx.strokeStyle = '#664422'; ctx.lineWidth = 2; ctx.globalAlpha = 0.6;
        ctx.beginPath(); ctx.moveTo(hx - 15, surfaceHeight - 5);
        ctx.lineTo(hx - 5, surfaceHeight - 12); ctx.lineTo(hx + 3, surfaceHeight - 6);
        ctx.lineTo(hx + 15, surfaceHeight - 10); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }

  // === Lander ===
  const lx = landerX - camX;
  const ly = landerY;
  // Lander body (SC2 style — small boxy vehicle)
  ctx.fillStyle = '#888899';
  ctx.fillRect(lx - 4, ly - 4, 8, 6);
  ctx.fillStyle = '#aaaabb';
  ctx.fillRect(lx - 3, ly - 3, 6, 4);
  // Cockpit
  ctx.fillStyle = '#44aaff';
  ctx.fillRect(lx - 1, ly - 3, 2, 2);
  // Landing legs
  ctx.fillStyle = '#666677';
  ctx.fillRect(lx - 5, ly + 2, 2, 2);
  ctx.fillRect(lx + 3, ly + 2, 2, 2);
  // Thruster flame
  if (keys['ArrowUp'] || keys['KeyW']) {
    ctx.fillStyle = '#ff8844'; ctx.globalAlpha = 0.7 + Math.random() * 0.3;
    ctx.fillRect(lx - 2, ly + 4, 4, 3 + Math.random() * 3);
    ctx.fillStyle = '#ffcc44';
    ctx.fillRect(lx - 1, ly + 4, 2, 2);
    ctx.globalAlpha = 1;
  }

  // === HUD (SC2 lander HUD) ===
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, surfaceHeight, W, H - surfaceHeight);
  ctx.fillStyle = '#2244aa'; ctx.fillRect(0, surfaceHeight, W, 2);

  // HP bar
  ctx.fillStyle = '#6688aa'; ctx.font = '7px monospace';
  ctx.fillText('HULL', 4, surfaceHeight + 12);
  for (let i = 0; i < landerMaxHP; i++) {
    ctx.fillStyle = i < landerHP ? '#44ff44' : '#331111';
    ctx.fillRect(30 + i * 10, surfaceHeight + 6, 8, 6);
  }

  // Cargo
  ctx.fillStyle = '#6688aa';
  ctx.fillText('CARGO', 4, surfaceHeight + 24);
  for (let i = 0; i < landerMaxCargo; i++) {
    if (i < landerCargo.length) {
      const c = landerCargo[i];
      ctx.fillStyle = c === -1 ? '#44ff44' : MINERAL_TYPES[c].color;
    } else {
      ctx.fillStyle = '#222233';
    }
    ctx.fillRect(40 + i * 8, surfaceHeight + 18, 6, 6);
  }

  // Fuel
  ctx.fillStyle = '#6688aa';
  ctx.fillText('FUEL', 160, surfaceHeight + 12);
  ctx.fillStyle = '#111'; ctx.fillRect(186, surfaceHeight + 6, 40, 6);
  ctx.fillStyle = landerFuel > 10 ? '#22cc44' : '#cc4400';
  ctx.fillRect(186, surfaceHeight + 6, 40 * (landerFuel / 50), 6);

  // Planet info
  ctx.fillStyle = '#aaccff'; ctx.font = '7px monospace';
  ctx.fillText(p.name, 240, surfaceHeight + 12);
  ctx.fillStyle = '#6688aa';
  ctx.fillText(p.type, 240, surfaceHeight + 24);

  // Controls
  ctx.fillStyle = '#445566'; ctx.font = '6px monospace';
  ctx.fillText('ARROWS move  Q launch', 4, H - 2);

  // Remaining deposits count
  const remaining = surfaceDeposits.filter(d => !d.collected).length;
  const bioRemain = surfaceBio.filter(b => b.alive).length;
  ctx.fillStyle = '#ffcc44'; ctx.font = '7px monospace';
  ctx.fillText(`${remaining} deposits`, 160, surfaceHeight + 24);
  if (bioRemain > 0) {
    ctx.fillStyle = '#44ff44';
    ctx.fillText(`${bioRemain} life`, 230, surfaceHeight + 24);
  }

  // Warning for hazards
  if (surfaceHazards.length > 0) {
    ctx.fillStyle = '#ff4444'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
    if (Math.floor(frame / 10) % 2) ctx.fillText('!! HAZARD !!', W/2, 12);
    ctx.textAlign = 'left';
  }

  // Message
  if (messageTimer > 0) {
    messageTimer--;
    ctx.fillStyle = '#ffcc44'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText(gameMessage, W/2, surfaceHeight - 10);
    ctx.textAlign = 'left';
  }
}

// ==================== SCREEN: COMBAT ====================
function updateCombat() {
  // Player input
  if (keys['ArrowLeft'] || keys['KeyA']) playerShip.turnLeft();
  if (keys['ArrowRight'] || keys['KeyD']) playerShip.turnRight();
  if (keys['ArrowUp'] || keys['KeyW']) playerShip.thrustForward();
  if (keys['KeyZ']) playerShip.fire();
  if (justPressed['KeyX']) playerShip.useSpecial();

  // Emergency warp escape (SC2: you could flee combat)
  if (justPressed['Escape'] && state !== 'melee' && meleeState !== 'fight') {
    sfx.warp();
    fuel = Math.max(0, fuel - 5); // costs 5 fuel to emergency warp
    if (dialogue && dialogue.starIdx === -1) { returnToHyperSpace(); music.play('map'); }
    else { state = 'orbit'; orbitCursor = 0; scanTimer = 0; music.play('orbit'); }
    gameMessage = 'Emergency warp! (-5 fuel)';
    messageTimer = 90;
    return;
  }

  // Point defense system — auto-destroy nearby enemy projectiles
  if (playerShip.hasPointDef && frame % 8 === 0) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      if (p.owner !== playerShip && !p.gravBomb) {
        const d = dist(playerShip.x, playerShip.y, p.x, p.y);
        if (d < 35) {
          // Draw laser from ship to projectile (stored for rendering)
          if (!window._pdLasers) window._pdLasers = [];
          window._pdLasers.push({ x1: playerShip.x, y1: playerShip.y, x2: p.x, y2: p.y, life: 4 });
          spawnParticles(p.x, p.y, '#8888ff', 3, 1);
          projectiles.splice(i, 1);
          sfx.hit();
          break; // one per cycle
        }
      }
    }
  }

  // AI
  if (enemyShip.alive) updateAI(enemyShip, playerShip);

  // Update ships
  playerShip.update();
  enemyShip.update();

  // Update projectiles
  for (const p of projectiles) {
    // Homing
    if (p.homing && p.target && p.target.alive) {
      const a = angleTo(p.x, p.y, p.target.x, p.target.y);
      p.vx += Math.cos(a) * 0.15;
      p.vy += Math.sin(a) * 0.15;
      const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      if (spd > 6) { p.vx *= 6/spd; p.vy *= 6/spd; }
    }
    // SC2 Mycon plasmoid — grows larger as it travels (homing + size increase)
    if (p.homing && p.size >= 4 && !p.isMarine) {
      p.size = Math.min(8, p.size + 0.02); // slowly grows
      p.damage = Math.min(6, Math.floor(p.size)); // damage scales with size
    }
    // Kohr-Ah FRIED boomerang
    if (p.isFRIED) {
      p.spinAngle += 0.3;
      p.phaseTimer--;
      if (p.phase === 'out' && p.phaseTimer <= 0) {
        p.phase = 'return';
      }
      if (p.phase === 'return' && p.originShip && p.originShip.alive) {
        const a = angleTo(p.x, p.y, p.originShip.x, p.originShip.y);
        p.vx = Math.cos(a) * 5;
        p.vy = Math.sin(a) * 5;
        // Despawn when close to owner
        if (dist(p.x, p.y, p.originShip.x, p.originShip.y) < 15) {
          p.life = 0;
        }
      } else if (p.phase === 'return') {
        // Owner dead, blade just drifts and fades
        p.vx *= 0.98; p.vy *= 0.98;
      }
    }
    // Gravity bomb pulls
    if (p.gravBomb) {
      const target = p.owner === playerShip ? enemyShip : playerShip;
      const dx = p.x - target.x, dy = p.y - target.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d > 10 && d < 150) {
        target.vx += (dx/d) * 2 / d * 50;
        target.vy += (dy/d) * 2 / d * 50;
      }
    }
    p.x += p.vx; p.y += p.vy; p.life--;
    // Wrap
    const ARENA = 400;
    if (p.x < -ARENA) p.x += ARENA*2;
    if (p.x > ARENA) p.x -= ARENA*2;
    if (p.y < -ARENA) p.y += ARENA*2;
    if (p.y > ARENA) p.y -= ARENA*2;
  }

  // Collision: projectiles vs ships
  // Point defense module — auto-destroy nearby enemy projectiles
  if (playerShip.hasPointDef) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      if (p.owner !== playerShip && !p.gravBomb && dist(p.x, p.y, playerShip.x, playerShip.y) < 40) {
        spawnParticles(p.x, p.y, '#aaaaff', 3, 1);
        projectiles.splice(i, 1);
      }
    }
  }

  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    // vs player
    if (p.owner !== playerShip && dist(p.x, p.y, playerShip.x, playerShip.y) < 12 && !p.gravBomb && !p.isEscapePod) {
      playerShip.takeDamage(p.damage);
      spawnParticles(p.x, p.y, '#ff8844', 3, 1.5);
      projectiles.splice(i, 1); sfx.hit(); continue;
    }
    // vs enemy
    if (p.owner !== enemyShip && dist(p.x, p.y, enemyShip.x, enemyShip.y) < 12 && !p.gravBomb && !p.isEscapePod) {
      enemyShip.takeDamage(p.damage);
      spawnParticles(p.x, p.y, '#ff8844', 3, 1.5);
      projectiles.splice(i, 1); sfx.hit(); continue;
    }
    // Drone collision
    const droneOwner = p.owner === playerShip ? enemyShip : playerShip;
    for (const d of droneOwner.drones) {
      if (dist(p.x, p.y, d.x, d.y) < 8 && !p.gravBomb) {
        d.life = 0; projectiles.splice(i, 1); sfx.hit();
        spawnParticles(d.x, d.y, '#ffff44', 5, 2);
        break;
      }
    }
  }

  // Drone damage
  for (const d of playerShip.drones) {
    if (dist(d.x, d.y, enemyShip.x, enemyShip.y) < 14) {
      enemyShip.takeDamage(1);
      d.life = 0;
      spawnParticles(d.x, d.y, '#ffff44', 5, 2);
      sfx.hit();
    }
  }
  for (const d of enemyShip.drones) {
    if (dist(d.x, d.y, playerShip.x, playerShip.y) < 14) {
      playerShip.takeDamage(1);
      d.life = 0;
      spawnParticles(d.x, d.y, '#ffff44', 5, 2);
      sfx.hit();
    }
  }

  // Particles
  for (const p of particles) p.update();
  particles = particles.filter(p => p.life > 0);

  // SC2 combat asteroids — drift and wrap, damage ships on collision
  if (window._asteroids) {
    const ARENA = 400;
    for (const a of window._asteroids) {
      a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed;
      if (a.x < -ARENA) a.x += ARENA * 2;
      if (a.x > ARENA) a.x -= ARENA * 2;
      if (a.y < -ARENA) a.y += ARENA * 2;
      if (a.y > ARENA) a.y -= ARENA * 2;
      // Collision with ships
      if (playerShip.alive && dist(a.x, a.y, playerShip.x, playerShip.y) < a.size + 6) {
        playerShip.takeDamage(1);
        spawnParticles(a.x, a.y, a.color, 4, 1);
        sfx.hit();
      }
      if (enemyShip.alive && dist(a.x, a.y, enemyShip.x, enemyShip.y) < a.size + 6) {
        enemyShip.takeDamage(1);
        spawnParticles(a.x, a.y, a.color, 4, 1);
        sfx.hit();
      }
    }
  }

  // Check win/lose
  if (!playerShip.alive) {
    sfx.explode();
    spawnExplosion(playerShip.x, playerShip.y, playerShip.def.color, 2);
    playerShip.alive = true; playerShip.crew = -1; // prevent re-trigger
    if (state === 'melee' || meleeState === 'fight') {
      // Super Melee — just let the melee handler deal with it
    } else if (playerShip.isAlly) {
      // Ally ship destroyed — remove from fleet, pick next ship
      const idx = fleet.indexOf(playerShip.allyType);
      if (idx > -1) fleet.splice(idx, 1);
      if (fleet.length === 0) {
        crew = 0;
        setTimeout(() => { state = 'gameover'; music.stop(); sfx.defeat(); }, 800);
      } else {
        setTimeout(() => {
          state = 'fleetselect';
          fleetCursor = 0;
          gameMessage = playerShip.def.race + ' ship destroyed!';
          messageTimer = 90;
        }, 800);
      }
    } else {
      // Player flagship destroyed
      if (fleet.length > 1) {
        // Still have allied ships — switch to fleet select
        setTimeout(() => {
          state = 'fleetselect';
          fleetCursor = 0;
          crew = Math.max(1, Math.floor(crew * 0.5)); // lose half crew
          gameMessage = 'Flagship destroyed! Crew escapes to allied ship!';
          messageTimer = 120;
        }, 800);
      } else {
        // No fleet backup — escape pod back to starbase
        crew = Math.max(1, Math.floor(crew * 0.3)); // lose most crew
        minerals = Math.floor(minerals * 0.5); // lose half minerals
        setTimeout(() => {
          hyperX = 0; hyperY = 0; hyperVX = 0; hyperVY = 0;
          state = 'starbase'; starbaseCursor = 0;
          gameMessage = 'Escape pod! Limped back to starbase. Lost crew and cargo.';
          messageTimer = 180;
          music.play('starbase');
          sfx.alarm();
        }, 800);
      }
    }
  }
  if (!enemyShip.alive && enemyShip.crew === 0) {
    sfx.explode();
    spawnExplosion(enemyShip.x, enemyShip.y, enemyShip.def.color, 2);
    enemyShip.crew = -1; // prevent re-trigger
    if (state === 'melee' || meleeState === 'fight') {
      // Super Melee — handled by melee update
    } else {
      defeatedAliens.add(dialogue ? dialogue.starIdx : -1);
      if (!playerShip.isAlly) crew = playerShip.crew;
      // Quest completion on combat victory
      if (window._pendingQuest) {
        const pq = window._pendingQuest;
        if (pq === 'sun_device') { questFlags.sun_device = true; }
        else if (pq === 'shofixti_females') { questFlags.shofixti_females = true; }
        else { questFlags[pq] = true; }
        window._pendingQuest = null;
      }
      // Check if this was the final boss (Sa-Matra battle)
      if (questFlags.has_bomb && (enemyShip.type === 'kohrah' || enemyShip.type === 'urquan') && artifacts >= 3) {
        questFlags.samatra_destroyed = true;
        setTimeout(() => { state = 'victory'; music.stop(); sfx.victory(); }, 1000);
      } else if (enemyShip.type === 'orz' && artifacts >= 3) {
        setTimeout(() => { state = 'victory'; music.stop(); sfx.victory(); }, 1000);
      } else {
        setTimeout(() => {
          // Return to orbit if at a star, hyperspace if random encounter
          if (dialogue && dialogue.starIdx === -1) { returnToHyperSpace(); music.play('map'); }
          else { state = 'orbit'; orbitCursor = 0; scanTimer = 0; music.play('orbit'); }
          gameMessage = `${enemyShip.def.race} defeated! +50 minerals`;
          minerals += 50;
          messageTimer = 90;
          // Quest victory message
          if (questFlags.sun_device && !questFlags._sunMsg) { gameMessage += ' Got the Sun Device!'; questFlags._sunMsg = true; }
          if (questFlags.shofixti_females && !questFlags._shofMsg) { gameMessage += ' Found Shofixti survivors!'; questFlags._shofMsg = true; }
        }, 800);
      }
    }
  }
}

function drawCombat() {
  // Screen shake
  let shaking = screenShake > 0;
  if (shaking) {
    ctx.save();
    ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    screenShake--;
  }
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  // Camera centered on midpoint between ships, with dynamic zoom
  const shipDist = Math.hypot(playerShip.x - enemyShip.x, playerShip.y - enemyShip.y);
  // Zoom: 0.5 when close, down to 0.28 when far apart
  const targetZoom = Math.max(0.28, Math.min(0.5, 140 / Math.max(shipDist, 1)));
  if (!window._combatZoom) window._combatZoom = 0.5;
  window._combatZoom += (targetZoom - window._combatZoom) * 0.05;
  const zoom = window._combatZoom;

  // cx/cy: camera offset so midpoint of ships is at screen center
  // At zoom < 1, we see more world, so expand the offset
  const cx = (playerShip.x + enemyShip.x) / 2 - W / (2 * zoom);
  const cy = (playerShip.y + enemyShip.y) / 2 - H / (2 * zoom);

  // Apply zoom: scale all world drawing around top-left, with cx/cy adjusted for zoom
  ctx.save();
  ctx.scale(zoom, zoom);

  drawStarField(cx, cy, 60);

  // Planet - SC2 style colorful rotating planet
  if (combatPlanet) {
    const px = combatPlanet.x - cx, py = combatPlanet.y - cy;
    const R = PLANET_RADIUS;
    // Atmosphere glow
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#4488ff';
    ctx.beginPath(); ctx.arc(px, py, R + 8, 0, TAU); ctx.fill();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#2266cc';
    ctx.beginPath(); ctx.arc(px, py, R + 4, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
    // Planet base - blue/green world
    ctx.fillStyle = '#1144aa';
    ctx.beginPath(); ctx.arc(px, py, R, 0, TAU); ctx.fill();
    // Continents (rotating with time)
    ctx.save();
    ctx.beginPath(); ctx.arc(px, py, R, 0, TAU); ctx.clip();
    const rot = frame * 0.008;
    ctx.fillStyle = '#228833';
    ctx.beginPath(); ctx.arc(px + Math.cos(rot) * 8, py - 4, 7, 0, TAU); ctx.fill();
    ctx.fillStyle = '#33aa44';
    ctx.beginPath(); ctx.arc(px + Math.cos(rot + 1.5) * 10, py + 5, 5, 0, TAU); ctx.fill();
    ctx.fillStyle = '#44bb55';
    ctx.beginPath(); ctx.arc(px + Math.cos(rot + 3) * 6, py - 8, 4, 0, TAU); ctx.fill();
    ctx.fillStyle = '#cc9944';
    ctx.beginPath(); ctx.arc(px + Math.cos(rot + 4) * 9, py + 3, 3, 0, TAU); ctx.fill();
    // Ice caps
    ctx.fillStyle = '#ddeeff';
    ctx.fillRect(px - 6, py - R + 1, 12, 3);
    ctx.fillRect(px - 4, py + R - 4, 8, 3);
    // Cloud wisps
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + Math.cos(rot * 1.3) * 8 - 6, py - 5, 12, 2);
    ctx.fillRect(px + Math.cos(rot * 1.3 + 2) * 6 - 4, py + 6, 8, 2);
    ctx.globalAlpha = 1;
    ctx.restore();
    // Light/shadow gradient
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(px + 5, py + 4, R, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
    // Specular highlight
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px - 6, py - 6, R * 0.35, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
    // Gravity well rings (SC2 showed gravity influence)
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 1;
    for (let gr = 1; gr <= 3; gr++) {
      ctx.beginPath(); ctx.arc(px, py, R + gr * 12 + Math.sin(frame * 0.02 + gr) * 2, 0, TAU); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // SC2 combat asteroids rendering
  if (window._asteroids) {
    for (const a of window._asteroids) {
      const ax = a.x - cx, ay = a.y - cy;
      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(a.rot);
      // Irregular rocky shape
      ctx.fillStyle = a.color;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const ang = (i / 6) * TAU;
        const r = a.size * (0.7 + ((i * 137) % 10) / 30);
        if (i === 0) ctx.moveTo(Math.cos(ang) * r, Math.sin(ang) * r);
        else ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r);
      }
      ctx.closePath(); ctx.fill();
      // Highlight
      ctx.fillStyle = '#aaa';
      ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.arc(-a.size * 0.2, -a.size * 0.2, a.size * 0.3, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // Point defense lasers
  if (window._pdLasers) {
    for (let i = window._pdLasers.length - 1; i >= 0; i--) {
      const l = window._pdLasers[i];
      ctx.globalAlpha = l.life / 4;
      ctx.strokeStyle = '#8888ff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(l.x1 - cx, l.y1 - cy); ctx.lineTo(l.x2 - cx, l.y2 - cy); ctx.stroke();
      ctx.globalAlpha = 1;
      l.life--;
      if (l.life <= 0) window._pdLasers.splice(i, 1);
    }
  }

  // Projectiles — SC2-style weapon-specific rendering
  for (const p of projectiles) {
    const sx = p.x - cx, sy = p.y - cy;
    if (p.gravBomb) {
      // Gravity bomb: pulsing distortion sphere
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(sx, sy, 8 + Math.sin(frame * 0.2) * 3, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx, sy, 2, 0, TAU); ctx.fill();
    } else if (p.flameTrail) {
      // Thraddash flame trail: flickering fire
      const flicker = Math.random() * 0.4 + 0.6;
      ctx.globalAlpha = (p.life / 40) * flicker;
      ctx.fillStyle = '#ff4400';
      ctx.beginPath(); ctx.arc(sx, sy, p.size + Math.random() * 2, 0, TAU); ctx.fill();
      ctx.fillStyle = '#ffaa22';
      ctx.beginPath(); ctx.arc(sx, sy, p.size * 0.6, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    } else if (p.isMarine) {
      // Orz space marine — small humanoid figure
      ctx.fillStyle = '#55eebb';
      ctx.fillRect(sx - 1, sy - 3, 2, 4); // body
      ctx.fillRect(sx - 3, sy - 1, 6, 2); // arms
      ctx.fillStyle = '#aaffdd';
      ctx.fillRect(sx - 1, sy - 4, 2, 2); // head
    } else if (p.homing) {
      // Spathi BUTT torpedo: glowing seeker
      ctx.fillStyle = '#ff8800';
      ctx.beginPath(); ctx.arc(sx, sy, p.size, 0, TAU); ctx.fill();
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath(); ctx.arc(sx, sy, p.size * 0.5, 0, TAU); ctx.fill();
      // Contrail
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx - p.vx * 2, sy - p.vy * 2); ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (p.isCone) {
      // Umgah antimatter cone — glowing expanding blob
      const frac = p.life / 12;
      ctx.globalAlpha = frac * 0.7;
      ctx.fillStyle = p.color;
      const r = p.size * (1.5 - frac * 0.5);
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, TAU); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.globalAlpha = frac * 0.4;
      ctx.beginPath(); ctx.arc(sx, sy, r * 0.4, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    } else if (p.isBeam) {
      // SC2-style beam weapon: glowing line from source to current position
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = p.color; ctx.lineWidth = p.size;
      ctx.beginPath(); ctx.moveTo(sx - p.vx * 3, sy - p.vy * 3); ctx.lineTo(sx, sy); ctx.stroke();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1, p.size - 2);
      ctx.beginPath(); ctx.moveTo(sx - p.vx * 2, sy - p.vy * 2); ctx.lineTo(sx, sy); ctx.stroke();
      ctx.globalAlpha = 0.2;
      ctx.strokeStyle = p.color; ctx.lineWidth = p.size + 4;
      ctx.beginPath(); ctx.moveTo(sx - p.vx * 3, sy - p.vy * 3); ctx.lineTo(sx, sy); ctx.stroke();
      ctx.globalAlpha = 1;
      // Impact glow at tip
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx, sy, 2, 0, TAU); ctx.fill();
    } else if (p.isEscapePod) {
      // SC2 escape pod — tiny capsule tumbling away
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(frame * 0.1);
      ctx.fillStyle = '#ddd';
      ctx.fillRect(-2, -3, 4, 6);
      ctx.fillStyle = '#88ccff';
      ctx.fillRect(-1, -2, 2, 2); // window
      ctx.fillStyle = '#ff6644';
      ctx.fillRect(-1, 3, 2, 2); // thruster
      ctx.restore();
    } else if (p.isFRIED) {
      // Kohr-Ah FRIED: spinning blade with 4 arms
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(p.spinAngle);
      // Outer glow
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#ff4422';
      ctx.beginPath(); ctx.arc(0, 0, 10, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
      // Blade arms
      ctx.strokeStyle = '#ff2222'; ctx.lineWidth = 2;
      for (let ba = 0; ba < 4; ba++) {
        const a = (ba / 4) * TAU;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a) * 7, Math.sin(a) * 7);
        ctx.stroke();
        // Tip glow
        ctx.fillStyle = '#ffaa44';
        ctx.beginPath(); ctx.arc(Math.cos(a) * 7, Math.sin(a) * 7, 2, 0, TAU); ctx.fill();
      }
      // Center core
      ctx.fillStyle = '#ff6644';
      ctx.beginPath(); ctx.arc(0, 0, 3, 0, TAU); ctx.fill();
      ctx.restore();
    } else if (p.size >= 4) {
      // Large projectile: glow effect
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(sx, sy, p.size + 2, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(sx, sy, p.size, 0, TAU); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx, sy, p.size * 0.3, 0, TAU); ctx.fill();
    } else {
      // Standard projectile: bright core + trail
      ctx.fillStyle = p.color;
      ctx.fillRect(sx - p.size/2, sy - p.size/2, p.size, p.size);
      // Brighter core
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx - 0.5, sy - 0.5, 1, 1);
      // Motion trail
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = p.color;
      ctx.fillRect(sx - p.vx * 1 - p.size/2, sy - p.vy * 1 - p.size/2, p.size, p.size);
      ctx.globalAlpha = 0.15;
      ctx.fillRect(sx - p.vx * 2 - p.size/2, sy - p.vy * 2 - p.size/2, p.size, p.size);
      ctx.globalAlpha = 1;
    }
  }

  // Drones
  for (const ship of [playerShip, enemyShip]) {
    for (const d of ship.drones) {
      ctx.fillStyle = ship.def.color;
      ctx.fillRect(d.x - cx - 2, d.y - cy - 2, 4, 4);
      ctx.fillStyle = '#fff';
      ctx.fillRect(d.x - cx - 1, d.y - cy - 1, 2, 2);
    }
    // ZapSats (Chmmr orbiting satellites)
    if (ship.zapsats) {
      for (const z of ship.zapsats) {
        ctx.fillStyle = '#4466aa';
        ctx.beginPath();
        ctx.arc(z.x - cx, z.y - cy, 4, 0, TAU);
        ctx.fill();
        ctx.fillStyle = '#aaccff';
        ctx.beginPath();
        ctx.arc(z.x - cx, z.y - cy, 2, 0, TAU);
        ctx.fill();
      }
    }
  }

  // Ships
  if (playerShip.crew >= 0) playerShip.draw(cx, cy);
  if (enemyShip.crew >= 0) enemyShip.draw(cx, cy);

  // Particles
  for (const p of particles) p.draw(cx, cy);

  // End zoom transform (HUD drawn at screen scale)
  ctx.restore();

  // Off-screen enemy direction arrow (screen coords after zoom)
  const esx = (enemyShip.x - cx) * zoom, esy = (enemyShip.y - cy) * zoom;
  if (esx < -20 || esx > W + 20 || esy < -20 || esy > H + 20) {
    const ang = Math.atan2(esy - H/2, esx - W/2);
    const ax = W/2 + Math.cos(ang) * Math.min(W/2 - 44, H/2 - 20);
    const ay = H/2 + Math.sin(ang) * Math.min(W/2 - 44, H/2 - 20);
    ctx.save(); ctx.translate(ax, ay); ctx.rotate(ang);
    ctx.fillStyle = Math.floor(Date.now()/200)%2 ? '#ff4444' : '#ff8888';
    ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(-6, -6); ctx.lineTo(-6, 6); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // === SC2 Super Melee HUD ===
  // Player panel (left side, vertical) - ship icon + crew + battery
  const panelW = 36, panelH = H;
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, panelW, panelH);
  ctx.strokeStyle = '#334'; ctx.strokeRect(0, 0, panelW, panelH);

  // Player ship mini portrait
  ctx.fillStyle = '#111'; ctx.fillRect(2, 2, 32, 32);
  ctx.strokeStyle = playerShip.def.color; ctx.strokeRect(2, 2, 32, 32);
  ctx.save(); ctx.translate(18, 18); ctx.scale(0.8, 0.8);
  playerShip.def.draw({ flash: 0, thrusting: false, def: playerShip.def, shieldTimer: 0 });
  ctx.restore();

  // Player ship name
  ctx.fillStyle = playerShip.def.color; ctx.font = '8px monospace';
  ctx.save(); ctx.translate(6, 44); ctx.fillText(playerShip.def.name.substring(0, 5), 0, 0); ctx.restore();

  // Player crew dots (SC2 style column)
  const pCrew = Math.max(0, playerShip.crew);
  for (let i = 0; i < playerShip.def.maxCrew; i++) {
    const dx = 3 + (i % 4) * 8, dy = 50 + Math.floor(i / 4) * 6;
    ctx.fillStyle = i < pCrew ? '#44ff88' : '#1a1a1a';
    ctx.fillRect(dx, dy, 6, 4);
    if (i < pCrew) { ctx.fillStyle = '#88ffbb'; ctx.fillRect(dx, dy, 3, 2); }
  }

  // Player energy battery (SC2 segmented bar)
  const pBatY = H - 60;
  ctx.fillStyle = '#888'; ctx.font = '8px monospace';
  ctx.fillText('BAT', 4, pBatY - 4);
  const pSegs = 10;
  const pEFrac = playerShip.energy / playerShip.def.maxEnergy;
  for (let i = 0; i < pSegs; i++) {
    const by = pBatY + (pSegs - 1 - i) * 5;
    ctx.fillStyle = i / pSegs < pEFrac ? '#4488ff' : '#111';
    ctx.fillRect(4, by, 28, 4);
    if (i / pSegs < pEFrac) {
      ctx.fillStyle = '#66aaff'; ctx.fillRect(4, by, 28, 2);
    }
  }

  // Enemy panel (right side, vertical)
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(W - panelW, 0, panelW, panelH);
  ctx.strokeStyle = '#334'; ctx.strokeRect(W - panelW, 0, panelW, panelH);

  // Enemy ship mini portrait
  ctx.fillStyle = '#111'; ctx.fillRect(W - 34, 2, 32, 32);
  ctx.strokeStyle = enemyShip.def.color; ctx.strokeRect(W - 34, 2, 32, 32);
  ctx.save(); ctx.translate(W - 18, 18); ctx.scale(0.8, 0.8);
  enemyShip.def.draw({ flash: 0, thrusting: false, def: enemyShip.def, shieldTimer: 0 });
  ctx.restore();

  // Enemy ship name
  ctx.fillStyle = enemyShip.def.color; ctx.font = '8px monospace';
  ctx.save(); ctx.translate(W - 32, 44); ctx.fillText(enemyShip.def.name.substring(0, 5), 0, 0); ctx.restore();

  // Enemy crew dots
  const eCrew = Math.max(0, enemyShip.crew);
  for (let i = 0; i < enemyShip.def.maxCrew; i++) {
    const dx = W - 33 + (i % 4) * 8, dy = 50 + Math.floor(i / 4) * 6;
    ctx.fillStyle = i < eCrew ? '#ff6644' : '#1a1a1a';
    ctx.fillRect(dx, dy, 6, 4);
    if (i < eCrew) { ctx.fillStyle = '#ff9977'; ctx.fillRect(dx, dy, 3, 2); }
  }

  // Enemy energy battery
  const eEFrac = enemyShip.energy / enemyShip.def.maxEnergy;
  ctx.fillStyle = '#888'; ctx.font = '8px monospace';
  ctx.fillText('BAT', W - 32, pBatY - 4);
  for (let i = 0; i < pSegs; i++) {
    const by = pBatY + (pSegs - 1 - i) * 5;
    ctx.fillStyle = i / pSegs < eEFrac ? (enemyShip.def.color || '#ff4444') : '#111';
    ctx.fillRect(W - 32, by, 28, 4);
    if (i / pSegs < eEFrac) {
      ctx.fillStyle = enemyShip.def.accent || '#ff6666'; ctx.fillRect(W - 32, by, 28, 2);
    }
  }
  // SC2-style mini radar (bottom center, between HUD panels)
  const radarX = W / 2, radarY = H - 20, radarR = 16;
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(radarX, radarY, radarR + 1, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.5;
  ctx.strokeStyle = '#334466'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(radarX, radarY, radarR, 0, TAU); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(radarX - radarR, radarY); ctx.lineTo(radarX + radarR, radarY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(radarX, radarY - radarR); ctx.lineTo(radarX, radarY + radarR); ctx.stroke();
  ctx.globalAlpha = 1;
  // Player dot (green) with facing arrow
  const rScale = radarR / (ARENA * 1.2);
  const rpx = radarX + playerShip.x * rScale, rpy = radarY + playerShip.y * rScale;
  ctx.fillStyle = '#44ff88';
  ctx.fillRect(rpx - 1, rpy - 1, 2, 2);
  // Player facing line
  const pfa = playerShip.angle - Math.PI / 2;
  ctx.strokeStyle = '#44ff88'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(rpx, rpy); ctx.lineTo(rpx + Math.cos(pfa) * 4, rpy + Math.sin(pfa) * 4); ctx.stroke();
  // Enemy dot (red) with facing arrow
  const rex = radarX + enemyShip.x * rScale, rey = radarY + enemyShip.y * rScale;
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(rex - 1, rey - 1, 2, 2);
  const efa = enemyShip.angle - Math.PI / 2;
  ctx.strokeStyle = '#ff4444';
  ctx.beginPath(); ctx.moveTo(rex, rey); ctx.lineTo(rex + Math.cos(efa) * 4, rey + Math.sin(efa) * 4); ctx.stroke();
  // Planet dot (blue, if exists)
  if (combatPlanet) {
    const rpx2 = radarX + combatPlanet.x * rScale, rpy2 = radarY + combatPlanet.y * rScale;
    ctx.fillStyle = '#4488ff';
    ctx.beginPath(); ctx.arc(rpx2, rpy2, 2, 0, TAU); ctx.fill();
  }

  // End screen shake
  if (shaking) ctx.restore();
}

// ==================== SCREEN: GAME OVER ====================
function drawGameOver() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  // Red-tinted debris field
  for (let i = 0; i < 40; i++) {
    const dx = (i * 97.3 + frame * 0.2) % W;
    const dy = (i * 61.7 + frame * 0.1) % H;
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.02 + i) * 0.1;
    ctx.fillStyle = i % 3 === 0 ? '#441111' : i % 3 === 1 ? '#ff4422' : '#882211';
    ctx.fillRect(dx, dy, 1 + (i % 3), 1);
  }
  ctx.globalAlpha = 1;
  // Explosion remnant
  const exR = 30 + Math.sin(frame * 0.03) * 5;
  ctx.globalAlpha = 0.08; ctx.fillStyle = '#ff2200';
  ctx.beginPath(); ctx.arc(W/2, H/2 - 30, exR + 20, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.15; ctx.fillStyle = '#ff4400';
  ctx.beginPath(); ctx.arc(W/2, H/2 - 30, exR, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  // Red border box (SC2 style)
  ctx.fillStyle = 'rgba(20,0,0,0.8)'; ctx.fillRect(W/2 - 120, H/2 - 45, 240, 90);
  ctx.strokeStyle = '#cc0000'; ctx.lineWidth = 2; ctx.strokeRect(W/2 - 120, H/2 - 45, 240, 90);
  ctx.strokeStyle = '#660000'; ctx.lineWidth = 1; ctx.strokeRect(W/2 - 118, H/2 - 43, 236, 86);
  // Text
  ctx.fillStyle = '#ff0000'; ctx.font = 'bold 20px monospace';
  ctx.fillText('GAME OVER', W/2, H/2 - 18);
  ctx.fillStyle = '#cc8888'; ctx.font = '8px monospace';
  if (deathMarchWarning >= 4) {
    ctx.fillText('The Kohr-Ah Death March', W/2, H/2 - 4);
    ctx.fillText('has cleansed all life in the galaxy.', W/2, H/2 + 8);
  } else {
    ctx.fillText('The Vindicator is lost.', W/2, H/2);
    ctx.fillText('The dimensional rift grows wider...', W/2, H/2 + 12);
  }
  ctx.fillStyle = '#ffcc44'; ctx.fillText(`Precursor Seals: ${artifacts}/3`, W/2, H/2 + 28);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 8px monospace';
  if (Math.floor(Date.now()/500)%2) ctx.fillText('PRESS ANY KEY', W/2, H/2 + 55);
  ctx.textAlign = 'left';
  for (const k in justPressed) {
    if (justPressed[k]) { state = 'title'; break; }
  }
}

    const sx = (i * 137.5) % W;

  ctx.fillStyle = '#88aacc'; ctx.font = '8px monospace';
  ctx.fillText('The Orz are pushed back', W/2, 138);
  ctx.fillText('to the space *between* spaces.', W/2, 150);
  ctx.fillText('Their *fingers* no longer', W/2, 162);

  // Dynamic ending based on quests completed
  const allies = fleet.filter(f => f !== 'player').map(f => SHIP_TYPES[f]?.race || f);
  if (allies.length > 0) {

// ==================== FLEET SELECT (SC2 ship picker) ====================
function updateFleetSelect() {
  if (justPressed['ArrowUp'] || justPressed['w']) {
    fleetCursor = (fleetCursor - 1 + fleet.length) % fleet.length;
    sfx.select();
  }
  if (justPressed['ArrowDown'] || justPressed['s']) {
    fleetCursor = (fleetCursor + 1) % fleet.length;
    sfx.select();
  }
  if (justPressed['Enter'] || justPressed['Space']) {
    const chosen = fleet[fleetCursor];
    if (chosen === 'player') {
      state = 'combat';
      initCombat(combatEnemy);
    } else {
      state = 'combat';
      initCombatAlly(chosen, combatEnemy);
    }
    music.play(combatEnemy === 'orz' ? 'boss' : 'combat');
    sfx.confirm();
  }
  if (justPressed['Escape']) {
    state = 'dialogue';
    sfx.select();
  }
}

function drawFleetSelect() {
  ctx.fillStyle = '#000011';
  ctx.fillRect(0, 0, W, H);
  drawStarField(0, 0, 40, false);

  // Title
  ctx.fillStyle = '#44aaff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SELECT YOUR SHIP', W / 2, 24);

  // Enemy info on right side
  const eDef = SHIP_TYPES[combatEnemy];
  ctx.fillStyle = '#ff4444';
  ctx.font = '10px monospace';
  ctx.fillText('ENEMY: ' + (eDef ? eDef.race + ' ' + eDef.name : combatEnemy), W / 2, 40);

  // Fleet list
  const startY = 58;
  const rowH = 28;
  ctx.textAlign = 'left';

  for (let i = 0; i < fleet.length; i++) {
    const shipKey = fleet[i];
    const def = SHIP_TYPES[shipKey];
    const y = startY + i * rowH;
    const selected = i === fleetCursor;

    // Highlight box
    if (selected) {
      ctx.fillStyle = '#223366';
      ctx.fillRect(20, y - 10, W - 40, rowH - 2);
      ctx.strokeStyle = '#4488ff';
      ctx.lineWidth = 1;
      ctx.strokeRect(20, y - 10, W - 40, rowH - 2);
    }

    // Ship icon (small version)
    ctx.save();
    ctx.translate(40, y + 2);
    ctx.scale(0.4, 0.4);
    if (def && def.draw) def.draw(ctx, { x: 0, y: 0, angle: -Math.PI/2, isPlayer: true });
    ctx.restore();

    // Ship name and stats
    ctx.fillStyle = selected ? '#ffffff' : '#8899aa';
    ctx.font = selected ? 'bold 10px monospace' : '10px monospace';
    ctx.fillText((def ? def.race + ' ' + def.name : shipKey), 62, y + 2);

    // Crew bar
    if (def) {
      ctx.fillStyle = '#226622';
      ctx.fillRect(200, y - 4, 60, 8);
      ctx.fillStyle = '#44cc44';
      const crewPct = shipKey === 'player' ? crew / (def.maxCrew + getModuleStat('crew')) : 1;
      ctx.fillRect(200, y - 4, 60 * Math.min(1, crewPct), 8);
      ctx.fillStyle = '#aaddaa';
      ctx.font = '7px monospace';
      ctx.fillText('CREW', 205, y + 2);
    }
  }

  // Instructions
  ctx.fillStyle = '#667788';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('UP/DOWN to select, ENTER to launch, ESC to cancel', W / 2, H - 10);
}

function initCombatAlly(allyType, enemyType) {
  // Initialize combat with an allied ship instead of player's flagship
  const aDef = SHIP_TYPES[allyType];
  playerShip = new Ship(allyType, -120, 0, 0, true);
  playerShip.crew = aDef.maxCrew;
  playerShip.def = { ...aDef };
  playerShip.isAlly = true;
  playerShip.allyType = allyType;

  // SC2: VUX warp-in — starts right next to the player!
  const vuxWarp = enemyType === 'vux';
  const enemyStartX = vuxWarp ? -80 : 120;
  enemyShip = new Ship(enemyType, enemyStartX, vuxWarp ? 20 : 0, Math.PI, false);
  projectiles = []; particles = [];
  combatPlanet = { x: 0, y: 0, radius: PLANET_RADIUS };
  window._combatZoom = 0.5;
}

// ==================== SUPER MELEE (SC2's iconic ship vs ship mode) ====================
const MELEE_SHIPS = ['player','urquan','spathi','chmmr','zoqfotpik','orz','mycon','pkunk',
  'melnorme','kohrah','yehat','supox','utwig','thraddash','ilwrath','umgah','vux',
  'arilou','druuge','syreen','shofixti'];

// SC2 Super Melee fleet arrays (team of ships per side)
let meleeFleet1 = [], meleeFleet2 = [];
let meleeFleetIdx1 = 0, meleeFleetIdx2 = 0;

function updateMelee() {
  if (meleeState === 'pick1') {
    if (justPressed['ArrowUp'] || justPressed['KeyW']) { meleeCursor1 = (meleeCursor1 - 1 + MELEE_SHIPS.length) % MELEE_SHIPS.length; sfx.select(); }
    if (justPressed['ArrowDown'] || justPressed['KeyS']) { meleeCursor1 = (meleeCursor1 + 1) % MELEE_SHIPS.length; sfx.select(); }
    if (justPressed['Enter'] || justPressed['Space']) {
      // Add ship to fleet (up to 7)
      if (meleeFleet1.length < 7) {
        meleeFleet1.push(MELEE_SHIPS[meleeCursor1]);
        sfx.confirm();
      }
    }
    // Remove last ship with backspace
    if (justPressed['Backspace'] && meleeFleet1.length > 0) { meleeFleet1.pop(); sfx.select(); }
    // Done building fleet — move to P2
    if (justPressed['KeyD'] && meleeFleet1.length > 0) {
      meleeState = 'pick2';
      sfx.confirm();
    }
    if (justPressed['Escape']) { state = 'title'; meleeFleet1 = []; sfx.select(); }
  } else if (meleeState === 'pick2') {
    if (justPressed['ArrowUp'] || justPressed['KeyW']) { meleeCursor2 = (meleeCursor2 - 1 + MELEE_SHIPS.length) % MELEE_SHIPS.length; sfx.select(); }
    if (justPressed['ArrowDown'] || justPressed['KeyS']) { meleeCursor2 = (meleeCursor2 + 1) % MELEE_SHIPS.length; sfx.select(); }
    if (justPressed['Enter'] || justPressed['Space']) {
      if (meleeFleet2.length < 7) {
        meleeFleet2.push(MELEE_SHIPS[meleeCursor2]);
        sfx.confirm();
      }
    }
    if (justPressed['Backspace'] && meleeFleet2.length > 0) { meleeFleet2.pop(); sfx.select(); }
    if (justPressed['KeyD'] && meleeFleet2.length > 0) {
      // Start fleet battle!
      meleeState = 'fight';
      meleeFleetIdx1 = 0; meleeFleetIdx2 = 0;
      initCombatAlly(meleeFleet1[0], meleeFleet2[0]);
      playerShip.isAlly = false;
      music.play('combat');
      sfx.confirm();
    }
    if (justPressed['Escape']) { meleeState = 'pick1'; meleeFleet2 = []; sfx.select(); }
  } else if (meleeState === 'fight') {
    updateCombat();
    // Check for ship destruction
    if ((playerShip.crew <= 0 || enemyShip.crew <= 0) && !window._meleeEnd) {
      window._meleeEnd = frame;
      if (playerShip.crew <= 0) {
        meleeFleetIdx1++;
        if (meleeFleetIdx1 >= meleeFleet1.length) {
          window._meleeWinner = 'PLAYER 2 WINS! (' + meleeFleet2.length + ' ships vs ' + meleeFleet1.length + ')';
        } else {
          window._meleeWinner = SHIP_TYPES[meleeFleet1[meleeFleetIdx1 - 1]]?.race + ' destroyed! Next ship...';
          window._meleeNextShip = true;
        }
      } else {
        meleeFleetIdx2++;
        if (meleeFleetIdx2 >= meleeFleet2.length) {
          window._meleeWinner = 'PLAYER 1 WINS! (' + meleeFleet1.length + ' ships vs ' + meleeFleet2.length + ')';
        } else {
          window._meleeWinner = SHIP_TYPES[meleeFleet2[meleeFleetIdx2 - 1]]?.race + ' destroyed! Next ship...';
          window._meleeNextShip = true;
        }
      }
    }
    if (window._meleeEnd && frame - window._meleeEnd > 90) {
      if (window._meleeNextShip) {
        // Send in next ship
        window._meleeEnd = null;
        window._meleeWinner = null;
        window._meleeNextShip = null;
        const p1Ship = meleeFleet1[meleeFleetIdx1];
        const p2Ship = meleeFleet2[meleeFleetIdx2];
        if (p1Ship && p2Ship) {
          initCombatAlly(p1Ship, p2Ship);
          playerShip.isAlly = false;
          projectiles = []; particles = [];
        }
      } else {
        // Match over
        window._meleeEnd = null;
        window._meleeWinner = null;
        meleeFleet1 = []; meleeFleet2 = [];
        meleeFleetIdx1 = 0; meleeFleetIdx2 = 0;
        meleeState = 'pick1';
        music.stop();
        projectiles = []; particles = [];
      }
    }
  }
}

function drawMelee() {
  if (meleeState === 'fight') {
    drawCombat();
    // Winner overlay
    if (window._meleeWinner) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(W / 2 - 110, H / 2 - 20, 220, 40);
      ctx.strokeStyle = '#ffcc44'; ctx.lineWidth = 2; ctx.strokeRect(W / 2 - 110, H / 2 - 20, 220, 40);
      ctx.fillStyle = '#ffcc44'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
      ctx.fillText(window._meleeWinner, W / 2, H / 2 + 5);
      ctx.textAlign = 'left';
    }
    return;
  }

  ctx.fillStyle = '#000011'; ctx.fillRect(0, 0, W, H);
  drawStarField(0, 0, 40, false);

  // Title
  ctx.fillStyle = '#ff4444'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SUPER MELEE', W / 2, 18);

  const isPick2 = meleeState === 'pick2';
  const cursor = isPick2 ? meleeCursor2 : meleeCursor1;
  const label = isPick2 ? 'PLAYER 2 (AI)' : 'PLAYER 1';

  // Player label
  ctx.fillStyle = isPick2 ? '#ff8844' : '#44aaff';
  ctx.font = 'bold 9px monospace';
  ctx.fillText(`SELECT SHIP: ${label}`, W / 2, 32);

  // Fleet roster display (SC2 style — show selected ships)
  const showFleet = isPick2 ? meleeFleet1 : meleeFleet1;
  const buildFleet = isPick2 ? meleeFleet2 : meleeFleet1;
  // P1 fleet (always shown)
  ctx.fillStyle = '#112233'; ctx.fillRect(2, 2, 64, 12 + meleeFleet1.length * 8);
  ctx.strokeStyle = '#4488ff'; ctx.strokeRect(2, 2, 64, 12 + meleeFleet1.length * 8);
  ctx.fillStyle = '#4488ff'; ctx.font = 'bold 6px monospace'; ctx.textAlign = 'left';
  ctx.fillText('P1 FLEET', 6, 10);
  for (let fi = 0; fi < meleeFleet1.length; fi++) {
    const fd = SHIP_TYPES[meleeFleet1[fi]];
    ctx.fillStyle = fd.color; ctx.fillRect(6, 14 + fi * 8, 4, 4);
    ctx.fillStyle = '#aabbcc'; ctx.font = '5px monospace';
    ctx.fillText(fd.race.substring(0, 8), 12, 18 + fi * 8);
  }
  // P2 fleet (if building)
  if (isPick2) {
    const p2y = 2;
    ctx.fillStyle = '#221111'; ctx.fillRect(W - 66, p2y, 64, 12 + meleeFleet2.length * 8);
    ctx.strokeStyle = '#ff8844'; ctx.strokeRect(W - 66, p2y, 64, 12 + meleeFleet2.length * 8);
    ctx.fillStyle = '#ff8844'; ctx.font = 'bold 6px monospace';
    ctx.fillText('P2 FLEET', W - 62, p2y + 8);
    for (let fi = 0; fi < meleeFleet2.length; fi++) {
      const fd = SHIP_TYPES[meleeFleet2[fi]];
      ctx.fillStyle = fd.color; ctx.fillRect(W - 62, p2y + 12 + fi * 8, 4, 4);
      ctx.fillStyle = '#ccbbaa'; ctx.font = '5px monospace';
      ctx.fillText(fd.race.substring(0, 8), W - 56, p2y + 16 + fi * 8);
    }
  }
  ctx.textAlign = 'center';

  // Ship list (two columns)
  const cols = 2;
  const colW = (W - 20) / cols;
  const startY = 42;
  const rowH = 16;
  ctx.textAlign = 'left';

  for (let i = 0; i < MELEE_SHIPS.length; i++) {
    const shipKey = MELEE_SHIPS[i];
    const def = SHIP_TYPES[shipKey];
    const col = i < 11 ? 0 : 1;
    const row = i < 11 ? i : i - 11;
    const x = 10 + col * colW;
    const y = startY + row * rowH;
    const sel = i === cursor;

    if (sel) {
      ctx.fillStyle = 'rgba(34,68,136,0.4)';
      ctx.fillRect(x - 2, y - 8, colW - 4, rowH - 2);
      ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 1;
      ctx.strokeRect(x - 2, y - 8, colW - 4, rowH - 2);
    }

    // Ship color dot
    ctx.fillStyle = def.color;
    ctx.fillRect(x, y - 5, 6, 6);

    // Ship name
    ctx.fillStyle = sel ? '#ffffff' : '#8899aa';
    ctx.font = sel ? 'bold 8px monospace' : '7px monospace';
    ctx.fillText(`${def.race} ${def.name}`, x + 10, y + 1);
  }

  // Selected ship preview (right side when picking)
  const previewDef = SHIP_TYPES[MELEE_SHIPS[cursor]];
  if (previewDef) {
    // Ship sprite preview
    ctx.save();
    ctx.translate(W - 40, H - 50);
    ctx.scale(1.5, 1.5);
    previewDef.draw({ flash: 0, thrusting: false, def: previewDef, shieldTimer: 0 });
    ctx.restore();

    // Stats
    ctx.fillStyle = previewDef.color; ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(previewDef.race, W - 40, H - 22);
    ctx.fillStyle = '#8899aa'; ctx.font = '6px monospace';
    ctx.fillText(`Crew:${previewDef.maxCrew} Spd:${previewDef.maxSpeed}`, W - 40, H - 12);
    ctx.fillText(`Spc:${previewDef.special.name}`, W - 40, H - 4);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#556677'; ctx.font = '7px monospace';
  const buildCount = isPick2 ? meleeFleet2.length : meleeFleet1.length;
  ctx.fillText(`ENTER=add ship (${buildCount}/7)  BKSP=remove  D=done  ESC=back`, W / 2, H - 2);
  ctx.textAlign = 'left';
}

// ==================== MAIN GAME LOOP ====================
function gameLoop() {
  try {
  frame++;

  if (state === 'title') {
    music.play('title');
    drawTitle();
    if (titleCursor === undefined) titleCursor = 0;
    const hasSave = localStorage.getItem('sc2_save') !== null;
    const menuItems = ['NEW GAME', ...(hasSave ? ['CONTINUE'] : []), 'SUPER MELEE'];
    // Menu navigation
    if (justPressed['ArrowUp'] || justPressed['KeyW']) { titleCursor = (titleCursor - 1 + menuItems.length) % menuItems.length; sfx.select(); }
    if (justPressed['ArrowDown'] || justPressed['KeyS']) { titleCursor = (titleCursor + 1) % menuItems.length; sfx.select(); }
    // Draw menu
    ctx.textAlign = 'center';
    for (let i = 0; i < menuItems.length; i++) {
      const sel = i === titleCursor;
      const y = H - 44 + i * 14;
      ctx.font = sel ? 'bold 10px monospace' : '9px monospace';
      ctx.fillStyle = sel ? (Math.floor(frame / 15) % 2 ? '#ffffff' : '#ffcc44') : '#667788';
      ctx.fillText((sel ? '► ' : '  ') + menuItems[i], W / 2, y);
    }
    ctx.textAlign = 'left';
    if (justPressed['Enter'] || justPressed['Space']) {
      const chosen = menuItems[titleCursor];
      if (chosen === 'NEW GAME') { state = 'map'; initGame(); music.play('map'); }
      else if (chosen === 'CONTINUE') { if (loadGame()) { music.play('map'); } }
      else if (chosen === 'SUPER MELEE') { state = 'melee'; meleeState = 'pick1'; meleeCursor1 = 0; meleeCursor2 = 0; }
    }
  } else if (state === 'map') {
    music.play('map');
    updateMap();
    drawMap();
  } else if (state === 'upgrade') {
    updateUpgrade();
    drawUpgrade();
  } else if (state === 'starbase') {
    music.play('map');
    updateStarbase();
    drawStarbase();
  } else if (state === 'orbit') {
    music.play('map');
    updateOrbit();
    drawOrbit();
  } else if (state === 'lander') {
    updateLander();
    drawLander();
  } else if (state === 'dialogue') {
    music.play('dialogue');
    updateDialogue();
    drawDialogue();
  } else if (state === 'fleetselect') {
    updateFleetSelect();
    drawFleetSelect();
  } else if (state === 'combat') {
    updateCombat();
    drawCombat();
  } else if (state === 'melee') {
    updateMelee();
    drawMelee();
  } else if (state === 'gameover') {
    drawGameOver();
  } else if (state === 'victory') {
    drawVictory();
  }

  // Help overlay (H or F1)
  if (justPressed['KeyH'] || justPressed['F1']) window._showHelp = !window._showHelp;
  if (window._showHelp) {
    ctx.fillStyle = 'rgba(0,0,10,0.92)'; ctx.fillRect(10, 10, W - 20, H - 20);
    ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 2; ctx.strokeRect(10, 10, W - 20, H - 20);
    ctx.fillStyle = '#4488ff'; ctx.fillRect(10, 10, W - 20, 2);
    ctx.fillStyle = '#ffcc44'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
    ctx.fillText('STAR CONTROL II — CONTROLS', W / 2, 28);
    ctx.textAlign = 'left';
    const help = [
      ['HYPERSPACE', ''],
      ['  Arrow Keys', 'Fly ship'],
      ['  Space/Enter', 'Enter star system'],
      ['  A', 'Autopilot to selected star'],
      ['  Q', 'Open QuasiSpace portal (needs module)'],
      ['  +/-', 'Zoom in/out'],
      ['COMBAT', ''],
      ['  Arrow Keys', 'Turn and thrust'],
      ['  Z', 'Fire weapon'],
      ['  X', 'Use special ability'],
      ['  Escape', 'Emergency warp escape'],
      ['PLANET LANDER', ''],
      ['  Arrows', 'Move lander, Up=thrust'],
      ['  Q/Escape', 'Launch back to orbit'],
      ['ORBIT VIEW', ''],
      ['  Left/Right', 'Select planet'],
      ['  Space', 'Hold to scan'],
      ['  Z/L', 'Land on planet'],
      ['STARBASE', ''],
      ['  Up/Down', 'Navigate menu'],
      ['  Enter', 'Select option'],
      ['', ''],
      ['  H/F1', 'Toggle this help'],
    ];
    ctx.font = '7px monospace';
    for (let i = 0; i < help.length; i++) {
      const [key, desc] = help[i];
      const y = 42 + i * 8;
      if (!desc) {
        ctx.fillStyle = '#ffcc44'; ctx.font = 'bold 7px monospace';
        ctx.fillText(key, 20, y);
        ctx.font = '7px monospace';
      } else {
        ctx.fillStyle = '#88bbff'; ctx.fillText(key, 20, y);
        ctx.fillStyle = '#aaccdd'; ctx.fillText(desc, 130, y);
      }
    }
  }

  for (const k in justPressed) delete justPressed[k];

  // Render to display
  displayCtx.drawImage(buffer, 0, 0, SNES_W, SNES_H, 0, 0, SNES_W * SCALE, SNES_H * SCALE);
  // Scanlines
  displayCtx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let sy = 0; sy < SNES_H * SCALE; sy += SCALE) displayCtx.fillRect(0, sy + SCALE - 1, SNES_W * SCALE, 1);

  } catch(e) { console.error('Game error:', e); }
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
