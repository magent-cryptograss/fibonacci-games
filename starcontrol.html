  if (Math.floor(Date.now() / 500) % 2) ctx.fillText('PRESS ANY KEY TO START', W/2, H - 4);
  ctx.textAlign = 'left';
}

// ==================== SCREEN: STAR MAP ====================
function updateMap() {
  // === SC2-style HyperSpace flight ===
  // Player flies the ship with arrow keys, burns fuel while moving
  const turnRate = 0.06;
  const thrustPower = 0.4;
  const maxHyperSpeed = 6;
  const drag = 0.98;

  if (keys['ArrowLeft'] || keys['KeyA']) hyperAngle -= turnRate;
  if (keys['ArrowRight'] || keys['KeyD']) hyperAngle += turnRate;
  if (keys['ArrowUp'] || keys['KeyW']) {
    hyperVX += Math.cos(hyperAngle) * thrustPower;
    hyperVY += Math.sin(hyperAngle) * thrustPower;
  }
  // Brake
  if (keys['ArrowDown'] || keys['KeyS']) {
    hyperVX *= 0.92; hyperVY *= 0.92;
  }

  // Speed limit
  const spd = Math.hypot(hyperVX, hyperVY);
  if (spd > maxHyperSpeed) {
    hyperVX = hyperVX / spd * maxHyperSpeed;
    hyperVY = hyperVY / spd * maxHyperSpeed;
  }

  // Apply velocity
  hyperX += hyperVX;
  hyperY += hyperVY;
  hyperVX *= drag; hyperVY *= drag;

  // Burn fuel while moving (1 fuel per ~60 frames of movement)
  if (spd > 0.5) {
    if (frame % 60 === 0 && fuel > 0) fuel--;
    if (fuel <= 0) {
      hyperVX *= 0.9; hyperVY *= 0.9; // slow down when out of fuel
    }
  }

  // Camera follows ship
  mapCamX = hyperX;
  mapCamY = hyperY;

  // Find nearest star to player ship
  let best = null, bestD = Infinity;
  for (let i = 0; i < starMap.length; i++) {
    const d = dist(hyperX, hyperY, starMap[i].x, starMap[i].y);
    if (d < bestD) { bestD = d; best = i; }
  }
  if (bestD < 80) selectedStar = best;
  else selectedStar = null;

  // Enter star system when close enough
  if ((justPressed['Space'] || justPressed['Enter']) && selectedStar !== null && bestD < 40) {
    const s = starMap[selectedStar];
    currentStarIdx = selectedStar;
    s.visited = true;
    visitedStars.add(selectedStar);
    sfx.warp();
    if (s.alien && !defeatedAliens.has(selectedStar)) {
      state = 'dialogue';
      dialogue = { race: s.alien, stage: 'greeting', text: DIALOGUES[s.alien].greeting, starIdx: selectedStar };
      dialogueChoice = 0;
    } else {
      if (selectedStar === 0) { state = 'starbase'; starbaseCursor = 0; starbaseMsg = null; }
      else { state = 'orbit'; orbitCursor = 0; scanTimer = 0; }
    }
  }

  // === Random encounters in alien territory ===
  hyperEncounterTimer--;
  if (hyperEncounterTimer <= 0 && spd > 1) {
    hyperEncounterTimer = 180 + Math.floor(Math.random() * 300); // check every 3-8 seconds
    // Find which territory we're in
    let inTerritory = null;
    for (let i = 0; i < starMap.length; i++) {
      const s = starMap[i];
      if (s.territory && !defeatedAliens.has(i) && dist(hyperX, hyperY, s.x, s.y) < 200) {
        inTerritory = s.territory;
        break;
      }
    }
    if (inTerritory && Math.random() < 0.3) {
      // Random encounter!
      state = 'dialogue';
      dialogue = { race: inTerritory, stage: 'greeting', text: DIALOGUES[inTerritory].greeting, starIdx: -1 };
      dialogueChoice = 0;
      gameMessage = `${SHIP_TYPES[inTerritory].race} patrol intercepts you!`;
      messageTimer = 90;
    }
  }
}

const MAP_ZOOM = 0.2; // zoomed out to see more stars

function returnToHyperSpace() {
  state = 'map';
  hyperX = starMap[currentStarIdx].x;
  hyperY = starMap[currentStarIdx].y;
  hyperVX = 0; hyperVY = 0;
  mapCamX = hyperX; mapCamY = hyperY;
}
function returnAfterDialogue() {
  // If encounter was in HyperSpace (starIdx === -1), return to map
  if (dialogue && dialogue.starIdx === -1) { returnToHyperSpace(); }
  else { state = 'orbit'; orbitCursor = 0; scanTimer = 0; }
}

// HyperSpace trail particles
let hyperTrail = [];

function drawMap() {
  const hudH = 40; // SC2 bottom HUD bar (taller, like SC2)
  const mapH = H - hudH; // playable map area
  const spd = Math.hypot(hyperVX, hyperVY);

  // === SC2 HYPERSPACE — deep RED void ===
  // SC2's HyperSpace is famously RED, not black
  ctx.fillStyle = '#1a0000'; ctx.fillRect(0, 0, W, mapH);

  // === Swirling red nebula clouds (the iconic SC2 HyperSpace look) ===
  // Multiple layers of slowly moving red/crimson clouds
  const t = frame * 0.006;
  const ox = mapCamX - W / 2 / MAP_ZOOM, oy = mapCamY - H / 2 / MAP_ZOOM;
  for (let layer = 0; layer < 3; layer++) {
    const parallax = 0.02 + layer * 0.01;
    const cloudAlpha = 0.06 - layer * 0.015;
    ctx.globalAlpha = cloudAlpha;
    for (let ci = 0; ci < 12; ci++) {
      // Deterministic cloud positions that scroll with camera
      const seed = ci * 137.5 + layer * 47;
      const cloudBaseX = (seed * 73.1) % 2000 - 200;
      const cloudBaseY = (seed * 91.3) % 1600 - 200;
      const cx = cloudBaseX - ox * parallax * MAP_ZOOM;
      const cy = cloudBaseY - oy * parallax * MAP_ZOOM;
      // Wrap clouds
      const wrappedX = ((cx % (W + 200)) + W + 200) % (W + 200) - 100;
      const wrappedY = ((cy % (mapH + 200)) + mapH + 200) % (mapH + 200) - 100;
      const cRadius = 40 + (seed % 60);
      const red = layer === 0 ? '#440000' : layer === 1 ? '#330808' : '#2a0404';
      ctx.fillStyle = red;
      ctx.beginPath(); ctx.arc(wrappedX, wrappedY, cRadius, 0, TAU); ctx.fill();
      // Brighter core
      ctx.fillStyle = layer === 0 ? '#660000' : '#4a0808';
      ctx.beginPath(); ctx.arc(wrappedX, wrappedY, cRadius * 0.5, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // === Subtle red grid (SC2 had faint grid lines in HyperSpace) ===
  const gridSz = 60;
  const gox = ((-mapCamX * MAP_ZOOM) % gridSz + gridSz) % gridSz;
  const goy = ((-mapCamY * MAP_ZOOM) % gridSz + gridSz) % gridSz;
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#440000'; ctx.lineWidth = 1;
  for (let gx = gox; gx < W; gx += gridSz) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, mapH); ctx.stroke(); }
  for (let gy = goy; gy < mapH; gy += gridSz) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
  ctx.globalAlpha = 1;

  // === HyperSpace speed streaks (red/orange when moving, like SC2) ===
  if (spd > 0.8) {
    for (let i = 0; i < Math.min(4, spd * 1.5); i++) {
      const colors = ['#ff4422', '#ff6633', '#ff2211', '#cc3311', '#ff8844'];
      hyperTrail.push({
        x: Math.random() * W, y: Math.random() * mapH,
        len: 3 + spd * 3, life: 10 + Math.floor(Math.random() * 10),
        angle: hyperAngle + Math.PI,
        color: colors[Math.floor(Math.random() * colors.length)]
      });
    }
  }
  for (let i = hyperTrail.length - 1; i >= 0; i--) {
    const tr = hyperTrail[i];
    ctx.globalAlpha = tr.life / 20;
    ctx.strokeStyle = tr.color || '#ff4422'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tr.x, tr.y);
    ctx.lineTo(tr.x + Math.cos(tr.angle) * tr.len, tr.y + Math.sin(tr.angle) * tr.len);
    ctx.stroke();
    tr.x += Math.cos(tr.angle) * 2.5;
    tr.y += Math.sin(tr.angle) * 2.5;
    tr.life--;
    if (tr.life <= 0) hyperTrail.splice(i, 1);
  }
  ctx.globalAlpha = 1;
  if (hyperTrail.length > 80) hyperTrail.splice(0, hyperTrail.length - 80);

  // === Territory spheres of influence (SC2 style — colored circles on red void) ===
  const terr = {};
  for (let i = 0; i < starMap.length; i++) {
    const s = starMap[i];
    if (s.territory) {
      if (!terr[s.territory]) terr[s.territory] = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
      terr[s.territory].minX = Math.min(terr[s.territory].minX, s.x);
      terr[s.territory].minY = Math.min(terr[s.territory].minY, s.y);
      terr[s.territory].maxX = Math.max(terr[s.territory].maxX, s.x);
      terr[s.territory].maxY = Math.max(terr[s.territory].maxY, s.y);
    }
  }
  for (const race in terr) {
    const tb = terr[race];
    const tcx = (tb.minX + tb.maxX) / 2, tcy = (tb.minY + tb.maxY) / 2;
    const tr2 = Math.max(140, Math.hypot(tb.maxX - tb.minX, tb.maxY - tb.minY) / 2 + 100);
    const tsx = (tcx - ox) * MAP_ZOOM, tsy = (tcy - oy) * MAP_ZOOM, tsr = tr2 * MAP_ZOOM;
    if (tsx < -tsr - 20 || tsx > W + tsr + 20 || tsy < -tsr - 20 || tsy > mapH + tsr + 20) continue;
    const rc = SHIP_TYPES[race].color;
    // SC2: translucent colored sphere
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = rc;
    ctx.beginPath(); ctx.arc(tsx, tsy, tsr, 0, TAU); ctx.fill();
    // Border ring
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = rc; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(tsx, tsy, tsr, 0, TAU); ctx.stroke();
    // Race name at center of sphere
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = rc; ctx.font = '7px monospace'; ctx.textAlign = 'center';
    ctx.fillText(SHIP_TYPES[race].race, tsx, tsy - tsr + 8);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // === Stars (SC2: small bright colored dots on the red void) ===
  for (let i = 0; i < starMap.length; i++) {
    const s = starMap[i];
    const sx = (s.x - ox) * MAP_ZOOM, sy = (s.y - oy) * MAP_ZOOM;
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > mapH + 20) continue;

    // Star glow (subtle)
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = s.color.fill;
    ctx.beginPath(); ctx.arc(sx, sy, 4, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;

    // Star dot — clean bright pixel cross like SC2
    ctx.fillStyle = s.color.fill;
    const r = (i === 0) ? 3 : 2;
    ctx.fillRect(Math.floor(sx) - 1, Math.floor(sy) - 1, 3, 3); // center
    ctx.fillRect(Math.floor(sx), Math.floor(sy) - r, 1, r * 2 + 1); // vertical
    ctx.fillRect(Math.floor(sx) - r, Math.floor(sy), r * 2 + 1, 1); // horizontal

    // Star name in star color
    ctx.fillStyle = s.color.fill; ctx.font = '6px monospace';
    const label = s.name.split(' ');
    ctx.fillText(label[0], sx + 5, sy + 2);
    if (label[1]) {
      ctx.globalAlpha = 0.5;
      ctx.fillText(label[1], sx + 5, sy + 9);
      ctx.globalAlpha = 1;
    }

    // Sol marker
    if (i === 0) {
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(sx, sy, 6, 0, TAU); ctx.stroke();
    }

    // Selected star cursor — green brackets (SC2 style)
    if (i === selectedStar) {
      const cr = 9, bLen = 4;
      ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx - cr, sy - cr + bLen); ctx.lineTo(sx - cr, sy - cr); ctx.lineTo(sx - cr + bLen, sy - cr);
      ctx.moveTo(sx + cr - bLen, sy - cr); ctx.lineTo(sx + cr, sy - cr); ctx.lineTo(sx + cr, sy - cr + bLen);
      ctx.moveTo(sx - cr, sy + cr - bLen); ctx.lineTo(sx - cr, sy + cr); ctx.lineTo(sx - cr + bLen, sy + cr);
      ctx.moveTo(sx + cr - bLen, sy + cr); ctx.lineTo(sx + cr, sy + cr); ctx.lineTo(sx + cr, sy + cr - bLen);
      ctx.stroke();
    }
  }

  // === Player ship at center (SC2 — small flagship sprite) ===
  const isThrusting = keys['ArrowUp'] || keys['KeyW'];
  ctx.save();
  ctx.translate(W/2, (mapH)/2);
  ctx.rotate(hyperAngle + Math.PI / 2);
  ctx.scale(0.5, 0.5);
  SHIP_TYPES.player.draw({ flash: 0, thrusting: isThrusting, def: SHIP_TYPES.player, shieldTimer: 0 });
  ctx.restore();

  // === Thruster flame trail behind ship (SC2 had visible engine glow) ===
  if (isThrusting) {
    ctx.globalAlpha = 0.4 + Math.random() * 0.3;
    ctx.fillStyle = '#ff6622';
    const flameX = W/2 - Math.cos(hyperAngle) * 8;
    const flameY = (mapH)/2 - Math.sin(hyperAngle) * 8;
    ctx.beginPath(); ctx.arc(flameX, flameY, 3 + Math.random() * 2, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath(); ctx.arc(flameX, flameY, 2, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === SC2 BOTTOM HUD BAR ===
  // SC2 had a dark panel at bottom with distinct sections
  ctx.fillStyle = '#0a0a12'; ctx.fillRect(0, mapH, W, hudH);
  // Top border — bright colored line (SC2 used blue/teal borders)
  ctx.fillStyle = '#2244aa'; ctx.fillRect(0, mapH, W, 2);
  ctx.fillStyle = '#112255'; ctx.fillRect(0, mapH + 2, W, 1);

  // === LEFT: Ship status panel ===
  // Fuel gauge (SC2 style — horizontal bar with label)
  ctx.fillStyle = '#8888aa'; ctx.font = '7px monospace';
  ctx.fillText('FUEL', 4, mapH + 13);
  const fuelBarX = 30, fuelBarY = mapH + 7, fuelBarW = 56, fuelBarH = 8;
  ctx.fillStyle = '#111122'; ctx.fillRect(fuelBarX, fuelBarY, fuelBarW, fuelBarH);
  const fuelFrac = Math.min(1, fuel / 200);
  // SC2 fuel bar was segmented
  const fuelSegs = Math.floor(fuelFrac * 10);
  for (let i = 0; i < fuelSegs; i++) {
    ctx.fillStyle = fuelFrac > 0.25 ? '#22cc44' : '#cc4400';
    ctx.fillRect(fuelBarX + 1 + i * 5.4, fuelBarY + 1, 4.4, fuelBarH - 2);
  }
  ctx.strokeStyle = '#334488'; ctx.lineWidth = 1;
  ctx.strokeRect(fuelBarX, fuelBarY, fuelBarW, fuelBarH);
  ctx.fillStyle = '#44cc66'; ctx.fillText(fuel.toString(), fuelBarX + fuelBarW + 3, mapH + 14);

  // Crew count
  ctx.fillStyle = '#8888aa'; ctx.fillText('CREW', 4, mapH + 25);
  ctx.fillStyle = '#44cc66'; ctx.fillText(`${crew}/${maxCrew}`, 34, mapH + 25);

  // Minerals
  ctx.fillStyle = '#8888aa'; ctx.fillText('RU', 4, mapH + 35);
  ctx.fillStyle = '#ffcc44'; ctx.fillText(minerals.toString(), 20, mapH + 35);

  // === CENTER: Position & speed readout ===
  // Vertical separator
  ctx.fillStyle = '#223366'; ctx.fillRect(105, mapH + 5, 1, hudH - 8);

  ctx.fillStyle = '#6688bb'; ctx.font = '7px monospace';
  const coordX = Math.floor(hyperX / 10), coordY = Math.floor(hyperY / 10);
  ctx.fillText('POS', 112, mapH + 13);
  ctx.fillStyle = '#aaccff';
  ctx.fillText(`${coordX.toString().padStart(4)}.${Math.abs(Math.floor(hyperX % 10))} : ${coordY.toString().padStart(4)}.${Math.abs(Math.floor(hyperY % 10))}`, 132, mapH + 13);

  ctx.fillStyle = '#6688bb';
  ctx.fillText('VEL', 112, mapH + 25);
  ctx.fillStyle = spd > 4 ? '#ff8844' : '#aaccff';
  ctx.fillText(spd.toFixed(2), 132, mapH + 25);

  // Heading
  ctx.fillStyle = '#6688bb';
  ctx.fillText('HDG', 112, mapH + 35);
  ctx.fillStyle = '#aaccff';
  const hdgDeg = Math.floor(((hyperAngle * 180 / Math.PI) % 360 + 360) % 360);
  ctx.fillText(`${hdgDeg}°`, 132, mapH + 35);

  // === RIGHT: Star info & artifacts ===
  ctx.fillStyle = '#223366'; ctx.fillRect(210, mapH + 5, 1, hudH - 8);

  // Artifacts/seals
  ctx.fillStyle = '#8888aa'; ctx.fillText('SEALS', 218, mapH + 35);
  ctx.fillStyle = '#ffcc44';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < artifacts ? '#ffcc44' : '#333344';
    ctx.fillRect(250 + i * 10, mapH + 28, 7, 7);
  }

  // Nearest star info
  if (selectedStar !== null) {
    const s = starMap[selectedStar];
    const sd = dist(hyperX, hyperY, s.x, s.y);
    ctx.fillStyle = s.color.fill; ctx.font = '8px monospace';
    ctx.fillText(s.name, 218, mapH + 13);
    ctx.fillStyle = '#6688bb'; ctx.font = '7px monospace';
    ctx.fillText(`DIST ${Math.floor(sd)}`, 218, mapH + 23);

    if (sd < 40 && Math.floor(frame / 15) % 2) {
      ctx.fillStyle = '#00ff44'; ctx.font = '8px monospace';
      ctx.fillText('► ENTER', 280, mapH + 13);
    }
    if (s.territory && !defeatedAliens.has(selectedStar)) {
      ctx.fillStyle = SHIP_TYPES[s.territory].color;
      ctx.font = '6px monospace';
      ctx.fillText(SHIP_TYPES[s.territory].race + ' SPACE', 280, mapH + 23);
    }
  } else {
    ctx.fillStyle = '#444466'; ctx.font = '7px monospace';
    ctx.fillText('NO STAR NEARBY', 218, mapH + 13);
  }

  // Message overlay
  if (messageTimer > 0) {
    messageTimer--;
    ctx.fillStyle = '#ff4444'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
    ctx.fillText(gameMessage, W/2, mapH - 20);
    ctx.textAlign = 'left';
  }

  // Module menu shortcut
  if (justPressed['KeyU'] && minerals >= 20) {
    state = 'upgrade';
  }
}

// ==================== SCREEN: MODULES ====================
let upgradeCursor = 0;
const MAX_MODULES = 8;
function updateUpgrade() {
  if (justPressed['ArrowUp'] || justPressed['KeyW']) { upgradeCursor = (upgradeCursor - 1 + MODULE_DEFS.length) % MODULE_DEFS.length; sfx.select(); }
  if (justPressed['ArrowDown'] || justPressed['KeyS']) { upgradeCursor = (upgradeCursor + 1) % MODULE_DEFS.length; sfx.select(); }
  if (justPressed['Space'] || justPressed['Enter']) {
    const mod = MODULE_DEFS[upgradeCursor];
    if (modules.length < MAX_MODULES && minerals >= mod.cost) {
      minerals -= mod.cost;
      modules.push(mod.name);
      if (mod.stat === 'crew') { maxCrew = 20 + getModuleStat('crew'); }
      sfx.confirm();
    } else {
      sfx.alarm();
    }
  }
  // Remove last module with backspace
  if (justPressed['Backspace'] && modules.length > 0) {
    const removed = modules.pop();
    const mod = MODULE_DEFS.find(d => d.name === removed);
    if (mod) minerals += Math.floor(mod.cost * 0.75); // 75% refund
    maxCrew = 20 + getModuleStat('crew');
    sfx.select();
  }
  if (justPressed['Escape'] || justPressed['KeyU'] || justPressed['KeyQ']) {
    if (currentStarIdx === 0) { state = 'starbase'; } else { returnToHyperSpace(); }
    sfx.select();
  }
}

function drawUpgrade() {
  ctx.fillStyle = 'rgba(0,0,20,0.95)'; ctx.fillRect(0, 0, W, H);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc44'; ctx.font = 'bold 10px monospace';
  ctx.fillText('SHIP MODULES', W/2, 16);
  ctx.fillStyle = '#aaa'; ctx.font = '8px monospace';
  ctx.fillText(`Minerals: ${minerals}   Slots: ${modules.length}/${MAX_MODULES}`, W/2, 28);

  // Available modules list (left side)
  ctx.textAlign = 'left';
  ctx.fillStyle = '#88aacc'; ctx.font = 'bold 8px monospace';
  ctx.fillText('AVAILABLE', 8, 44);
  for (let i = 0; i < MODULE_DEFS.length; i++) {
    const mod = MODULE_DEFS[i];
    const y = 54 + i * 17;
    const sel = i === upgradeCursor;
    const canBuy = minerals >= mod.cost && modules.length < MAX_MODULES;

    if (sel) {
      ctx.fillStyle = 'rgba(68,136,255,0.2)';
      ctx.fillRect(4, y - 8, W/2 - 8, 15);
      ctx.strokeStyle = '#4488ff'; ctx.strokeRect(4, y - 8, W/2 - 8, 15);
    }

    // Module icon dot
    ctx.fillStyle = mod.icon; ctx.fillRect(8, y - 4, 6, 6);

    // Name
    ctx.fillStyle = sel ? '#fff' : '#aaa'; ctx.font = '8px monospace';
    ctx.fillText(mod.name, 18, y + 2);

    // Cost
    ctx.fillStyle = canBuy ? '#ffcc44' : '#ff4444';
    ctx.fillText(`${mod.cost}m`, W/2 - 32, y + 2);
  }

  // Selected module description
  const selMod = MODULE_DEFS[upgradeCursor];
  ctx.fillStyle = '#555'; ctx.fillRect(4, H - 30, W/2 - 8, 14);
  ctx.fillStyle = '#ccddff'; ctx.font = '8px monospace';
  ctx.fillText(selMod.desc, 8, H - 20);

  // Installed modules (right side)
  ctx.fillStyle = '#88aacc'; ctx.font = 'bold 8px monospace';
  ctx.fillText('INSTALLED', W/2 + 8, 44);

  // Module slots visualization
  for (let i = 0; i < MAX_MODULES; i++) {
    const y = 54 + i * 17;
    const x = W/2 + 8;
    ctx.fillStyle = i < modules.length ? 'rgba(40,80,40,0.5)' : 'rgba(20,20,40,0.5)';
    ctx.fillRect(x, y - 8, W/2 - 16, 15);
    ctx.strokeStyle = i < modules.length ? '#446644' : '#333';
    ctx.strokeRect(x, y - 8, W/2 - 16, 15);

    if (i < modules.length) {
      const mod = MODULE_DEFS.find(d => d.name === modules[i]);
      if (mod) {
        ctx.fillStyle = mod.icon; ctx.fillRect(x + 4, y - 4, 6, 6);
        ctx.fillStyle = '#ddd'; ctx.font = '8px monospace';
        ctx.fillText(mod.name, x + 14, y + 2);
      }
    } else {
      ctx.fillStyle = '#444'; ctx.font = '8px monospace';
      ctx.fillText('- empty -', x + 14, y + 2);
    }
  }

  // Controls help
  ctx.textAlign = 'center';
  ctx.fillStyle = '#555'; ctx.font = '8px monospace';
  ctx.fillText('SPACE install  BACKSPACE remove  Q back', W/2, H - 4);
  ctx.textAlign = 'left';
}

// ==================== SCREEN: STARBASE ====================
let starbaseCursor = 0;
let starbaseMsg = null;
let starbaseMsgTimer = 0;

const HAYES_MSGS = [
  // Changes based on artifacts found
];

function getHayesMsg() {
  if (artifacts >= 3) return 'Captain! You have all three Precursor Seals! Find the Orz and seal the dimensional rift! The Alliance is counting on you!';
  if (artifacts === 2) return 'Two Seals found, Captain! One more to go. Our long-range sensors detect Orz activity increasing. We must hurry!';
  if (artifacts === 1) return 'Good work finding that Seal, Captain. Two more remain. The Chmmr say the rift is growing wider. Be careful out there.';
  if (defeatedAliens.size > 3) return 'You have made contact with several species, Captain. Keep exploring. The Precursor Seals are hidden at the edges of the galaxy.';
  return 'Welcome back, Captain. Since the Sa-Matra was destroyed, a dimensional rift has opened. We need you to find three Precursor Seals to close it. Talk to the alien races - they may have information. The Starbase will always be here if you need fuel or crew.';
}

function updateStarbase() {
  const options = 5; // Talk, Refuel, Crew, Upgrade, Depart
  if (justPressed['ArrowUp'] || justPressed['KeyW']) { starbaseCursor = (starbaseCursor - 1 + options) % options; sfx.select(); }
  if (justPressed['ArrowDown'] || justPressed['KeyS']) { starbaseCursor = (starbaseCursor + 1) % options; sfx.select(); }

  if (justPressed['Space'] || justPressed['Enter']) {
    if (starbaseCursor === 0) {
      // Talk to Hayes
      starbaseMsg = getHayesMsg();
      starbaseMsgTimer = 180;
      sfx.confirm();
    } else if (starbaseCursor === 1) {
      // Refuel
      if (fuel < 200) {
        fuel = 200;
        starbaseMsg = 'Fuel tanks topped off to 200, Captain!';
        starbaseMsgTimer = 90;
        sfx.pickup();
      } else {
        starbaseMsg = 'Fuel tanks are already full.';
        starbaseMsgTimer = 60;
      }
    } else if (starbaseCursor === 2) {
      // Recruit crew (10 minerals per 5 crew)
      if (crew >= maxCrew) {
        starbaseMsg = 'Crew quarters are full, Captain.';
        starbaseMsgTimer = 60;
      } else if (minerals >= 10) {
        minerals -= 10;
        crew = Math.min(maxCrew, crew + 5);
        starbaseMsg = `+5 crew recruited! (${crew}/${maxCrew})`;
        starbaseMsgTimer = 90;
        sfx.confirm();
      } else {
        starbaseMsg = 'Need 10 minerals to recruit crew.';
        starbaseMsgTimer = 60;
        sfx.alarm();
      }
    } else if (starbaseCursor === 3) {
      // Upgrades
      state = 'upgrade';
      upgradeCursor = 0;
    } else if (starbaseCursor === 4) {
      // Depart
      returnToHyperSpace();
      sfx.warp();
    }
  }

  if (justPressed['Escape'] || justPressed['KeyQ']) {
    returnToHyperSpace(); sfx.select();
  }

  if (starbaseMsgTimer > 0) starbaseMsgTimer--;
}

function drawStarbase() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  drawStarField(0, 0, 60);

  // Station body - SC2 style rotating station
  const cx = W / 2, cy = 80;
  const rot = frame * 0.005;

  // Outer ring
  ctx.strokeStyle = '#556677'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(cx, cy, 50, 18, 0, 0, TAU); ctx.stroke();
  ctx.lineWidth = 1;

  // Inner ring
  ctx.strokeStyle = '#778899'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(cx, cy, 30, 10, 0, 0, TAU); ctx.stroke();
  ctx.lineWidth = 1;

  // Central hub
  ctx.fillStyle = '#334455'; ctx.fillRect(cx - 12, cy - 16, 24, 32);
  ctx.fillStyle = '#445566'; ctx.fillRect(cx - 10, cy - 14, 20, 28);
  ctx.fillStyle = '#556677'; ctx.fillRect(cx - 8, cy - 12, 16, 24);

  // Docking bay (lit)
  ctx.fillStyle = '#88aacc'; ctx.fillRect(cx - 4, cy + 10, 8, 6);
  ctx.fillStyle = '#aaccee'; ctx.fillRect(cx - 2, cy + 12, 4, 2);

  // Antenna
  ctx.fillStyle = '#667788'; ctx.fillRect(cx - 1, cy - 24, 2, 12);
  ctx.fillStyle = '#ff4444'; ctx.fillRect(cx - 2, cy - 26, 4, 3);

  // Blinking lights on ring
  for (let i = 0; i < 8; i++) {
    const a = rot + i * TAU / 8;
    const lx = cx + Math.cos(a) * 50;
    const ly = cy + Math.sin(a) * 18;
    ctx.fillStyle = (Math.floor(frame / 15) + i) % 3 === 0 ? '#ff4444' : '#44ff44';
    ctx.fillRect(lx - 1, ly - 1, 2, 2);
  }

  // Solar panels
  ctx.fillStyle = '#334466';
  ctx.fillRect(cx - 50, cy - 4, 18, 8);
  ctx.fillRect(cx + 32, cy - 4, 18, 8);
  // Panel grid lines
  ctx.strokeStyle = '#4488cc'; ctx.lineWidth = 0.5;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.moveTo(cx - 50, cy - 2 + i * 3); ctx.lineTo(cx - 32, cy - 2 + i * 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 32, cy - 2 + i * 3); ctx.lineTo(cx + 50, cy - 2 + i * 3); ctx.stroke();
  }
  ctx.lineWidth = 1;

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#4488ff'; ctx.font = 'bold 10px monospace';
  ctx.fillText('EARTH STARBASE', cx, cy + 36);
  ctx.fillStyle = '#667788'; ctx.font = '8px monospace';
  ctx.fillText('Commander Hayes reporting', cx, cy + 46);

  // Menu options
  const menuItems = [
    { label: 'TALK TO COMMANDER HAYES', icon: '>' },
    { label: `REFUEL (free) [${fuel}/200]`, icon: '>' },
    { label: `RECRUIT CREW (10 min) [${crew}/${maxCrew}]`, icon: '>' },
    { label: `INSTALL MODULES [${modules.length}/${MAX_MODULES}]`, icon: '>' },
    { label: 'DEPART STARBASE', icon: '>' },
  ];

  for (let i = 0; i < menuItems.length; i++) {
    const my = 140 + i * 16;
    const sel = i === starbaseCursor;
    ctx.fillStyle = sel ? 'rgba(68,136,255,0.15)' : 'rgba(0,0,20,0.4)';
    ctx.fillRect(30, my - 6, W - 60, 14);
    if (sel) { ctx.strokeStyle = '#4488ff'; ctx.strokeRect(30, my - 6, W - 60, 14); }
    ctx.fillStyle = sel ? '#fff' : '#aaa'; ctx.font = '8px monospace';
    ctx.fillText((sel ? '> ' : '  ') + menuItems[i].label, W / 2, my + 2);
  }

  // Status bar at bottom
  ctx.fillStyle = 'rgba(0,0,20,0.7)'; ctx.fillRect(0, H - 30, W, 30);
  ctx.fillStyle = '#4488ff'; ctx.font = '8px monospace';
  ctx.fillText(`FUEL: ${fuel}`, W / 2 - 100, H - 20);
  ctx.fillStyle = '#ffcc44';
  ctx.fillText(`MINERALS: ${minerals}`, W / 2 - 30, H - 20);
  ctx.fillStyle = '#44ff88';
  ctx.fillText(`CREW: ${crew}/${maxCrew}`, W / 2 + 50, H - 20);
  ctx.fillStyle = '#ff8844';
  ctx.fillText(`SEALS: ${artifacts}/3`, W / 2 - 100, H - 10);

  // Message from Hayes
  if (starbaseMsg && starbaseMsgTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,40,0.9)';
    ctx.fillRect(10, 100, W - 20, 34);
    ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 1;
    ctx.strokeRect(10, 100, W - 20, 34);
    ctx.fillStyle = '#88bbff'; ctx.font = '8px monospace';
    // Wrap hayes message
    const words = starbaseMsg.split(' ');
    let line = '', ty = 110;
    for (const word of words) {
      const test = line + word + ' ';
      if (test.length > 38) {
        ctx.fillText(line, W / 2, ty);
        line = word + ' '; ty += 10;
      } else {
        line = test;
      }
    }
    ctx.fillText(line, W / 2, ty);
  }

  ctx.fillStyle = '#555'; ctx.font = '8px monospace';
  ctx.fillText('ARROWS select  SPACE choose  Q leave', W / 2, H - 2);
  ctx.textAlign = 'left';
}

// ==================== SCREEN: ORBIT ====================
let orbitCursor = 0;
let scanTimer = 0;

function updateOrbit() {
  const s = starMap[currentStarIdx];
  if (justPressed['ArrowLeft'] || justPressed['KeyA']) { orbitCursor = (orbitCursor - 1 + s.planets.length) % s.planets.length; sfx.select(); }
  if (justPressed['ArrowRight'] || justPressed['KeyD']) { orbitCursor = (orbitCursor + 1) % s.planets.length; sfx.select(); }

  // Scan planet
  if (keys['Space'] || keys['Enter']) {
    const p = s.planets[orbitCursor];
    if (!p.scanned) {
      scanTimer++;
      if (scanTimer >= 40) {
        p.scanned = true;
        minerals += p.minerals;
        fuel += p.fuel;
        scanTimer = 0;
        sfx.pickup();
        gameMessage = `+${p.minerals} minerals, +${p.fuel} fuel`;
        messageTimer = 60;
      }
    }
  } else {
    scanTimer = 0;
  }

  // Collect artifact
  if (s.artifact && !defeatedAliens.has(currentStarIdx) && s.alien) {
    // Need to defeat alien first
  } else if (s.artifact && justPressed['KeyC']) {
    s.artifact = false;
    artifacts++;
    sfx.victory();
    gameMessage = `PRECURSOR SEAL RECOVERED! (${artifacts}/3)`;
    messageTimer = 120;
    if (artifacts >= 3) {
      gameMessage = 'ALL SEALS FOUND! Close the rift - find the Orz!';
      messageTimer = 180;
    }
  }

  if (justPressed['Escape'] || justPressed['KeyQ']) { returnToHyperSpace(); sfx.select(); }
}

function drawOrbit() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  drawStarField(currentStarIdx * 100, currentStarIdx * 77, 60);
  const s = starMap[currentStarIdx];

  // Central star - SC2 style with corona
  // Outer corona
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = s.color.glow;
  ctx.beginPath(); ctx.arc(W/2, H/2, 45, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.15;
  ctx.beginPath(); ctx.arc(W/2, H/2, 35, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.25;
  ctx.beginPath(); ctx.arc(W/2, H/2, 25, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  // Star body
  ctx.fillStyle = s.color.fill;
  ctx.beginPath(); ctx.arc(W/2, H/2, 16, 0, TAU); ctx.fill();
  // Bright center
  ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.arc(W/2, H/2, 8, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  // Solar flares
  ctx.fillStyle = s.color.glow; ctx.globalAlpha = 0.4;
  for (let f = 0; f < 4; f++) {
    const fa = frame * 0.01 + f * 1.5;
    const fr = 18 + Math.sin(frame * 0.05 + f * 2) * 4;
    ctx.beginPath(); ctx.arc(W/2 + Math.cos(fa) * fr, H/2 + Math.sin(fa) * fr, 4, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Planets orbiting
  for (let i = 0; i < s.planets.length; i++) {
    const p = s.planets[i];
    const orbitR = 40 + i * Math.min(28, 180 / s.planets.length);
    const angle = frame * 0.005 * (1 + i * 0.3) + i * 2;
    const px = W/2 + Math.cos(angle) * orbitR;
    const py = H/2 + Math.sin(angle) * orbitR * 0.5;

    // Orbit line
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(W/2, H/2, orbitR, orbitR * 0.5, 0, 0, TAU); ctx.stroke();

    // Planet - SC2 style with surface detail
    const sel = i === orbitCursor;
    const baseR = (p.radius || 10) * 0.5;
    const r = sel ? baseR + 2 : baseR;
    // Atmosphere glow
    if (sel) {
      ctx.globalAlpha = 0.15; ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(px, py, r + 4, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // Planet body
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(px, py, r, 0, TAU); ctx.fill();
    // Surface features (craters/continents)
    ctx.save(); ctx.beginPath(); ctx.arc(px, py, r, 0, TAU); ctx.clip();
    const pRot = frame * 0.006 + i * 3;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px + Math.cos(pRot) * r * 0.4, py - r * 0.3, r * 0.3, 0, TAU); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(px + Math.cos(pRot + 1.5) * r * 0.3, py + r * 0.2, r * 0.25, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(px + Math.cos(pRot + 3) * r * 0.5, py - r * 0.1, r * 0.2, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
    // Shadow gradient
    ctx.globalAlpha = 0.3; ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(px + r * 0.3, py + r * 0.3, r, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
    // Specular
    ctx.globalAlpha = 0.25; ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px - r * 0.3, py - r * 0.3, r * 0.3, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;

    if (sel) {
      ctx.strokeStyle = '#ffcc44'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(px, py, r + 4, 0, TAU); ctx.stroke();
    }

    // Planet label
    ctx.fillStyle = sel ? '#fff' : '#888'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText(p.name, px, py + r + 8);
    if (p.scanned) {
      ctx.fillStyle = '#44ff44'; ctx.fillText('SCANNED', px, py + r + 14);
    }
    ctx.textAlign = 'left';
  }

  // Scan progress bar
  if (scanTimer > 0) {
    const p = s.planets[orbitCursor];
    if (!p.scanned) {
      ctx.fillStyle = '#222'; ctx.fillRect(W/2 - 30, H - 40, 60, 6);
      ctx.fillStyle = '#44aaff'; ctx.fillRect(W/2 - 30, H - 40, 60 * (scanTimer / 40), 6);
      ctx.fillStyle = '#aaa'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
      ctx.fillText('SCANNING...', W/2, H - 44);
      ctx.textAlign = 'left';
    }
  }

  // SC2-style planet scan panel (right side)
  const p = s.planets[orbitCursor];
  const panX = W - 105, panY = 4, panW2 = 101, panH2 = 120;
  ctx.fillStyle = 'rgba(0,0,20,0.85)'; ctx.fillRect(panX, panY, panW2, panH2);
  ctx.strokeStyle = '#336'; ctx.lineWidth = 1; ctx.strokeRect(panX, panY, panW2, panH2);
  // Planet close-up (big rotating planet)
  const ppx = panX + 50, ppy = panY + 38, ppr = 28;
  ctx.fillStyle = p.color;
  ctx.beginPath(); ctx.arc(ppx, ppy, ppr, 0, TAU); ctx.fill();
  // Rotating surface
  ctx.save(); ctx.beginPath(); ctx.arc(ppx, ppy, ppr, 0, TAU); ctx.clip();
  const pRot2 = frame * 0.01;
  for (let ci = 0; ci < 5; ci++) {
    const ca = pRot2 + ci * 1.3;
    const cx2 = ppx + Math.cos(ca) * ppr * 0.5;
    const cy2 = ppy + Math.sin(ci * 2) * ppr * 0.3;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = ci % 2 ? '#fff' : '#000';
    ctx.beginPath(); ctx.arc(cx2, cy2, ppr * 0.2 + ci * 2, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.restore();
  // Shadow
  ctx.globalAlpha = 0.35; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(ppx + 8, ppy + 6, ppr, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.2; ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ppx - 8, ppy - 8, ppr * 0.35, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  // Scan data text
  ctx.fillStyle = '#4488ff'; ctx.font = 'bold 8px monospace';
  ctx.fillText(p.name, panX + 4, panY + 74);
  ctx.fillStyle = '#8888aa'; ctx.font = '8px monospace';
  ctx.fillText(p.type || 'Unknown', panX + 4, panY + 83);
  if (p.scanned) {
    ctx.fillStyle = '#44ff44'; ctx.fillText('COLLECTED', panX + 4, panY + 93);
  } else {
    ctx.fillStyle = '#ffcc44';
    ctx.fillText(`Minerals: ${p.minerals}`, panX + 4, panY + 93);
    ctx.fillText(`Fuel: ${p.fuel}`, panX + 4, panY + 103);
    ctx.fillStyle = '#88aaff';
    ctx.fillText('SPACE to scan', panX + 4, panY + 114);
  }

  // Star info panel (left side)
  ctx.fillStyle = 'rgba(0,0,20,0.7)'; ctx.fillRect(4, 4, 80, 30);
  ctx.strokeStyle = '#336'; ctx.strokeRect(4, 4, 80, 30);
  ctx.fillStyle = s.color.fill; ctx.font = 'bold 8px monospace';
  ctx.fillText(s.name, 8, 14);
  ctx.fillStyle = '#aaa'; ctx.font = '8px monospace';
  ctx.fillText(`${s.planets.length} planet${s.planets.length > 1 ? 's' : ''}`, 8, 26);

  // Artifact indicator
  if (s.artifact) {
    ctx.fillStyle = '#ff8844'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    if (s.alien && !defeatedAliens.has(currentStarIdx)) {
      ctx.fillText('PRECURSOR SEAL - Defeat guardian first!', W/2, 20);
    } else {
      ctx.fillText('PRECURSOR SEAL! Press C to collect!', W/2, 20);
    }
    ctx.textAlign = 'left';
  }

  // HUD bar
  ctx.fillStyle = 'rgba(0,0,20,0.7)'; ctx.fillRect(0, H - 14, W, 14);
  ctx.fillStyle = '#4488ff'; ctx.font = '8px monospace';
  ctx.fillText(`FUEL:${fuel}`, 4, H - 4);
  ctx.fillStyle = '#ffcc44'; ctx.fillText(`MIN:${minerals}`, 55, H - 4);
  ctx.fillStyle = '#44ff88'; ctx.fillText(`CREW:${crew}`, 110, H - 4);
  ctx.fillStyle = '#555'; ctx.textAlign = 'right';
  ctx.fillText('LEFT/RIGHT planets  SPACE scan  Q back', W - 4, H - 4);
  ctx.textAlign = 'left';

  // Message
  if (messageTimer > 0) {
    messageTimer--;
    ctx.fillStyle = '#ffcc44'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText(gameMessage, W/2, H/2 + 60);
    ctx.textAlign = 'left';
  }
}

// ==================== SCREEN: DIALOGUE ====================
function updateDialogue() {
  const d = DIALOGUES[dialogue.race];
  if (dialogue.stage === 'greeting') {
    const choices = d.choices;
    if (justPressed['ArrowUp'] || justPressed['KeyW']) { dialogueChoice = (dialogueChoice - 1 + choices.length) % choices.length; sfx.select(); }
    if (justPressed['ArrowDown'] || justPressed['KeyS']) { dialogueChoice = (dialogueChoice + 1) % choices.length; sfx.select(); }
    if (justPressed['Space'] || justPressed['Enter']) {
      const choice = choices[dialogueChoice];
      dialogue.stage = 'response';
      dialogue.text = choice.response;
      dialogue.action = choice.action;
      dialogue.cost = choice.cost;
      dialogue.give = choice.give;
      sfx.confirm();
    }
  } else if (dialogue.stage === 'response') {
    if (justPressed['Space'] || justPressed['Enter']) {
      const act = dialogue.action;
      if (act === 'fight' || act === 'spar') {
        state = 'combat';
        initCombat(dialogue.race);
        music.play(dialogue.race === 'orz' ? 'boss' : 'combat');
      } else if (act === 'trade') {
        if (minerals >= (dialogue.cost || 0)) {
          minerals -= dialogue.cost;
          defeatedAliens.add(dialogue.starIdx);
          gameMessage = 'Trade successful. They will let you pass.';
          messageTimer = 90;
        } else {
          gameMessage = 'Not enough minerals!';
          messageTimer = 60;
        }
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'swtrade') {
        if (minerals >= (dialogue.cost || 0)) {
          minerals -= dialogue.cost;
          fuel += dialogue.give || 0;
          defeatedAliens.add(dialogue.starIdx);
          gameMessage = `Traded ${dialogue.cost} minerals for ${dialogue.give} fuel!`;
          messageTimer = 90;
        } else {
          gameMessage = 'Not enough minerals!';
          messageTimer = 60;
        }
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'heal') {
        crew = Math.min(maxCrew, crew + 10);
        defeatedAliens.add(dialogue.starIdx);
        gameMessage = '+10 crew restored!';
        messageTimer = 90;
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'fuel') {
        fuel += 30;
        defeatedAliens.add(dialogue.starIdx);
        gameMessage = '+30 fuel!';
        messageTimer = 90;
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'minerals') {
        minerals += 30;
        defeatedAliens.add(dialogue.starIdx);
        gameMessage = '+30 minerals!';
        messageTimer = 90;
        returnAfterDialogue(); sfx.confirm();
      } else if (act === 'flee') {
        returnToHyperSpace(); sfx.warp();
      } else {
        // info - just dismiss
        returnAfterDialogue(); sfx.confirm();
      }
    }
  }
}

function drawDialogue() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  const d = DIALOGUES[dialogue.race];
  const raceColor = SHIP_TYPES[dialogue.race].color;

  // === SC2 Comm Screen Layout ===
  // Portrait fills entire left half (SC2 style — big alien face)
  const portW = Math.floor(W * 0.45);
  const portH = Math.floor(H * 0.7);

  // Portrait background — race-tinted dark
  ctx.fillStyle = '#060610'; ctx.fillRect(0, 0, portW, portH);
  // Draw portrait scaled up to fill the area
  ctx.save();
  ctx.beginPath(); ctx.rect(2, 2, portW - 4, portH - 4); ctx.clip();
  const pScale = Math.min((portW - 8) / 64, (portH - 8) / 64);
  ctx.translate(portW / 2 - 32 * pScale, portH / 2 - 32 * pScale);
  ctx.scale(pScale, pScale);
  drawAlienPortrait(dialogue.race, 0, 0);
  ctx.restore();
  // SC2 comm border — double line in race color
  ctx.strokeStyle = raceColor; ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, portW - 2, portH - 2);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
  ctx.strokeRect(3, 3, portW - 6, portH - 6);

  // Talking animation — slight portrait wobble
  const talkBob = Math.sin(frame * 0.15) * 0.5;

  // Race name plate (below portrait, SC2 style)
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, portH, portW, H - portH);
  ctx.strokeStyle = raceColor; ctx.lineWidth = 1;
  ctx.strokeRect(0, portH, portW, H - portH);
  ctx.fillStyle = raceColor; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText(SHIP_TYPES[dialogue.race].race.toUpperCase(), portW / 2, portH + 14);
  // Ship sprite
  ctx.save(); ctx.translate(portW / 2, portH + 38); ctx.scale(0.7, 0.7);
  SHIP_TYPES[dialogue.race].draw({ flash: 0, thrusting: false, def: SHIP_TYPES[dialogue.race], shieldTimer: 0 });
  ctx.restore();
  ctx.textAlign = 'left';

  // === Right side: Text area (SC2 comm style) ===
  const textX = portW + 4;
  const textW2 = W - portW - 8;

  // SC2 speech area — dark blue background with race-colored border
  ctx.fillStyle = '#04041a'; ctx.fillRect(textX, 0, textW2, portH);
  ctx.strokeStyle = '#222'; ctx.strokeRect(textX, 0, textW2, portH);
  // Top accent line
  ctx.fillStyle = raceColor; ctx.fillRect(textX, 0, textW2, 2);

  // SC2-style alien voice — play vocal syllables periodically
  if (frame % 25 === 0) {
    sfx.alienVoice(dialogue.race);
  }

  // SC2 green/race-colored alien speech text
  ctx.fillStyle = '#33ff33'; ctx.font = '8px monospace';
  const words = dialogue.text.split(' ');
  let line = '', y = 16;
  const maxChars = Math.floor(textW2 / 5) - 1;
  for (const word of words) {
    const test = line + word + ' ';
    if (test.length > maxChars) {
      ctx.fillText(line, textX + 6, y);
      line = word + ' '; y += 10;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, textX + 6, y);

  // Choices or continue prompt
  if (dialogue.stage === 'greeting') {
    const choices = d.choices;
    const choiceY0 = Math.max(y + 16, portH * 0.45);
    // SC2 style: player responses in different color
    ctx.fillStyle = '#224488'; ctx.fillRect(textX, choiceY0 - 6, textW2, portH - choiceY0 + 6);
    ctx.fillStyle = raceColor; ctx.fillRect(textX, choiceY0 - 6, textW2, 1);
    for (let i = 0; i < choices.length; i++) {
      const cy = choiceY0 + i * 18;
      const sel = i === dialogueChoice;
      if (sel) {
        ctx.fillStyle = 'rgba(68,136,255,0.25)';
        ctx.fillRect(textX + 2, cy - 2, textW2 - 4, 16);
      }
      ctx.fillStyle = sel ? '#ffcc00' : '#8888cc'; ctx.font = '8px monospace';
      const cText = (sel ? '\u25B6 ' : '  ') + choices[i].text;
      // Word wrap choices
      if (cText.length > maxChars) {
        ctx.fillText(cText.substring(0, maxChars), textX + 6, cy + 6);
        ctx.fillText('  ' + cText.substring(maxChars), textX + 6, cy + 14);
      } else {
        ctx.fillText(cText, textX + 6, cy + 8);
      }
    }
  } else {
    ctx.fillStyle = '#ffcc00'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    if (Math.floor(Date.now() / 400) % 2) ctx.fillText('- SPACE to continue -', textX + textW2 / 2, portH - 10);
    ctx.textAlign = 'left';
  }

  // Bottom status bar (SC2 style)
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(portW, portH, textW2 + 8, H - portH);
  ctx.strokeStyle = '#333'; ctx.strokeRect(portW, portH, textW2 + 8, H - portH);
  // Player ship info
  ctx.fillStyle = '#4488ff'; ctx.font = '8px monospace';
  ctx.fillText(`Crew: ${crew}`, portW + 8, portH + 14);
  ctx.fillText(`Fuel: ${fuel}`, portW + 8, portH + 24);
  ctx.fillStyle = '#ffcc44';
  ctx.fillText(`Minerals: ${minerals}`, portW + 70, portH + 14);
  ctx.fillText(`Artifacts: ${artifacts}/3`, portW + 70, portH + 24);
  // Controls
  ctx.fillStyle = '#444'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('UP/DOWN select  SPACE confirm', W / 2 + portW / 4, H - 4);
  ctx.textAlign = 'left';
}

// ==================== SCREEN: COMBAT ====================
function updateCombat() {
  // Player input
  if (keys['ArrowLeft'] || keys['KeyA']) playerShip.turnLeft();
  if (keys['ArrowRight'] || keys['KeyD']) playerShip.turnRight();
  if (keys['ArrowUp'] || keys['KeyW']) playerShip.thrustForward();
  if (keys['KeyZ']) playerShip.fire();
  if (justPressed['KeyX']) playerShip.useSpecial();

  // AI
  if (enemyShip.alive) updateAI(enemyShip, playerShip);

  // Update ships
  playerShip.update();
  enemyShip.update();

  // Update projectiles
  for (const p of projectiles) {
    // Homing
    if (p.homing && p.target && p.target.alive) {
      const a = angleTo(p.x, p.y, p.target.x, p.target.y);
      p.vx += Math.cos(a) * 0.15;
      p.vy += Math.sin(a) * 0.15;
      const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      if (spd > 6) { p.vx *= 6/spd; p.vy *= 6/spd; }
    }
    // Gravity bomb pulls
    if (p.gravBomb) {
      const target = p.owner === playerShip ? enemyShip : playerShip;
      const dx = p.x - target.x, dy = p.y - target.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d > 10 && d < 150) {
        target.vx += (dx/d) * 2 / d * 50;
        target.vy += (dy/d) * 2 / d * 50;
      }
    }
    p.x += p.vx; p.y += p.vy; p.life--;
    // Wrap
    const ARENA = 400;
    if (p.x < -ARENA) p.x += ARENA*2;
    if (p.x > ARENA) p.x -= ARENA*2;
    if (p.y < -ARENA) p.y += ARENA*2;
    if (p.y > ARENA) p.y -= ARENA*2;
  }

  // Collision: projectiles vs ships
  // Point defense module — auto-destroy nearby enemy projectiles
  if (playerShip.hasPointDef) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      if (p.owner !== playerShip && !p.gravBomb && dist(p.x, p.y, playerShip.x, playerShip.y) < 40) {
        spawnParticles(p.x, p.y, '#aaaaff', 3, 1);
        projectiles.splice(i, 1);
      }
    }
  }

  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    // vs player
    if (p.owner !== playerShip && dist(p.x, p.y, playerShip.x, playerShip.y) < 12 && !p.gravBomb) {
      playerShip.takeDamage(p.damage);
      spawnParticles(p.x, p.y, '#ff8844', 5, 2);
      projectiles.splice(i, 1); sfx.hit(); continue;
    }
    // vs enemy
    if (p.owner !== enemyShip && dist(p.x, p.y, enemyShip.x, enemyShip.y) < 12 && !p.gravBomb) {
      enemyShip.takeDamage(p.damage);
      spawnParticles(p.x, p.y, '#ff8844', 5, 2);
      projectiles.splice(i, 1); sfx.hit(); continue;
    }
    // Drone collision
    const droneOwner = p.owner === playerShip ? enemyShip : playerShip;
    for (const d of droneOwner.drones) {
      if (dist(p.x, p.y, d.x, d.y) < 8 && !p.gravBomb) {
        d.life = 0; projectiles.splice(i, 1); sfx.hit();
        spawnParticles(d.x, d.y, '#ffff44', 5, 2);
        break;
      }
    }
  }

  // Drone damage
  for (const d of playerShip.drones) {
    if (dist(d.x, d.y, enemyShip.x, enemyShip.y) < 14) {
      enemyShip.takeDamage(1);
      d.life = 0;
      spawnParticles(d.x, d.y, '#ffff44', 5, 2);
      sfx.hit();
    }
  }
  for (const d of enemyShip.drones) {
    if (dist(d.x, d.y, playerShip.x, playerShip.y) < 14) {
      playerShip.takeDamage(1);
      d.life = 0;
      spawnParticles(d.x, d.y, '#ffff44', 5, 2);
      sfx.hit();
    }
  }

  // Particles
  for (const p of particles) p.update();
  particles = particles.filter(p => p.life > 0);

  // Check win/lose
  if (!playerShip.alive) {
    crew = 0;
    sfx.explode();
    spawnParticles(playerShip.x, playerShip.y, '#ff4400', 30, 5);
    setTimeout(() => { state = 'gameover'; music.stop(); sfx.defeat(); }, 1500);
    playerShip.alive = true; playerShip.crew = -1; // prevent re-trigger
  }
  if (!enemyShip.alive && enemyShip.crew === 0) {
    sfx.explode();
    spawnParticles(enemyShip.x, enemyShip.y, enemyShip.def.color, 30, 5);
    enemyShip.crew = -1; // prevent re-trigger
    defeatedAliens.add(dialogue ? dialogue.starIdx : -1);
    crew = playerShip.crew;
    // Check if this was the final boss
    if (enemyShip.type === 'orz' && artifacts >= 3) {
      setTimeout(() => { state = 'victory'; music.stop(); sfx.victory(); }, 2000);
    } else {
      setTimeout(() => {
        // Return to orbit if at a star, hyperspace if random encounter
        if (dialogue && dialogue.starIdx === -1) { returnToHyperSpace(); }
        else { state = 'orbit'; orbitCursor = 0; scanTimer = 0; }
        music.play('map');
        gameMessage = `${enemyShip.def.race} defeated! +50 minerals`;
        minerals += 50;
        messageTimer = 90;
      }, 1500);
    }
  }
}

function drawCombat() {
  // Screen shake
  let shaking = screenShake > 0;
  if (shaking) {
    ctx.save();
    ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    screenShake--;
  }
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  // Camera centered on midpoint between ships, with dynamic zoom
  const shipDist = Math.hypot(playerShip.x - enemyShip.x, playerShip.y - enemyShip.y);
  // Zoom: 0.5 when close, down to 0.28 when far apart
  const targetZoom = Math.max(0.28, Math.min(0.5, 140 / Math.max(shipDist, 1)));
  if (!window._combatZoom) window._combatZoom = 0.5;
  window._combatZoom += (targetZoom - window._combatZoom) * 0.05;
  const zoom = window._combatZoom;

  // cx/cy: camera offset so midpoint of ships is at screen center
  // At zoom < 1, we see more world, so expand the offset
  const cx = (playerShip.x + enemyShip.x) / 2 - W / (2 * zoom);
  const cy = (playerShip.y + enemyShip.y) / 2 - H / (2 * zoom);

  // Apply zoom: scale all world drawing around top-left, with cx/cy adjusted for zoom
  ctx.save();
  ctx.scale(zoom, zoom);

  drawStarField(cx, cy, 60);

  // Planet - SC2 style colorful rotating planet
  if (combatPlanet) {
    const px = combatPlanet.x - cx, py = combatPlanet.y - cy;
    const R = PLANET_RADIUS;
    // Atmosphere glow
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#4488ff';
    ctx.beginPath(); ctx.arc(px, py, R + 8, 0, TAU); ctx.fill();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#2266cc';
    ctx.beginPath(); ctx.arc(px, py, R + 4, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
    // Planet base - blue/green world
    ctx.fillStyle = '#1144aa';
    ctx.beginPath(); ctx.arc(px, py, R, 0, TAU); ctx.fill();
    // Continents (rotating with time)
    ctx.save();
    ctx.beginPath(); ctx.arc(px, py, R, 0, TAU); ctx.clip();
    const rot = frame * 0.008;
    ctx.fillStyle = '#228833';
    ctx.beginPath(); ctx.arc(px + Math.cos(rot) * 8, py - 4, 7, 0, TAU); ctx.fill();
    ctx.fillStyle = '#33aa44';
    ctx.beginPath(); ctx.arc(px + Math.cos(rot + 1.5) * 10, py + 5, 5, 0, TAU); ctx.fill();
    ctx.fillStyle = '#44bb55';
    ctx.beginPath(); ctx.arc(px + Math.cos(rot + 3) * 6, py - 8, 4, 0, TAU); ctx.fill();
    ctx.fillStyle = '#cc9944';
    ctx.beginPath(); ctx.arc(px + Math.cos(rot + 4) * 9, py + 3, 3, 0, TAU); ctx.fill();
    // Ice caps
    ctx.fillStyle = '#ddeeff';
    ctx.fillRect(px - 6, py - R + 1, 12, 3);
    ctx.fillRect(px - 4, py + R - 4, 8, 3);
    // Cloud wisps
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + Math.cos(rot * 1.3) * 8 - 6, py - 5, 12, 2);
    ctx.fillRect(px + Math.cos(rot * 1.3 + 2) * 6 - 4, py + 6, 8, 2);
    ctx.globalAlpha = 1;
    ctx.restore();
    // Light/shadow gradient
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(px + 5, py + 4, R, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
    // Specular highlight
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px - 6, py - 6, R * 0.35, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Projectiles
  for (const p of projectiles) {
    const sx = p.x - cx, sy = p.y - cy;
    if (p.gravBomb) {
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(sx, sy, 8 + Math.sin(frame * 0.2) * 3, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx, sy, 2, 0, TAU); ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(sx - p.size/2, sy - p.size/2, p.size, p.size);
      // Trail
      ctx.globalAlpha = 0.3;
      ctx.fillRect(sx - p.vx - p.size/2, sy - p.vy - p.size/2, p.size, p.size);
      ctx.globalAlpha = 1;
    }
  }

  // Drones
  for (const ship of [playerShip, enemyShip]) {
    for (const d of ship.drones) {
      ctx.fillStyle = ship.def.color;
      ctx.fillRect(d.x - cx - 2, d.y - cy - 2, 4, 4);
      ctx.fillStyle = '#fff';
      ctx.fillRect(d.x - cx - 1, d.y - cy - 1, 2, 2);
    }
  }

  // Ships
  if (playerShip.crew >= 0) playerShip.draw(cx, cy);
  if (enemyShip.crew >= 0) enemyShip.draw(cx, cy);

  // Particles
  for (const p of particles) p.draw(cx, cy);

  // End zoom transform (HUD drawn at screen scale)
  ctx.restore();

  // Off-screen enemy direction arrow (screen coords after zoom)
  const esx = (enemyShip.x - cx) * zoom, esy = (enemyShip.y - cy) * zoom;
  if (esx < -20 || esx > W + 20 || esy < -20 || esy > H + 20) {
    const ang = Math.atan2(esy - H/2, esx - W/2);
    const ax = W/2 + Math.cos(ang) * Math.min(W/2 - 44, H/2 - 20);
    const ay = H/2 + Math.sin(ang) * Math.min(W/2 - 44, H/2 - 20);
    ctx.save(); ctx.translate(ax, ay); ctx.rotate(ang);
    ctx.fillStyle = Math.floor(Date.now()/200)%2 ? '#ff4444' : '#ff8888';
    ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(-6, -6); ctx.lineTo(-6, 6); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // === SC2 Super Melee HUD ===
  // Player panel (left side, vertical) - ship icon + crew + battery
  const panelW = 36, panelH = H;
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, panelW, panelH);
  ctx.strokeStyle = '#334'; ctx.strokeRect(0, 0, panelW, panelH);

  // Player ship mini portrait
  ctx.fillStyle = '#111'; ctx.fillRect(2, 2, 32, 32);
  ctx.strokeStyle = playerShip.def.color; ctx.strokeRect(2, 2, 32, 32);
  ctx.save(); ctx.translate(18, 18); ctx.scale(0.8, 0.8);
  playerShip.def.draw({ flash: 0, thrusting: false, def: playerShip.def, shieldTimer: 0 });
  ctx.restore();

  // Player ship name
  ctx.fillStyle = playerShip.def.color; ctx.font = '8px monospace';
  ctx.save(); ctx.translate(6, 44); ctx.fillText(playerShip.def.name.substring(0, 5), 0, 0); ctx.restore();

  // Player crew dots (SC2 style column)
  const pCrew = Math.max(0, playerShip.crew);
  for (let i = 0; i < playerShip.def.maxCrew; i++) {
    const dx = 3 + (i % 4) * 8, dy = 50 + Math.floor(i / 4) * 6;
    ctx.fillStyle = i < pCrew ? '#44ff88' : '#1a1a1a';
    ctx.fillRect(dx, dy, 6, 4);
    if (i < pCrew) { ctx.fillStyle = '#88ffbb'; ctx.fillRect(dx, dy, 3, 2); }
  }

  // Player energy battery (SC2 segmented bar)
  const pBatY = H - 60;
  ctx.fillStyle = '#888'; ctx.font = '8px monospace';
  ctx.fillText('BAT', 4, pBatY - 4);
  const pSegs = 10;
  const pEFrac = playerShip.energy / playerShip.def.maxEnergy;
  for (let i = 0; i < pSegs; i++) {
    const by = pBatY + (pSegs - 1 - i) * 5;
    ctx.fillStyle = i / pSegs < pEFrac ? '#4488ff' : '#111';
    ctx.fillRect(4, by, 28, 4);
    if (i / pSegs < pEFrac) {
      ctx.fillStyle = '#66aaff'; ctx.fillRect(4, by, 28, 2);
    }
  }

  // Enemy panel (right side, vertical)
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(W - panelW, 0, panelW, panelH);
  ctx.strokeStyle = '#334'; ctx.strokeRect(W - panelW, 0, panelW, panelH);

  // Enemy ship mini portrait
  ctx.fillStyle = '#111'; ctx.fillRect(W - 34, 2, 32, 32);
  ctx.strokeStyle = enemyShip.def.color; ctx.strokeRect(W - 34, 2, 32, 32);
  ctx.save(); ctx.translate(W - 18, 18); ctx.scale(0.8, 0.8);
  enemyShip.def.draw({ flash: 0, thrusting: false, def: enemyShip.def, shieldTimer: 0 });
  ctx.restore();

  // Enemy ship name
  ctx.fillStyle = enemyShip.def.color; ctx.font = '8px monospace';
  ctx.save(); ctx.translate(W - 32, 44); ctx.fillText(enemyShip.def.name.substring(0, 5), 0, 0); ctx.restore();

  // Enemy crew dots
  const eCrew = Math.max(0, enemyShip.crew);
  for (let i = 0; i < enemyShip.def.maxCrew; i++) {
    const dx = W - 33 + (i % 4) * 8, dy = 50 + Math.floor(i / 4) * 6;
    ctx.fillStyle = i < eCrew ? '#ff6644' : '#1a1a1a';
    ctx.fillRect(dx, dy, 6, 4);
    if (i < eCrew) { ctx.fillStyle = '#ff9977'; ctx.fillRect(dx, dy, 3, 2); }
  }

  // Enemy energy battery
  const eEFrac = enemyShip.energy / enemyShip.def.maxEnergy;
  ctx.fillStyle = '#888'; ctx.font = '8px monospace';
  ctx.fillText('BAT', W - 32, pBatY - 4);
  for (let i = 0; i < pSegs; i++) {
    const by = pBatY + (pSegs - 1 - i) * 5;
    ctx.fillStyle = i / pSegs < eEFrac ? (enemyShip.def.color || '#ff4444') : '#111';
    ctx.fillRect(W - 32, by, 28, 4);
    if (i / pSegs < eEFrac) {
      ctx.fillStyle = enemyShip.def.accent || '#ff6666'; ctx.fillRect(W - 32, by, 28, 2);
    }
  }
  // End screen shake
  if (shaking) ctx.restore();
}

// ==================== SCREEN: GAME OVER ====================
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, W, H);
  drawStarField(0, 0, 30);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444'; ctx.font = 'bold 18px monospace';
  ctx.fillText('GAME OVER', W/2, H/2 - 20);
  ctx.fillStyle = '#aaa'; ctx.font = '8px monospace';
  ctx.fillText('The Vindicator is lost.', W/2, H/2);
  ctx.fillText('The rift grows wider...', W/2, H/2 + 12);
  ctx.fillText(`Precursor Artifacts: ${artifacts}/3`, W/2, H/2 + 24);
  ctx.fillStyle = '#fff'; ctx.font = '8px monospace';
  if (Math.floor(Date.now()/500)%2) ctx.fillText('PRESS ANY KEY TO RESTART', W/2, H/2 + 40);
  ctx.textAlign = 'left';
  for (const k in justPressed) {
    if (justPressed[k]) { state = 'title'; break; }
  }
}

// ==================== SCREEN: VICTORY ====================
function drawVictory() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  drawStarField(frame, frame * 0.5, 100);

  // Fireworks
  if (Math.random() < 0.1) {
    const fx = Math.random() * W, fy = Math.random() * H * 0.6;
    const colors = ['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff','#44ffff'];
    spawnParticles(fx + mapCamX, fy + mapCamY, colors[Math.floor(Math.random()*colors.length)], 12, 4);
  }
  for (const p of particles) p.update();
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) p.draw(mapCamX || 0, mapCamY || 0);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc44'; ctx.font = 'bold 20px monospace';
  ctx.fillText('VICTORY', W/2, H/2 - 50);
  ctx.fillStyle = '#88bbff'; ctx.font = '8px monospace';
  ctx.fillText('The dimensional rift is sealed!', W/2, H/2 - 32);
  ctx.fillStyle = '#ddd'; ctx.font = '8px monospace';
  ctx.fillText('With the three Precursor Artifacts,', W/2, H/2 - 16);
  ctx.fillText('you closed the rift torn open by', W/2, H/2 - 4);
  ctx.fillText('the Sa-Matra\'s destruction.', W/2, H/2 + 8);
  ctx.fillStyle = '#88aacc';
  ctx.fillText('The Orz are pushed back', W/2, H/2 + 24);
  ctx.fillText('to the space *between* spaces.', W/2, H/2 + 34);
  ctx.fillStyle = '#aaa';
  ctx.fillText('The Alliance of Free Stars endures.', W/2, H/2 + 50);
  ctx.fillStyle = '#667788';
  ctx.fillText('But the Orz are still smiling...', W/2, H/2 + 64);
  ctx.fillStyle = '#fff'; ctx.font = '8px monospace';
  if (Math.floor(Date.now()/500)%2) ctx.fillText('PRESS ANY KEY', W/2, H/2 + 55);
  ctx.textAlign = 'left';
  for (const k in justPressed) {
    if (justPressed[k]) { state = 'title'; break; }
  }
}

// ==================== MAIN GAME LOOP ====================
function gameLoop() {
  try {
  frame++;

  if (state === 'title') {
    music.play('title');
    drawTitle();
    for (const k in justPressed) {
      if (justPressed[k]) { state = 'map'; initGame(); music.play('map'); break; }
    }
  } else if (state === 'map') {
    music.play('map');
    updateMap();
    drawMap();
  } else if (state === 'upgrade') {
    updateUpgrade();
    drawUpgrade();
  } else if (state === 'starbase') {
    music.play('map');
    updateStarbase();
    drawStarbase();
  } else if (state === 'orbit') {
    music.play('map');
    updateOrbit();
    drawOrbit();
  } else if (state === 'dialogue') {
    music.play('dialogue');
    updateDialogue();
    drawDialogue();
  } else if (state === 'combat') {
    updateCombat();
    drawCombat();
  } else if (state === 'gameover') {
    drawGameOver();
  } else if (state === 'victory') {
    drawVictory();
  }

  for (const k in justPressed) delete justPressed[k];

  // Render to display
  displayCtx.drawImage(buffer, 0, 0, SNES_W, SNES_H, 0, 0, SNES_W * SCALE, SNES_H * SCALE);
  // Scanlines
  displayCtx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let sy = 0; sy < SNES_H * SCALE; sy += SCALE) displayCtx.fillRect(0, sy + SCALE - 1, SNES_W * SCALE, 1);

  } catch(e) { console.error('Game error:', e); }
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
